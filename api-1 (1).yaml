openapi: 3.1.1
info:
  title: APIs do Sienge Plataforma - V1
  summary: Define versão 1 das APIs externas do Sienge
  description: |
    ## Introdução

    O **Sienge Plataforma** disponibiliza a documentação das APIs de forma pública para clientes, parceiros de integração ou desenvolvedores independentes.

    ### URL E requisições

    Além de realizar a autenticação com o usuário e senha no momento da requisição às APIs, é necessário informar o seu sub domínio que identifica qual será o cliente Sienge que receberá a requisição. Essa informação irá complementar a url para qual será realizada chamada na API.

    Exemplo:

    [https://api.sienge.com.br/{subdonimio-do-cliente}/public/api/{versão-da-api}/{recurso}](https://api.sienge.com.br/{subdonimio-do-cliente}/public/api/{versão-da-api}/{recurso})

    Exemplo:

    - **Subdomínio do Cliente**: *minhaempresa*.sienge.com.br
    - **Versão da API**: v1
    - **Recurso**: examples

    **URL Final**: `[https://api.sienge.com.br/minhaempresa/public/api/v1/examples`](https://api.sienge.com.br/minhaempresa/public/api/v1/examples`)

    É importante Ressaltar que a URL para APIs BULK DATA são diferentes, como a seguir:

    `[https://api.sienge.com.br/minhaempresa/public/api/bulk-data/v1/examples`](https://api.sienge.com.br/minhaempresa/public/api/bulk-data/v1/examples`)

    Lembre-se de sempre utilizar criptografia, ou seja, HTTPS… ; )

    ### Limites de Requisições - Rate-Limits

    Por padrão todos os endpoints da API dividem um número máximo de requisições por dia, que é definido pelo pacote contratado ou uma limitação de segurança por minuto, conforme a seguir.

    #### Limites de Segurança

    O limite máximo de requisições por Segurança são calculadas no volume de requisições a ser feito por um cliente (sub domínio).

    As limitações são bloqueantes pelo volume por minuto conforme tabela abaixo.

    | Tipos | Requisiçoes |
    |-------|-------------|
    | REST  | 200 / minuto|
    | BULK  | 20 / minuto |

    Neste caso, um usuário pode requisitar quantos endpoints achar necessário respeitando este limite..

    #### Limites por pacotes de API

    Na determinação de limites por pacotes, são contabilizadas as requisições por dia, onde pode ou não haver um bloqueio ao atingir a quota diária.

    ### Pacotes de APIs

    Neste caso, um usuário pode requisitar quantos endpoints achar necessário respeitando este limite..

    | Tipo                | Free | Start | Special | Essencial | Enterprise | Ultimate |
    |---------------------|------|-------|---------|-----------|------------|----------|
    | **Requisições Diárias** |  |       |         |           |            |          |
    | REST                | 100* | 1.000 | 2.500   | 5.000     | 10.000     | 75.000   |
    | BULK                | 10*  | 20*   | 50*     | 100*      | 200*       | 28.800*  |

    *\* Volumes com bloqueio - Ao atingir o limite receberá o retorno 429 : To Many Requests*

    ### Autenticação

    Para utilizar os recursos das APIs do Sienge Plataforma é necessário se autenticar utilizando o **[Basic Authorization](https://developer.mozilla.org/pt-BR/docs/Web/HTTP/Headers/Authorization)** com as credenciais cadastradas no Painel de Integrações da Plataforma.

    Se você não tem esse acesso. Contate o Administrador da sua conta Sienge Plataforma.

    As diretivas de tipo Basic e credenciais devem ser informadas no Header da requisição **Authorization**.

    As credenciais devem ser construídas da forma a seguir:

    - O nome de usuário com a senha combinados por dois pontos (usuario-api:senha).
    - A cadeia de caracteres resultante é uma codificação base64 (dXN1YXJpby1hcGk6c2VuaGE=).
  version: 1.9.0
  contact:
    name: Platform
    email: platform@softplan.com.br
    url: sotfplan.com.br
  license:
    name: Apache 2.0
    identifier: Apache-2.0
servers:
  - url: https://api.sienge.com.br/{tenant}/public/api
    variables:
      tenant:
        default: seu-subdominio
        description: Subdomínio do cliente Sienge usado para montar a URL base das APIs.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    DefaultErrorMessage:
      type: object
      properties:
        status:
          type: string
        developerMessage:
          type: string
        clientMessage:
          type: string
      description: Placeholder que será substituído pelo schema ErrorMessage real após
        merge dos documentos
    BuildingId:
      description: Código da obra
      example: 100
      format: int32
      minimum: 0
      type: integer
    BuildingName:
      description: Nome da obra
      example: Obra Exemplo
      type: string
    BuildingUnitId:
      description: Código da unidade construtiva
      example: 123
      format: int32
      type: integer
    ClientId:
      description: Código do cliente
      example: 123
      format: int32
      type: integer
    ClientName:
      description: Nome do cliente
      example: Nome do cliente
      type: string
    CommissionId:
      description: Código da comissão
      example: 123
      format: int32
      type: integer
    CompanyId:
      description: Código da empresa
      example: 123
      format: int32
      type: integer
    CompanyName:
      description: Nome da empresa
      example: Nome da empresa
      type: string
    CostCenterId:
      description: Código do centro de custo
      example: 123
      format: int32
      type: integer
    ErrorMessage:
      description: Descrição dos erros no processamento da requisição
      properties:
        clientMessage:
          description: Mensagem de resposta para o usuário
          example: Você deve informar o query param xpto
          maxLength: 1000
          pattern: ^.{1,1000}$
          type: string
        developerMessage:
          description: Mensagem de resposta para análise do desenvolvedor
          example: Parâmetro obrigatório xpto ausente
          maxLength: 1000
          pattern: ^.{1,1000}$
          type: string
        errors:
          description: Lista de erros
          example:
            - field: xpto
              message: campo xpto ausente
          items:
            example:
              field: xpto
              message: campo xpto ausente
            properties:
              field:
                description: Campo inválido
                example: name
                maxLength: 1000
                pattern: ^.{1,1000}$
                type: string
              message:
                description: Razão pela qual o campo foi considerado inválido
                example: O campo name não está presente
                maxLength: 1000
                pattern: ^.{1,1000}$
                type: string
            type: object
          maxItems: 100
          type: array
        status:
          description: Status Http
          example: 400
          format: int32
          maximum: 599
          minimum: 100
          type: integer
      required:
        - status
        - developerMessage
        - clientMessage
      type: object
    Href:
      description: URL do recurso associado
      example: https://../v1/purchase-..
      type: string
    IndexerId:
      description: Código do indexador.
      example: 5
      type: integer
    IndexerName:
      description: Nome do indexador.
      example: IGP-M
      type: string
    Link:
      description: Representa um link para outro recurso.
      properties:
        href:
          $ref: "#/components/schemas/Href"
        rel:
          $ref: "#/components/schemas/Rel"
      type: object
    Links:
      description: Links para acessar outros recursos
      example:
        - href: https://../v1/purchase-..
          rel: Recurso
      items:
        $ref: "#/components/schemas/Link"
      type: array
    Rel:
      description: Nome da recurso associado
      example: Recurso
      type: string
    ResultSetMetadata:
      description: Descrição dos dados de paginação
      example:
        count: 200
        limit: 100
        offset: 0
      properties:
        count:
          description: Total de resultados disponíveis na base de dados como resultado da
            pesquisa efetuada
          example: 2000
          format: int64
          maximum: 99999
          minimum: 0
          type: integer
        limit:
          default: 100
          description: Quantidade máxima de resultados da pesquisa a serem retornados.
            Valor default são 100 e o valor máximo permitdo são 200.
          example: 100
          format: int32
          maximum: 200
          minimum: 1
          type: integer
        offset:
          default: 0
          description: Deslocamento entre o começo da lista e um dado elemento. Valor
            default são 0.
          example: 0
          format: int32
          maximum: 999999
          minimum: 0
          type: integer
      required:
        - count
        - offset
        - limit
      type: object
    Units:
      description: Unidades do título.
      type: string
    UpdatedAt:
      description: Data e hora da atualização
      example: 2025-01-01T12:00:00Z
      format: date-time
      type: string
    Username:
      description: Usuário responsável pela alteração
      example: usuario.sienge
      type: string
    BalanceTypeEnum:
      description: Tipo de saldo contábil
      enum:
        - CREDIT
        - DEBIT
      example: CREDIT
      type: string
    Barcode:
      description: Código de barras do insumo, considerando a unidade de medida
        básica, sem detalhe nem marca especificados.
      example: "7613033174728"
      type: string
    FiscalProductDTO:
      description: Retorna um objeto representando o produto fiscal vinculado ao
        detalhe do insumo.
      properties:
        description:
          description: Descrição do produto fiscal
          example: Produto Fiscal 1
          type: string
        id:
          description: Código do produto fiscal
          example: 10
          type: integer
      type: object
    ResourceCode:
      description: Código auxiliar do insumo
      example: M1354
      type: string
    ResourceDescription:
      description: Descrição do insumo
      example: Cimento Portland
      type: string
    ResourceDetailDTO:
      description: Retorna um objeto representando um detalhe de um insumo.
      properties:
        description:
          description: Descrição do detalhe
          example: CP-320
          type: string
        detailCode:
          description: Código auxiliar do detalhe
          example: DT-01
          type: string
        fiscalProduct:
          allOf:
            - $ref: "#/components/schemas/FiscalProductDTO"
          description: Produto fiscal vinculado ao detalhe do insumo. Pode ser null quando
            o detalhe não tiver produto fiscal vinculado.
          nullable: true
        id:
          description: Id do detalhe
          example: 1
          type: integer
        status:
          description: Status do detalhe do insumo. Indica se o detalhe está ativo
            (ACTIVE) ou inativo (INACTIVE).
          enum:
            - ACTIVE
            - INACTIVE
          example: ACTIVE
          type: string
      type: object
    ResourceDetails:
      description: Detalhes do insumo
      example:
        - description: CP-320
          detailCode: DT-01
          fiscalProduct:
            description: Cimento Portland
            id: 10
          id: 1
          status: ACTIVE
      items:
        $ref: "#/components/schemas/ResourceDetailDTO"
      type: array
    ResourceId:
      description: Id do insumo
      example: 1001
      format: int32
      type: integer
    ResourceIdDescription:
      description: Código do insumo
      type: string
    ResourceTrademarkDTO:
      description: Retorna um objeto representando uma marca de um insumo.
      properties:
        description:
          description: Descrição da marca
          example: Lorem ipsum
          type: string
        id:
          description: Id da marca
          example: 123
          type: integer
      type: object
    Trademarks:
      description: Marcas ativas do insumo
      example:
        - description: Lorem ipsum
          id: 123
      items:
        $ref: "#/components/schemas/ResourceTrademarkDTO"
      type: array
    UnitOfMeasure:
      description: Símbolo da unidade de medida básica do insumo
      example: kg
      type: string
    AuxiliaryCode:
      description: Código auxiliar
      example: AUX-123
      maxLength: 25
      type: string
    BudgetLevelEnum:
      description: Nível do item na planilha
      enum:
        - CELULA_CONSTRUTIVA
        - ETAPA
        - SUBETAPA
        - SERVICO
      example: SERVICO
      type: string
    CompositionTypeEnum:
      description: Tipo de item da composição
      enum:
        - INSUMO
        - SERVICO
      example: SERVICO
      type: string
    Description:
      description: Descrição
      example: Descrição exemplo
      maxLength: 300
      type: string
    InputTypeEnum:
      description: Tipo do insumo
      enum:
        - EQ
        - MO
        - MC
        - OU
        - ME
        - CL
        - MM
      example: MC
      type: string
    IntegrationCode:
      description: Código único da integração
      example: ABC-123
      maxLength: 25
      type: string
    Percentage:
      description: Percentual
      example: 10.12
      type: number
    Quantity:
      description: Quantidade
      example: 100.5
      type: number
    TableCode:
      description: Código da tabela no Sienge
      example: 1
      format: int32
      minimum: 1
      type: integer
    Account:
      description: Descrição conta corrente
      example: Descrição conta corrente
      type: string
    AccountBeneficiaryCnpjNumber:
      description: CNPJ do beneficiário sem máscara
      example: "00506302000136"
      type: string
    AccountBeneficiaryCpfNumber:
      description: CPF do beneficiário sem máscara
      example: "22853233014"
      type: string
    AccountBeneficiaryName:
      description: Nome do beneficiário
      example: John Doe
      type: string
    AccountCompanyId:
      description: Código da conta da empresa
      example: 123
      format: int32
      type: integer
    AccountDac:
      description: DAC da conta
      example: "1"
      type: string
    AccountDigit:
      description: Dígito da conta
      example: "6"
      type: string
    AccountNumber:
      description: Número da conta corrente
      example: 1234-5
      type: string
    AccountStatements:
      description: Objeto de informação bancaria
      properties:
        accountBeneficiaryCnpjNumber:
          $ref: "#/components/schemas/AccountBeneficiaryCnpjNumber"
        accountBeneficiaryCpfNumber:
          $ref: "#/components/schemas/AccountBeneficiaryCpfNumber"
        accountBeneficiaryName:
          $ref: "#/components/schemas/AccountBeneficiaryName"
        accountDac:
          $ref: "#/components/schemas/AccountDac"
        accountDigit:
          $ref: "#/components/schemas/AccountDigit"
        accountNumber:
          $ref: "#/components/schemas/BankAccountNumber"
        accountType:
          $ref: "#/components/schemas/AccountType"
        bankBranchDigit:
          $ref: "#/components/schemas/BankBranchDigit"
        bankBranchName:
          description: Nome da agência
          example: Agência da praça
          type: string
        bankBranchNumber:
          $ref: "#/components/schemas/BankBranchNumber"
        bankCode:
          $ref: "#/components/schemas/CodigoBanco"
        defaultFlag:
          $ref: "#/components/schemas/DefaultFlag"
      type: object
    AccountType:
      description: Tipo de conta 'C' para corrente 'P' para poupança
      example: C
      type: string
    AccountingDate:
      description: Data contábil. Formato ISO 8601 (yyyy-MM-dd).
      example: 2023-01-10T00:00:00Z
      format: date
      type: string
    AccountingReceiptDate:
      description: Data de recebimento contábil. Formato ISO 8601 (yyyy-MM-dd).
      example: 2023-02-11T00:00:00Z
      format: date
      type: string
    AdditionalValueDescription:
      description: Valor do acréscimo
    AdditionsValue:
      description: Valor de acréscimos.
      example: 0
      type: number
    AddressComplement:
      description: Complemento do endereço
      example: Bloco 1
      type: string
    AddressNeighborhood:
      description: Bairro
      example: Centro
      type: string
    AddressNumber:
      description: Número do endereço
      example: "321"
      type: string
    AgentId:
      description: Id do representante
      example: 48
      type: integer
    AgentInsert:
      description: Objeto para inserção do representante
      properties:
        agentId:
          $ref: "#/components/schemas/AgentId"
      type: object
    AgentUpdate:
      description: Objeto para atualização dos representantes
      properties:
        agentId:
          $ref: "#/components/schemas/AgentId"
      type: object
    AppropriationRate:
      description: Percentual de apropriação
      example: 100
      format: double
      type: number
    BankAccountNumber:
      description: Número da conta
      example: "13354"
      type: string
    BankBranchDigit:
      description: Dígito da agência
      example: "6"
      type: string
    BankBranchNumber:
      description: Número da agência
      example: "4611"
      type: string
    BankInformation:
      description: Informação bancária do credor
      properties:
        accountNumber:
          description: Código da conta
          example: "13354"
          type: string
        accountType:
          description: Corretor ('P' or 'C')
          example: P
          type: string
        agency:
          description: Código da agência
          example: "4611"
          type: string
        bank:
          $ref: "#/components/schemas/CodigoBanco"
        checkDigit:
          description: Dígito verificador da conta
          example: "6"
          type: string
        cnpj:
          $ref: "#/components/schemas/CreditorCnpj"
        cpf:
          $ref: "#/components/schemas/CreditorCpf"
        defaultFlag:
          $ref: "#/components/schemas/DefaultFlag"
        id:
          description: Sequencial da informação bancária
          example: 1
          format: int32
          type: integer
        nameOfBank:
          description: Nome do Banco
          example: Banco do Brasil S.A.
          type: string
        nameOfRecipient:
          $ref: "#/components/schemas/BeneficiaryName"
        paymentForm:
          description: Nome da forma de Pagamento
          example: Boleto
          type: string
      type: object
    BankMovementAmount:
      description: Valor do movimento
      example: 1000
      format: double
      type: number
    BankMovementFinancialAppropriationDescription:
      description: Apropriação financeira do movimento
    BankMovementHistoricId:
      description: Código do histórico padrão
      example: 123
      format: int32
      type: integer
    BankMovementHistoricName:
      description: Descrição do histórico padrão
      example: Histórico padrão 1
      type: string
    BankMovementId:
      description: Código do movimento bancário
      example: 1
      format: int32
      type: integer
    BankMovementOperationId:
      description: Código da operação
      example: 123
      format: int32
      type: integer
    BankMovementOperationName:
      description: Descrição da operação
      example: Operação 1
      type: string
    BankMovementOperationType:
      description: Tipo de operação
      example: Recebimento
      type: string
    BankMovementReconcileDescription:
      description: Movimento conciliado
      example: sim
      type: string
    BankMovementsListDescription:
      description: Movimentos
    BaseDate:
      description: Data base. Formato ISO 8601 (yyyy-MM-dd).
      example: 2018-12-22T00:00:00Z
      format: date
      type: string
    BatchNumber:
      description: Número do lote do pagamento escritural
      example: 123
      format: int32
      type: integer
    BearerIdDescription:
      description: Código do portador
    BeneficiaryName:
      description: Nome do favorecido
      example: John Doe
      type: string
    BillId:
      description: Identificador do título no Sienge
      example: 5000
      format: int32
      type: integer
    BusinessAreaId:
      description: Código da área de negócio
      example: 123
      format: int32
      type: integer
    BusinessAreaName:
      description: Nome da área de negócio
      example: Área de Negócio Exemplo
      type: string
    BusinessTypeId:
      description: Código do tipo de negócio
      example: 40
      format: int32
      type: integer
    BusinessTypeName:
      description: Nome do tipo de negócio
      example: Tipo Exemplo
      type: string
    CancellationDate:
      description: Data de cancelamento. Formato ISO 8601 (yyyy-MM-dd).
      example: 2023-01-10T00:00:00Z
      format: date
      type: string
    CityId:
      description: Código do município
      example: 1
      type: integer
    CodigoBanco:
      description: Código do banco
      example: "001"
      type: string
    Company:
      description: Empresa.
      example:
        id: 1
        name: Empresa Exemplo
      properties:
        id:
          example: 1
          format: int64
          type: integer
        name:
          example: Empresa Exemplo
          type: string
      type: object
    CompanyNameRazaoSocial:
      description: Razão social da empresa.
      example: Empresa Exemplo Ltda
      type: string
    CompetenceDate:
      description: Data de competência. Formato ISO 8601 (yyyy-MM-dd).
      example: 2018-12-22T00:00:00Z
      format: date
      type: string
    ConditionIdInArray:
      description: "Id das condições de pagamento para incluir na consulta (Exemplo:
        AT, PM) | Preenchendo este parâmetro serão consideradas somente as
        parcelas cadastradas com as mesmas condições de pagamento informadas no
        parâmetro."
      example:
        - AT
        - PM
      type: array
    ConditionIdNotInArray:
      description: "Id das condições de pagamento para excluir na consulta (Exemplo:
        AT, PM) | Preenchendo este parâmetro serão consideradas somente as
        parcelas cadastradas com as mesmas condições de pagamento informadas no
        parâmetro."
      example:
        - AT
        - PM
      type: array
    ContactInsert:
      description: Objeto para inserção do contato
      properties:
        email:
          $ref: "#/components/schemas/RepresentativeEmail"
        msn:
          description: MSN do representante
          example: joaodasilva@msn.com
          type: string
        name:
          $ref: "#/components/schemas/RepresentativeName"
        phoneDdd:
          $ref: "#/components/schemas/PhoneDdd"
        phoneExtension:
          $ref: "#/components/schemas/PhoneExtension"
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
        skype:
          description: Skype do representante
          example: joaodasilva@skype.com
          type: string
      type: object
    ContactUpdate:
      description: Objeto para atualização do contato
      properties:
        email:
          $ref: "#/components/schemas/RepresentativeEmail"
        name:
          $ref: "#/components/schemas/RepresentativeName"
        phoneDdd:
          $ref: "#/components/schemas/PhoneDdd"
        phoneExtension:
          $ref: "#/components/schemas/PhoneExtension"
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
      type: object
    ContractualInterest:
      description: Juros contratuais.
      example: 0
      type: number
    CorrectedInstallmentValue:
      description: Valor corrigido da parcela.
      example: 5100.3
      type: number
    CorrectionBaseDate:
      description: Data base para correção. Formato ISO 8601 (yyyy-MM-dd).
      example: 2023-01-10T00:00:00Z
      format: date
      type: string
    CorrectionDate:
      description: Data de correção. Formato ISO 8601 (yyyy-MM-dd).
      example: 2023-03-01T00:00:00Z
      format: date
      type: string
    CostCenter:
      description: Centro de custo.
      properties:
        id:
          format: int64
          type: integer
        name:
          type: string
      type: object
    CostCenterFinancialAppropriationIdDescription:
      description: Código do centro de custo da apropriação financeira
    CostCenterName:
      description: Nome do centro de custo
      example: Centro de Custo Exemplo
      type: string
    CostEstimationSheetId:
      description: Código do item de orçamento
      example: CE01
      type: string
    CostEstimationSheetName:
      description: Nome do item de orçamento
      example: Item Orçamento Exemplo
      type: string
    CpfCnpjBeneficiary:
      description: CPF ou CNPJ do favorecido
      example: "12345678900"
      type: string
    Creditor:
      description: Objeto do credor
      example:
        active: true
        address:
          cityId: 1
          cityName: Florianópolis
          complement: Bloco 1
          neighborhood: Centro
          number: "321"
          streetName: Rua dos Acarás
          zipCode: "88050555"
        broker: N
        cnpj: 12.345.678/0001-90
        contacts:
          - ddd: "48"
            email: joaodasilva@gmail.com

    GerenciarContaResponse:
      description: Dados de um processo de abertura de conta Sienge Capital
      type: object
      properties:
        idProcessoAberturaConta:
          description: Identificador sequencial do processo de abertura de conta no Sienge
          type: integer
          format: int32
          example: 42
        cdEmpresa:
          description: Código da empresa no Sienge associada ao processo de abertura de
            conta
          type: integer
          format: int32
          example: 1
        nomeEmpresa:
          description: Razão social da empresa associada ao processo de abertura de conta
          type: string
          maxLength: 255
          example: Empresa Exemplo S.A.
        nuConta:
          description: Número da conta corrente aberta no Sienge Capital
          type: string
          maxLength: 20
          example: "12345"
        cnpj:
          description: CNPJ da conta corrente vinculada ao processo de abertura
          type: string
          maxLength: 14
          example: "12345678000195"
        situacao:
          description: Situação atual do processo de abertura de conta no ciclo de vida do
            Sienge Capital
          $ref: "#/components/schemas/SituacaoProcessoAberturaConta"
        horaCriacao:
          description: Data e hora de criação do processo de abertura de conta no formato
            dd/MM/yyyy HH:mm:ss
          type: string
          maxLength: 19
          example: 2024-01-15 10:30:00
        horaAtualizacao:
          description: Data e hora da última atualização do processo de abertura de conta
            no formato dd/MM/yyyy HH:mm:ss
          type: string
          maxLength: 19
          example: 2024-01-20 14:00:00
        possuiPendencias:
          description: Indica se o processo de abertura de conta possui pendências não
            resolvidas
          type: boolean
          example: false
      example:
        idProcessoAberturaConta: 42
        cdEmpresa: 1
        nomeEmpresa: Empresa Exemplo S.A.
        nuConta: "12345"
        cnpj: "12345678000195"
        situacao: APROVADO
        horaCriacao: 2024-01-15 10:30:00
        horaAtualizacao: 2024-01-20 14:00:00
        possuiPendencias: false

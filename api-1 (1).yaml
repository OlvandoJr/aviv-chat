    TrialBalance:
      description: Registro de balancete de verificação consolidado por conta
      required:
        - companyId
      type: object
      properties:
        companyId:
          type: integer
          description: Código empresa
          example: 1
        reducedCode:
          type: integer
          description: Código reduzido
          example: 100
        accountGroup:
          type: string
          description: Grupo da conta
          example: ASSETS
          enum:
            - ASSETS
            - LIABILITIES
            - INCOME
            - EXPENSES
            - TRANSITION
        account:
          type: string
          description: Código contábil da conta
          example: 1.01.03.01
        accountName:
          type: string
          description: Nome da conta
          example: Ativo circulante
        accountType:
          type: string
          description: Tipo da conta
          example: ANALYTICAL
          enum:
            - ANALYTICAL
            - SYNTHETIC
        debit:
          type: number
          description: Débitos no período
          example: 414.19
        credit:
          type: number
          description: Créditos no período
          example: 455.19
        operatingBalance:
          $ref: "#/components/schemas/Balance"
        balances:
          type: object
          properties:
            previous:
              $ref: "#/components/schemas/Balance"
            current:
              $ref: "#/components/schemas/Balance"
        thirdParties:
          $ref: "#/components/schemas/ThirdParties"
    Balance:
      description: Representa o saldo e o tipo (débito/crédito)
      type: object
      properties:
        value:
          type: number
          description: Valor do saldo
          example: 455.6
        type:
          type: string
          description: Tipo de saldo, podendo ser [D]ébito ou [C]rédito
          example: D
          enum:
            - D
            - C
    ThirdParties:
      description: Detalhamento de saldos por terceiros vinculados à conta
      type: object
      properties:
        name:
          type: string
          description: Nome do terceiro
          example: José Maria
        code:
          type: integer
          description: Código do terceiro
          example: 50
        debit:
          type: number
          description: Débito no período
          example: 120.55
        credit:
          type: number
          description: Crédito no período
          example: 80.1
        previousCredit:
          type: object
          description: Valor saldo anterior a crédito
          allOf:
            - $ref: "#/components/schemas/Balance"
        previousDebit:
          type: object
          description: Valor saldo anterior a débito
          allOf:
            - $ref: "#/components/schemas/Balance"
    TrialBalancePaginationResult:
      description: Resultado paginado da consulta do balancete de verificação
      required:
        - resultSetMetadata
        - results
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de contas retornados como resultado da pesquisa
          items:
            $ref: "#/components/schemas/TrialBalance"
          example:
            - companyId: 1
              reducedCode: 100
              accountGroup: ASSETS
              account: 1.01.03.01
              accountName: Ativo circulante
              accountType: ANALYTICAL
              debit: 414.19
              credit: 455.19
              operatingBalance:
                value: 41
                type: C
              balances:
                previous:
                  value: 1000
                  type: D
                current:
                  value: 1041
                  type: C
              thirdParties:
                name: José Maria
                code: 50
                debit: 120.55
                credit: 80.1
                previousCredit:
                  value: 500
                  type: C
                previousDebit:
                  value: 200
                  type: D
    UnitBooking:
      description: Objeto utilizado para reservar uma unidade.
      required:
        - brokerId
        - enterpriseId
        - unitId
      type: object
      properties:
        enterpriseId:
          type: integer
          description: Código do empreendimento da unidade a ser reservada.
          format: int32
          example: 123
        unitId:
          type: integer
          description: Código da unidade que será reservada. Esta unidade deve pertencer
            ao empreendimento da reserva.
          format: int32
          example: 456
        brokerId:
          type: integer
          description: Código do corretor a ser vinculado à reserva.
          format: int32
          example: 789
        customerId:
          type: integer
          description: Código do cliente que está reservando a unidade. Caso o parâmetro
            344 do Sienge esteja ativo, este campo torna-se obrigatório.
          format: int32
          example: 1011
        validityDate:
          type: string
          description: Data de validade da reserva. Caso não informada, será considerado
            os parâmetros 449 (dias de reserva) e 1057 (dias úteis) do Sienge
            para o cálculo da data. Formato ISO 8601 - yyyy-MM-dd.
          format: date
          example: 2020-01-01T00:00:00.000Z
        note:
          maxLength: 1000
          type: string
          description: Observações referentes à reserva.
          pattern: .+
          example: Cliente solicitou reserva para visita em 10/10/2025.

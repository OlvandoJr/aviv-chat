    ItemOrcamentoDTO:
      description: Dados de um item de orçamento para importação no Sienge
      type: object
      example:
        codigoIntegracao: ITEM-1
        codigoReferencia: 01.001.001.001
        descricao: Serviço 1
        nivel: SERVICO
        codigoIntegracaoServico: SERVICO-1234
        quantidade: 10.1234
      required:
        - codigoIntegracao
        - codigoReferencia
        - descricao
        - nivel
        - codigoIntegracaoServico
        - quantidade
      properties:
        codigoIntegracao:
          allOf:
            - $ref: "#/components/schemas/IntegrationCode"
            - description: Código do item do orçamento.
          example: ITEM-1
        codigoReferencia:
          allOf:
            - $ref: "#/components/schemas/IntegrationCode"
            - description: Código da referência do item do orçamento.
          example: 01.001.001.001
        descricao:
          allOf:
            - $ref: "#/components/schemas/Description"
            - description: Descrição do item do orçamento.
          example: Serviço 1
        nivel:
          allOf:
            - $ref: "#/components/schemas/BudgetLevelEnum"
            - description: |-
                Nível do item na planilha:




                  - CELULA_CONSTRUTIVA: Célula Construtiva
                  - ETAPA: Etapa
                  - SUBETAPA: Subetapa
                  - SERVICO: Serviço
          example: SERVICO
        codigoTabelaServico:
          allOf:
            - $ref: "#/components/schemas/TableCode"
            - description: Código da tabela do serviço no Sienge. Será nulo quando o serviço
                não for do Sienge.
          example: 123
        codigoIntegracaoServico:
          allOf:
            - $ref: "#/components/schemas/IntegrationCode"
            - description: Código integração do serviço do item da composição. Quando for
                serviço Sienge será o código no Sienge. Valor nulo para demais
                níveis.
          example: SERVICO-1234
        quantidade:
          allOf:
            - $ref: "#/components/schemas/Quantity"
            - description: Quantidade do serviço. Máximo 15 dígitos inteiros e precisão de 4
                casas decimais. Valor nulo para demais níveis.
          example: 10.1234
    DocumentIdentification:
      type: object
      description: Documento
      properties:
        id:
          type: integer
          description: Código do documento.
          format: int32
          example: 1
        name:
          $ref: "#/components/schemas/DocumentIdentificationName"
      example:
        id: 0
        name: string
    EmailCurrentDebitBalanceFilter:
      type: object

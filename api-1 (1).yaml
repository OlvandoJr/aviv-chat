        expectedDeliveryDate:
          type: string
          description: >
            Data de previsão de entrega. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25. Este é um campo novo que passará a ser obrigatório.
          example: 1990-12-25T00:00:00.000Z
        keysDeliveredAt:
          type: string
          example: 1990-12-25T00:00:00.000Z
          description: >
            Data de entrega de chaves. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25.

            Este campo era usado como data de previsão de entrega e passará a
            ser utilizado para a data de entrega de chaves.

            Caso o json contenha apenas este campo, continuará sendo preenchido
            como data de previsão de entrega, não preenchendo a data de entrega
            de chaves.

            A data informada neste campo será preenchida como data de entrega de
            chaves, apenas quando o campo 'expectedDeliveryDate' estiver
            preenchido.

            Este comportamento foi adotado por se tratar de um campo obrigatório
            no cadastro de contrato.'
        accountingDate:
          type: string
          description: Data contábil. Formato YYYY-MM-DD. Exemplo -> 1990-12-25.
          example: 1990-12-25T00:00:00.000Z
        readjustAfterOf:
          type: string
          description: Corrigir parcelas a partir. Informar quando o campo
            'correctionType' for 'A' .Formato YYYY-MM-DD. Exemplo -> 1990-12-25.
          example: 1990-12-25T00:00:00.000Z

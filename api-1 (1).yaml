          description: E-mail do destinatário - <b>preenchimento obrigatório</b> (pode
            conter mais de um e-mail se for separado por ponto-e-virgula ';')
          example: exemplo@email.com
        subject:
          type: string
          description: Assunto do e-mail.
          example: Relatório de Saldo Devedor Presente
        message:
          type: string
          description: Texto do corpo do e-mail (pode ser usada a tag HTML '<_br_>' para
            quebra de linhas).
          example: Exemplo de corpo de email

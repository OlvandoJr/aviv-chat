                $ref: "#/components/schemas/BuildingAppropriationDto"
            attended:
              type: array
              description: Apropriações atendidas são compostas por notas fiscais de compra e
                medições registradas. Os retornos serão em conformidade com a
                regra de negócio que já existe, conforme "Relatório de
                Apropriações de Insumos".
              items:
                $ref: "#/components/schemas/BuildingAppropriationDtoNF"
          description: Apropriações de Obra do Insumo.
    NoteDto:
      type: object
      description: Representa os registros de apropriações de recursos por meio de
        notas fiscais, incluindo informações sobre quantidade, valor, data e
        documentos relacionados, permitindo o rastreamento e controle das
        entradas efetivas de materiais na obra
      properties:
        description:
          type: string
          description: Descrição
          example: Observação teste
    MovementUnitDto:
      type: object
      description: Representa uma unidade de movimentação para recursos de construção,
        incluindo seu símbolo, descrição e fatores de conversão para outras
        unidades de medida, permitindo o controle preciso do estoque e da
        utilização dos materiais
      properties:
        unitOfMeasureSymbol:
          type: string
          description: Unidade de medida.
          example: sc
        unitOfMeasureDescription:
          type: string
          description: Descrição da unidade de medida.
          example: Saca
        conversionFactor:
          type: number
          description: Fator de conversão.
          example: 1
        isDefault:
          type: boolean
          description: Unidade medida padrão
          example: true
        isActive:
          type: boolean
          description: Situação da unidade de medida.
          example: true
    InstallmentDto:
      type: object
      description: Representa as condições de pagamento parcelado para recursos de
        construção, incluindo o prazo em dias e o percentual de cada parcela do
        desembolso financeiro
      properties:
        disbursementDays:
          type: integer
          description: Quantidade de dias.
          example: 30
        disbursementPercent:
          type: number
          description: percentual de desembolso.
          example: 50
    DisbursementDto:
      type: object
      description: Define o fluxo financeiro mensal projetado para recursos de
        construção, calculado com base nos cronogramas de execução e
        planejamento da obra
      properties:
        year:
          $ref: "#/components/schemas/DisbursementYear"
        month:
          $ref: "#/components/schemas/DisbursementMonth"
        value:
          $ref: "#/components/schemas/DisbursementValue"
        quantity:
          type: number
          description: Quantidade do Desembolso
          example: 2
    CostEstimateResourceDto:
      type: object
      description: Representa um item de orçamento associado a um recurso de
        construção, detalhando sua localização na estrutura organizacional da
        obra (EDT), quantidades, valores e identificação da unidade construtiva
      properties:
        buildingUnitId:
          type: integer
          description: Identificador único da unidade construtiva, utilizado para
            referenciar a estrutura física específica dentro do projeto.
          example: 1
        buildingUnitName:
          $ref: "#/components/schemas/BuildingUnitName"
        wbsCode:
          $ref: "#/components/schemas/WbsCode"
        description:
          $ref: "#/components/schemas/CostEstimationItemDescription"
        sheetItemId:
          $ref: "#/components/schemas/SheetItemId"
        totalPrice:
          type: number
          description: Preço total calculo do insumo para o item de orçamento, com
            precisão de 2 casas.
          example: 1800.5
        quantity:
          type: number
          description: Quantidade total orçada do insumo para o item de orçamento, com
            precisão de 4 casas decimais.
          example: 560.3205
    BuildingAppropriationDto:
      type: object
      description: Representa o registro de apropriações e alocações de recursos em
        uma obra, incluindo detalhes sobre documentação, valores, quantidades e
        sua vinculação com itens do orçamento e unidades construtivas
      properties:
        documentLabel:
          type: string
          description: Código do Documento
          example: CT/0001
        date:
          type: string
          description: Data de Emissão do Título para Apropriações de Pedido, Contratos e
            Notas Fiscais. Para Medições é retornado a Data da Medição.
          example: 2023-01-01
        costEstimationItemReference:
          type: string
          description: Código de referência do item de orçamento na EDT (Estrutura de
            Decomposição do Trabalho)
          example: 00.000.000.001
        costEstimationItemDescription:
          type: string
          description: Descrição do Item do Orçamento
          example: Alvenaria de Tijolo Furado
        buildingUnitId:
          type: integer
          description: Identificador único da unidade construtiva da obra.
          example: 1
        buildingUnitName:
          type: string
          description: Identificação da Unidade Construtiva.
          example: Observação teste
        quantity:
          type: number
          description: Quantidade Apropriada.
          example: 2000.1234
        percentage:
          type: number
          description: Percentual Apropriado.
          example: 25
        value:
          type: number
          description: Valor Apropriado.
          example: 2500
    BuildingAppropriationDtoNF:

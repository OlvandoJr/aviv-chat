    RemadeInstallmentParameter:
      type: object
      description: Corpo da requisição para realizar o reparcelamento
      properties:
        billReceivableId:
          type: integer
          description: Número do Título à ser reparcelado.
          format: int32
          example: 12345
        remadeDate:
          type: string
          description: Data do reparcelamento. Formato yyyy-MM-dd. Exemplo -> 1990-12-25.
          example: 2025-06-20
        calculationDate:
          type: string
          description: Correção até. Formato yyyy-MM-dd. Exemplo -> 1990-12-25.
          example: 2025-06-21
        installments:
          type: string
          description: Id das parcelas que serão reparceladas.
          example: 1/2/3/4
        builtInterestRule:
          type: string
          description: "Indica qual valor da parcela com juros price deve ser usado no
            momento do reparcelamento: A - Valor Amortizado (sem juros
            embutido), I - Valor Integral (com juros embutido), V - Valor
            Presente"
          enum:
            - A
            - I
            - V
          example: V
        interestPresentValue:
          type: number
          description: Valor do Juros presente, caso o atributo <code>builtInterestRule
            </code> enviado como "V"
          example: 1
        differenceType:
          type: string
          description: "Tipo da diferença caso o valor de parcelas geradas for maior que o
            valor reparcelado: A - Aditivo, J - Juros, C - Correção"
          enum:
            - A
            - J
            - C
          example: C
        operationType:
          type: string
          description: "Tipo de operação para o reparcelamento: R - Remade (processo
            padrão com geração de novas parcelas), D - Delete (exclusão de
            parcelas sem geração de novas)"
          enum:
            - R
            - D
          example: R
        remadeType:
          type: string
          description: "Tipo de reparcelamento desejado: R - Reparcelamento, F - Alteração
            de financiamento, A - Acordo financeiro"
          default: R
          enum:
            - R
            - F
            - A
          example: R
        remadeDescription:
          type: string
          description: Campo de texto para detalhamento sobre o reparcelamento.
          example: Reparcelamento de exemplo
        confirmLastReadjustmentDateChange:
          type: string
          description: Confirmação para alterar a data do último reajuste. <br> Requerido
            quando o parâmetro 291 estiver ativo e o título possuir correção
            anual. <br> Informar:<br> 'S' - Sim, alterar a data <br> 'N' - Não
            alterar a data
          default: N
          enum:
            - S
            - N
          example: N
        paymentConditions:
          type: array
          description: Lista de Condição de Pagamento.
          items:
            $ref: "#/components/schemas/RemadeInstallmentsPaymentConditions"
          example:
            - conditionTypeId: PM
              totalValue: 1000
              installmentsNumber: 5
              firstPayment: 2025-07-01
              bearerId: 789
              matchMaturities: S
              indexerId: 55
              baseDate: 2025-06-01
              interestType: P
              interestPercentage: 1.5
              monthsGracePeriod: 2
              baseDateInterest: 2025-06-01
    RemadeInstallmentsPaymentConditions:
      type: object
      properties:
        conditionTypeId:
          type: string
          description: Id da condição de pagamento
          example: PM
        totalValue:
          type: number
          description: Total do valor do reparcelamento.
        installmentsNumber:
          type: integer
          description: Quantidade de parcelas a serem geradas pelo
            <code>Reparcelamento</code>
        firstPayment:
          type: string
          description: Data do primeiro vencimento das parcelas geradas pelo reparcelamento.
        bearerId:
          allOf:
            - $ref: "#/components/schemas/BearerIdDescription"
            - type: integer
        matchMaturities:
          type: string
          description: "Vencimentos podem coincidir com outras parcelas: S - Sim, N - Não"
          enum:
            - S
            - N
        indexerId:
          type: integer
          description: Código do Indexador.
        baseDate:
          type: string
          description: Data base de cálculo do indexador.
        interestType:
          type: string
          description: "Tipo do juros aplicado: N - Nenhum, P - Price, A - S.A.C, S -
            Simples, C - Composto, F - Fixo"
          enum:
            - N
            - P
            - A
            - S
            - C
            - F
        interestPercentage:
          type: number
          description: Percentual ao período.
        monthsGracePeriod:
          type: integer
          description: Meses de carência.
        baseDateInterest:
          type: string
          description: Data base para juros. Formato yyyy-MM-dd. Exemplo -> 1990-12-25.
      description: Condição de Pagamento

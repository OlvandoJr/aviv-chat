  /v1/purchase-quotations/all/negotiations:
    get:
      operationId: getPurchaseQuotationsAllNegotiations
      x-original-file: purchase-quotations-v1.yaml
      summary: Lista cotações com negociações
      x-audience:
        - public
      tags:
        - Cotações de Preço
      description: Busca todas as cotações com negociações (REST)
      parameters:
        - name: quotationNumber
          required: false
          in: query
          description: >-
            Código da cotação


            Obs.: Caso seja informado o parametro <code>quotationNumber</code>
            não devem ser informados os campos <code>startDate</code> e
            <code>endDate</code>.
          schema:
            type: integer
          example: 12
        - name: supplierId
          required: false
          in: query
          description: Código do fornecedor da negociação
          schema:
            type: integer
          example: 1
        - name: buyerId
          required: false
          in: query
          description: Código do comprador da negociação
          schema:
            type: string
          example: USER
        - $ref: "#/components/parameters/StartDateQuery"
          description: Data de inicio da busca. Formato ISO 8601 yyyy-MM-dd. *Parametro
            obrigatório quando quotationNumber não for informado.
        - $ref: "#/components/parameters/EndDateQuery"
          description: Data de fim da busca. Formato ISO 8601 yyyy-MM-dd. *Parametro
            obrigatório quando quotationNumber não for informado.
        - name: authorized
          required: false
          in: query
          description: Filtro para negociações autorizadas ou não autorizadas
          schema:
            type: boolean
          example: true
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - REGISTERED
              - NEGOTIATION_IN_PROGRESS
              - NEGOTIATION_CLOSED
              - ACQUISITION_FORWARDED
              - SENT_FOR_SERVICE
          description: |-
            Status da cotação de preços.




              * REGISTERED - Registrada,
              * NEGOTIATION_IN_PROGRESS - Negociação em andamento,
              * NEGOTIATION_CLOSED - Negociação finalizada,
              * ACQUISITION_FORWARDED - Aquisição encaminhada,
              * SENT_FOR_SERVICE - Enviada para serviço
          example: REGISTERED
        - name: consistency
          required: false
          in: query
          schema:
            type: string
            enum:
              - IN_INCLUSION
              - CONSISTENT
              - INCONSISTENT
          description: |-
            Status da consistência da cotação de preços.




              * IN_INCLUSION - Em inclusão,
              * CONSISTENT - Consistente,
              * INCONSISTENT - Inconsistente
          example: CONSISTENT
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Consulta de cotações bem sucedida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponseOfPurchaseQuotationWithNegotiation"
        "400":

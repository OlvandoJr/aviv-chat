            Permuta"
          enum:
            - C
            - A
            - P
          example: C
        correctionType:
          type: string
          description: "Tipo de correção: A - Anual, M - Mensal"
          enum:
            - A
            - M
          example: A
        anualCorrectionType:
          type: string
          description: "Tipo de correção anual: A - Aniversário, F - Fixa, M - Mensal, P -
            Programada"
          enum:
            - A
            - F
            - M
            - P
          example: A
        generateResidue:
          type: string
          description: "Gerar resíduo: S - Sim, N - Não (Campo pode ser informado quando
            'correctionType' for 'A')"
          enum:
            - S
            - N
          example: S
        diluteResidue:
          type: string
          description: "Diluir valor do resíduo: S - Sim, N - Não (Campo pode ser
            informado quando 'correctionType' for 'A' e o campo
            'generateResidue' for 'S')"
          enum:
            - S
            - N

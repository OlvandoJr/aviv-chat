    CustomerSpouseDocument:
      required:
        - name
        - sex
      type: object
      description: Cônjuge do cliente.
      properties:
        cpf:
          type: string
          description: CPF do cônjuge. Formato NNNNNNNNNNN (somente números). Exemplo ->
            41833114030.
          example: "41833114030"
        name:
          maxLength: 80
          type: string
          description: Nome do cônjuge. Campo obrigatório.
          example: Maria Fernanda Souza
        email:
          maxLength: 40
          type: string
          description: E-mail do cônjuge do cliente.
          example: maria.fernanda@email.com
        sex:
          type: string
          description: |
            Sexo do cônjuge:
                * `F` - Feminino
                * `M` - Masculino
                * `A` - Anônimo
          enum:
            - F
            - M
            - A
          example: F
        foreigner:
          type: string
          description: |
            Indica se o cônjuge é estrangeiro ou não:
              * `S` - Sim
              * `N` - Não
          enum:
            - S
            - N
          example: N
        internationalId:
          type: string
          description: Identificação internacional do cônjuge.
          example: "123456"
        civilStatus:
          type: string
          description: Estado civil do cônjuge. Deve ser informada a descrição conforme
            cadastro de estados civis no Sienge.
          example: Casado
        birthDate:
          type: string
          description: Data de nascimento do cônjuge. Formato YYYY-MM-DD. Exemplo ->
            1990-12-31.
          example: 1990-12-31
        numberIdentityCard:
          type: string
          description: Número da identidade (RG) do cônjuge.
          example: "123456"
        issueDateIdentityCard:
          type: string
          description: Data de emissão identidade do cônjuge. Formato YYYY-MM-DD. Exemplo
            -> 1990-12-31.
          example: 1990-12-31
        profession:
          type: string
          description: Profissão do cônjuge. Deve ser informada a descrição conforme
            cadastro de profissôes no Sienge.
          example: Engenheiro
        nationality:
          maxLength: 40
          type: string
          description: Nacionalidade do cônjuge.
          example: Brasil
        birthPlace:
          maxLength: 40
          type: string
          description: Naturalidade do cônjuge.
          example: Brasil
        fatherName:
          maxLength: 40
          type: string
          description: Filiação 1.
          example: João Silva
        motherName:
          maxLength: 40
          type: string
          description: Filiação 2.
          example: Maria Silva
        cellphoneNumber:
          maxLength: 12
          type: string
          description: Número do telefone celular do cônjuge. Formato DDDNNNNNNNNN.
            Exemplo -> 048912345678
          example: "048912345678"
        businessPhone:
          maxLength: 12
          type: string
          description: Número do telefone comercial do cônjuge. Formato DDDNNNNNNNNN.
            Exemplo -> 048912345678
          example: "048912345678"
        company:
          maxLength: 80
          type: string
          description: Empresa do cônjuge.
          example: Empresa de Exemplo
        addresses:
          type: array
          description: Endereço do Cônjuge
          items:
            type: object
            properties:
              city:
                type: string
                description: Nome do munícipio do endereço do cônjuge. Deve ser informada o nome
                  conforme cadastro de munícipio no Sienge.
                example: Munícipio de Exemplo
              complement:
                maxLength: 40
                type: string
                description: Complemento do endereço do cônjuge.
                example: Complemento de Exemplo
              neighborhood:
                maxLength: 40
                type: string
                description: Bairro do endereço do cônjuge.
                example: Bairro de Exemplo
              number:
                maxLength: 10
                type: string
                description: Número do endereço do cônjuge.
                example: "123"
              streetName:
                maxLength: 40
                type: string
                description: Logradouro do endereço do cônjuge.
                example: Rua de Exemplo
              zipCode:
                maxLength: 8
                type: string
                description: Código de endereçamento postal (CEP) do endereço do cônjuge.
                  Informar somente números. Exemplo -> 88000123
                example: "88000123"
          example:
            - type: R
              streetName: Rua das Palmeiras
              number: "123"
              complement: Apto 45
              neighborhood: Centro
              cityId: 1001
              city: Florianópolis
              state: SC
              zipCode: "88000123"
      example:
        cpf: "41833114030"
        name: Maria Fernanda Souza
        email: maria.fernanda@email.com
        sex: F
        foreigner: N
        internationalId: "123456"
        civilStatus: Casado
        birthDate: 1982-07-20
        numberIdentityCard: "123456789"
        issueDateIdentityCard: 2022-01-01
        profession: Engenheiro
        nationality: Brasil
        birthPlace: Belo Horizonte
        fatherName: João Silva
        motherName: Maria Silva
        cellphoneNumber: "48999998888"
        businessPhone: "48999998888"
        company: Empresa Exemplo
        addresses:
          - city: Residencial
            complement: Apto 202
            neighborhood: Centro
            number: "100"
            streetName: Rua das Flores
            zipCode: "30123456"

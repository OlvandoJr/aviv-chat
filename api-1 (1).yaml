                value: 2500
    ProjectDto:
      description: Projeto associado à obra/centro de custo, utilizado para
        contextualizar os Itens de Orçamento retornados.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ProjectId"
        name:
          $ref: "#/components/schemas/ProjectName"
      example:
        id: 7
        name: Empreendimento Condomínio da Felicidade
    TaskDto:
      description: Tarefa do planejamento vinculada ao Item de Orçamento, com
        percentual representativo, valor e respectivos desembolsos ao longo do
        tempo.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TaskId"
        presentationId:
          $ref: "#/components/schemas/TaskPresentationId"
        description:
          description: Descrição da Tarefa
          type: string
          example: Colocação de rejunto
        percentage:
          description: Percentual representativo do item na tarefa
          type: number
          example: 50
        value:
          description: Valor da tarefa
          type: number
          example: 2500
        remainingDisbursments:
          description: Desembolsos restantes ou Desembolsos não vinculados no Período.
            Valor que não pôde ser associado a um mês de execução. Cenário pode
            acontecer quando o intervalo de entrega do insumo é maior do que o
            período de planejamento que ele está vinculado. Pode ocorrer também
            quando pula um mês que tem execução
          type: number
          example: 0
        Disbursments:
          $ref: "#/components/schemas/Disbursments"
      example:
        id: 10
        presentationId: 1
        description: Colocação de rejunto
        percentage: 50
        value: 2500
        remainingDisbursments: 0
        Disbursments:
          - year: 2022
            month: 10
            value: 2500
    Disbursments:
      type: array
      description: Relação de desembolsos associados à tarefa. Cada item possui o ano,
        mês e valor do desembolso. O cálculo de Desembolso vai considerar
        percentuais de execução dos serviços. Não serão apresentadas informações
        de desembolso para Tarefas vinculadas à Itens do Orçamento com preço
        informado.
      items:
        $ref: "#/components/schemas/Disburment"
      example:
        - year: 2022
          month: 10
          value: 2500
    Disburment:
      description: Parcela de desembolso associada a uma tarefa, identificada por ano,
        mês e valor.
      type: object
      properties:
        year:
          $ref: "#/components/schemas/DisbursementYear"
        month:
          $ref: "#/components/schemas/DisbursementMonth"
        value:
          $ref: "#/components/schemas/DisbursementValue"
      example:
        year: 2022
        month: 10
        value: 2500
    ResponseBulkDataBuildingResource:
      type: object
      description: Resposta contendo a lista de insumos associados a uma obra com seus
        respectivos detalhes, incluindo preços, categorias e apropriações
      properties:
        data:
          type: array
          example: []
          items:
            $ref: "#/components/schemas/BuildingResourceDto"
    BuildingResourceDto:
      type: object
      description: Representa um insumo de construção associado a uma obra específica,
        incluindo seus detalhes técnicos, características comerciais,
        informações de estoque e aspectos financeiros
      properties:
        id:
          type: integer
          description: Código do Insumo.
          example: 1
        buildingId:
          type: integer
          description: Código da Obra.
          example: 7
        buildingName:
          type: string
          description: Nome da Obra.
          example: Condomínio da Felicidade
        description:
          type: string
          description: Descrição do Insumo.
          example: Cimento
        unitOfMeasure:
          type: string
          description: Unidade de Medida.
          example: kg
        unitPrice:
          type: number
          description: Preço Unitário, com precisão de 4 casas decimais.
          example: 40.1236
        priceDate:
          type: string
          description: Data do preço.
          example: 2022-01-01
        priceCategory:
          type: string
          description: Tipo de preço. [CALCULATED, INFORMED_BY_UNIT_PRICE, COMPOSITE,
            INFORMED_BY_HOUR].
          example: INFORMED_BY_UNIT_PRICE
        resourceCode:
          type: string
          description: Código auxiliar.
          example: MA001
        category:
          type: string
          description: Tipo do Insumo [EQUIPMENT, LABOR, MATERIAL, OTHER, OFFICE_SUPPLY,
            FUELS_AND_LUBRICANTS, MAINTENANCE_MATERIAL].
          example: MATERIAL
        resourceGroup:
          type: string
          description: Descrição Grupo de Insumo.
          example: Materiais de Consumo
        synonym:
          type: string
          description: Sinônimos do Insumo.
          example: cimento, massa, concreto
        financialCategory:
          type: string
          description: Descrição da Conta Financeira.
          example: Orçamento empresarial
        taxClassification:
          type: string
          description: Classificação Fiscal.
          example: CM001
        productTax:
          type: string
          description: Descrição do Produto Fiscal.
          example: Argamassa Pré-fabricada de Cimento
        isActive:
          type: boolean
          description: Situação do Insumo (Ativo = true, Inativo = false).
          example: true
        detailId:
          type: integer
          description: Id do Detalhe.
          example: 1
        detailDescription:
          type: string
          description: Descrição do Detalhe.
          example: CP II E 32
        trademarkId:
          type: integer
          description: Id da Marca.
          example: 1
        trademarkDescription:
          type: string
          description: Descrição da Marca.
          example: ACME
        minimumStock:
          type: number
          description: Estoque mínimo.
          example: 20
        maximumStock:
          type: number
          description: Estoque máximo.
          example: 200
        estimatedDeliveryTime:
          type: integer
          description: Tempo de entrega estimado em dias.
          example: 2
        hasServiceFeature:
          type: boolean
          description: Insumo com característica de Serviço para Desembolso.
          example: true
        deliveryInterval:
          type: integer
          description: Intervalo de entregas em dias para Desembolso.
          example: 15
        installments:
          type: array
          description: Parcelas.
          items:
            $ref: "#/components/schemas/InstallmentDto"
        movementUnits:
          type: array
          description: Unidades de Movimento.
          items:
            $ref: "#/components/schemas/MovementUnitDto"
        notes:
          type: array
          description: Observações do Insumo.
          items:
            $ref: "#/components/schemas/NoteDto"
        buildingCostEstimationItems:
          type: array
          description: Itens do Orçamento onde o Insumo está contido.
          items:
            $ref: "#/components/schemas/CostEstimateResourceDto"
        disbursements:
          type: array
          description: Relação de desembolsos do insumo. Cada item possui o ano, mês,
            valor e quantidade do desembolso. O cálculo de desembolso vai
            considerar percentuais de execução dos serviços.  Quando a definição
            do custo da tarefa no planejamento estiver incompleta, valor e
            quantidade dos desembolsos podem ser menores que as que constam no
            orçamento. A diferença também pode ser observada no "Relatório de
            Composições dos Custos da Tarefa".
          items:
            $ref: "#/components/schemas/DisbursementDto"
        remainingDisbursement:
          type: number
          description: Desembolso restante ou não vinculado no período. Valor que não pôde
            ser associado a um mês de execução. Cenário pode acontecer quando o
            intervalo de entrega do insumo é maior do que o período de
            planejamento que ele está vinculado. Pode ocorrer também quando pula
            um mês que tem execução. Valor monetário.
          example: 0
        buildingAppropriations:
          type: object
          properties:
            pending:
              type: array
              description: Apropriações pendentes são compostas por saldos de pedidos de
                compras e saldos de contratos do suprimentos. Os retornos serão
                em conformidade com a regra de negócio que já existe, conforme
                "Relatório de Apropriações de Insumos".

    GetStockMovementDTO:
      type: object
      description: Dados da movimentação de estoque
      properties:
        id:
          description: Identificador único e imutável do movimento de estoque.
          type: integer
          example: 1
        documentId:
          description: Código do documento do movimento de estoque.
          type: string
          example: DOC
        movementNumber:
          description: Código do movimento de estoque.
          type: string
          example: "10"
        series:
          description: Número de série da nota fiscal, quando o movimento de estoque for
            oriúndo de nota fiscal.
          type: string
          example: "567"
        movementTypeId:
          description: Código do tipo de movimento de estoque
          type: integer
          example: 1
        movementTypeDescription:
          description: Descrição do tipo de movimento de estoque
          type: string
          example: COMPRA
        inputOutput:
          description: Informa se o movimento de estoque é uma entrada ou uma saída de
            estoque.
          type: string
          example: INPUT
        movementDate:
          description: Data do movimento de estoque no formato YYYY-MM-DD de acordo com a
            norma ISO 8601.
          type: string
          example: 2024-01-01
        costCenterId:
          description: Código do centro de custo do movimento de estoque.
          type: integer
          example: 1001
        buildingId:
          description: Código identificador da obra relacionada ao movimento de estoque.
          type: integer
          example: 100101
        resourceId:
          description: Código do insumo do movimento de estoque.
          type: integer
          example: 20
        resourceDescription:
          description: Descrição do insumo do movimento de estoque.
          type: string
          example: Insumo teste
        detailId:
          description: Código do detalhe do insumo do movimento de estoque.
          type: integer

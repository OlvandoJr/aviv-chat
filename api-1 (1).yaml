              reservationDate: 2020-04-28
              movementType:
                id: 3
                description: Transferência
              sourceCostCenter:
                id: 1
                description: Taj Mahal
              destinationCostCenter:
                id: 6
                description: Torre Eifel
              status: PENDING
              notes: Lorem ipsum dolor sit amet.
              createdBy: JOAO

          items:
            $ref: "#/components/schemas/PurchaseRequestItem"
          example:
            - purchaseRequestId: 19
              itemNumber: 1
              productId: 1001
              productDescription: Descrição do insumo
              detailId: 2
              detailDescription: Descrição do detalhe do insumo.
              trademarkId: 3
              trademarkDescription: Descrição do código da marca
              quantity: 15
              unitySymbol: un
              notes: Descrição do item
              authorized: true
              disapproved: false
              competenceLevel: 1
              estimatedDeliveryTime: 5
        links:
          $ref: "#/components/schemas/Links"
    PurchaseRequestItem:
      description: Itens da solicitação de compra retornados com sucesso
      type: object
      readOnly: true
      properties:
        purchaseRequestId:
          type: integer
          format: int32
          example: 19
          description: Código da solicitação
        itemNumber:
          type: integer
          format: int32
          example: 19
          description: Número do item do insumo na lista da solicitação
        productId:
          type: integer
          format: int32
          example: 1001
          description: Código do insumo do item de solicitação
        productDescription:
          type: string
          example: Descrição do insumo
          description: Descrição do insumo com restrição de 300 caracteres.
        detailId:
          type: integer
          format: int32
          example: 2
          description: Código do detalhe
        detailDescription:
          type: string
          example: Descrição do detalhe do insumo.
          description: Descrição do detalhe do insumo com restrição de 4000 caracteres.
        trademarkId:
          type: integer
          format: int32
          example: 3
          description: Código da marca
        trademarkDescription:
          type: string
          example: Descrição do código da marca
          description: Descrição do código da marca com restrição de 50 caracteres.
        quantity:
          type: number
          format: double
          example: 15
          description: Quantidade do item de solicitação de compra
        unitySymbol:
          type: string
          example: un
          description: Unidade de medida
        notes:
          type: string
          example: Descrição do item
          description: Observação do item de solicitação com restrição de 4000 caracteres.
        authorized:
          type: boolean
          example: true
          description: Retornará verdadeiro se item de solicitação de compra estiver
            autorizado, caso contrário retornará falso.
        disapproved:
          type: boolean
          example: false
          description: Retornará verdadeiro se item de solicitação de compra estiver
            reprovado, caso contrário retornará falso.
        competenceLevel:
          type: integer
          format: int32
          example: 0
          description: "Nível da alçada de autorização do item de solicitação, retornando
            os seguintes valores: '0' quando não possuir autorização em nenhuma
            alçada. '1' quando estiver autorizado em primeira alçada. '2' quando
            estiver autorizado em segunda alçada. Vazio quando não estiver em
            processo de autorização."
        estimatedDeliveryTime:
          type: integer
          format: int32
          example: 5
          description: Tempo de entrega estimado do insumo.
        disapprovalReason:
          type: integer
          example: 2
          description: 'Valor que represente os motivos de desautorização do insumo na
            solicitação conforme a seguir: - "0" quando estiver desautorizado
            apenas pelo motivo "usuário que cadastrou o insumo não tem permissão
            para gerar solicitações de compra autorizadas"; - "1" quando estiver
            desautorizado apenas pelo motivo "usuário que cadastrou o insumo não
            tem permissão para solicitar insumos com quantidade acima da
            quantidade orçada"; - "2" quando estiver desautorizado pelos dois
            motivos acima; - Vazio quando não estiver em processo de autorização
            (sem motivo de desautorização).'
        tenantUrl:
          type: string
          description: URL correspondente ao recurso associado
          example: https://api.sienge.com.br/dev.local/sienge/public/api
        links:
          type: array
          description: Links de acessos para outros recursos
          items:
            type: object
            properties:
              rel:
                type: string
                description: Nome do recurso associado
                example: delivery-requirements
              href:
                type: string
                description: Endereço da URL para o recurso associado
                example: https://api.sienge.com.br/dev.local/sienge/public/api/v1/purchase-requests/19/items/1/delivery-requirements

      example:
        status: 0
        cancellationDate: 2018-01-31
        creditorTaxingRegime: 1
        entryDate: 2025-07-01
        serialNumber: "123"
        paymentType: 0
        branchOfficeId: 99
        operationTaxCode: "1101"

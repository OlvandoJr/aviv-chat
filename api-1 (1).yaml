  responses:
    "200":
      description: Requisição bem-sucedida, retorna um array com os insumos orçados.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GetResponseCostEstimateResources"
    "204":
      description: Não há dados para gerar o relatório com os parâmetros informados
    "400":
      content:
        application/json:
          example:
            clientMessage: A requisição contém dados inválidos ou incompletos.
            developerMessage: Parâmetro obrigatório ausente
            status: 400
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Problema na requisição
    "401":
      description: Problema na autenticação
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            status: "401"
            developerMessage: Erro na autenticação
            clientMessage: Ocorreu um erro na autenticação. Verifique suas credenciais,
              chave ou token de acesso.
    "403":
      description: Problema na autorização
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            status: "403"
            developerMessage: Ocorreu um erro na autorização
            clientMessage: Você tentou realizar uma operação para a qual não tem autorização.
    "404":
      content:
        application/json:
          example:
            clientMessage: O recurso que tentou acessar não existe.
            developerMessage: Recurso não encontrado
            status: 404
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Recurso não encontrado
    "415":
      content:
        application/json:
          example:
            clientMessage: Você tentou enviar um conteúdo cujo tipo não é suportado pela
              operação.
            developerMessage: Content-Type não suportado.
            status: 415
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Tipo de conteúdo não suportado.
    "422":
      content:
        application/json:
          example:
            clientMessage: Você tentou enviar dados que, embora sejam de um tipo suportado,
              possuem algum problema em sua estrutura.
            developerMessage: Unprocessable entity.
            status: 422
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Problema nos dados enviados
    "429":
      description: Consumo abusivo
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            status: "429"
            developerMessage: Violação do Rate Limit
            clientMessage: Você fez mais requisições do que o permitido. Espere um pouco e
              tente novamente.
    "500":
      content:
        application/json:
          example:
            clientMessage: Ocorreu um erro no servidor.
            developerMessage: Erro Interno
            status: 500
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Erro interno no servidor
    "503":
      content:
        application/json:
          example:
            clientMessage: Nossos serviços estão temporariamente indisponíveis. Tente
              novamente em alguns minutos.
            developerMessage: Servidor temporariamente indisponível.
            status: 503
          schema:
            $ref: "#/components/schemas/ErrorMessage"
      description: Servidor temporariamente indisponível
    PaymentInformationInserted:

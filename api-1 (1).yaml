              description: Incorporação
              status: LOCKED
            - id: 2
              description: Estrutura
              status: UNLOCKED
    GetResponseSheetItems:
      description: Envelope da resposta para a consulta dos itens de uma planilha do
        orçamento da obra. Inclui os metadados do conjunto de resultados e a
        lista de itens retornados para a planilha selecionada.
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:

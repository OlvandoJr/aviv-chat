        taxSituationServiceCode: "01"
        serviceTaxCode: "1001"
        natureServiceId: "1001"
        serviceExecutionDate: 2025-07-01
        pisCofinsCalculationType: 2
        pisCofinsCreditBaseId: 101
        freightType: 0

    PaymentConditionTypesDocumentResponse:
      type: object
      description: Objeto de resposta contendo os metadados e a lista de tipos de
        condição de pagamento encontrados.
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de tipos de condição de pagamento retornados como resultado
            da pesquisa.
          items:
            $ref: "#/components/schemas/PaymentConditionTypeDocument"
          example:
            - id: 1
              description: À Vista
              finalityType: Recursos Próprios
              interval: 30
              intervalType: M
              installmentsNumber: 1
              everMonthly: N
            - id: 2
              description: Parcelado
              finalityType: Financiamento
              interval: 30
              intervalType: M
              installmentsNumber: 12
              everMonthly: S
      example:
        resultSetMetadata:
          count: 2
          offset: 0
          limit: 10
        results:
          - id: 1
            description: À Vista
            finalityType: Recursos Próprios
            interval: 30
            intervalType: M
            installmentsNumber: 1
            everMonthly: N
          - id: 2
            description: Parcelado
            finalityType: Financiamento
            interval: 30
            intervalType: M
            installmentsNumber: 12
            everMonthly: S
    PaymentConditionTypeDocument:
      type: object
      description: Detalhes de um tipo de condição de pagamento.
      properties:
        id:
          type: integer
          description: Código da condição de pagamento.
          format: int32
          example: 1
        description:
          type: string
          description: Descrição da condição de pagamento.
          example: À Vista
        finalityType:
          type: string
          description: |-
            Finalidade da condição de pagamento:
              - Recursos Próprios
              - Pro Soluto
              - Financiamento
              - Bonificação
          example: Recursos Próprios
        interval:
          type: integer
          description: Intervalo da condição de pagamento.
          format: int32
          example: 30
        intervalType:
          type: string
          description: |-
            Tipo de intervalo da condição de pagamento:
              - M: Mensal
              - S: Semanal
          enum:
            - M
            - S
          example: M
        installmentsNumber:
          type: integer
          description: Quantidade máxima de parcelas permitidas para a condição.
          format: int32
          example: 1
        everMonthly:
          type: string
          description: >-
            Indica que parcelas com este tipo de condição só sofrerão correção
            mensal
              - N: Não
              - S: Sim
          enum:
            - N
            - S
          example: S
      example:
        id: 1
        description: À Vista
        finalityType: Recursos Próprios
        interval: 30
        intervalType: M
        installmentsNumber: 1

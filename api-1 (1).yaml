          type: integer
          description: Percentual de comissão.
          format: int32
          example: 5
        value:
          type: number
          description: Valor da comissão.
          format: double
          example: 1000
        baseValue:
          type: integer
          description: Valor base da comissão.
          format: int32
          example: 18000

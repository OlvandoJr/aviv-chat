          type: array
          description: Lista de equipes de trabalho envolvidas nas atividades do dia,
            incluindo informações sobre mão de obra, funções e quantidade de
            profissionais alocados no canteiro de obras.
          example:
            - id: 5
              resourceId: 1
              description: Pedreiro
              quantity: 10
              crewTypeId: 9
              origin: type
              assignment: INDIRECT_LABOR
          items:
            $ref: "#/components/schemas/CrewDtoForResponse"
        equipments:
          type: array
          description: Lista de equipamentos utilizados na obra durante o dia, incluindo
            maquinários, ferramentas e veículos com suas respectivas quantidades
            e horas de operação registradas no diário.
          example:
            - id: 1
              resourceId: 10
              description: Betoneira
              quantity: 2
              equipmentTypeId: 1
              origin: resource
              status: OUT_OF_ORDER
          items:
            $ref: "#/components/schemas/EquipmentDtoForResponse"
    EventsDtoForPost:
      type: array
      description: Lista de Ocorrências do Diário de Obra. Deve conter pelo menos uma
        Ocorrência.
      items:
        $ref: "#/components/schemas/EventDto"
    EventsDtoForPut:
      type: array
      description: Registro de eventos significativos ocorridos na obra, como visitas
        técnicas, interferências externas, acidentes de trabalho ou outras
        situações relevantes que impactaram o andamento das atividades
        construtivas.
      items:
        $ref: "#/components/schemas/EventDtoForResponse"
    EventsDtoForResponse:
      type: object
      description: Lista de Ocorrências registradas no Diário de Obra, representando
        eventos ou fatos relevantes ocorridos durante o período do registro.
      properties:
        buildingId:
          type: number
          description: Identificador único numérico que referencia a obra associada ao
            diário, permitindo vincular os registros ao projeto específico
          example: 661
        constructionDailyId:
          type: number
          description: Identificador único do diário de obra ao qual os eventos estão
            associados, permitindo rastreabilidade dos registros no sistema
          example: 1
        events:
          type: array
          description: Registro de eventos significativos ocorridos durante a execução
            diária da obra, incluindo incidentes, visitas técnicas e outras
            ocorrências que impactam o andamento dos trabalhos.
          example:
            - id: 9
              description: Visita do fiscal da prefeitura
              eventTypeId: 1
              eventTypeDescription: Visitas
          items:
            $ref: "#/components/schemas/EventDtoForResponse"
    EventDtoForResponse:
      type: object
      description: Estrutura utilizada para retornar as ocorrências detalhadas
        registradas em um Diário de Obra, incluindo informações sobre cada
        evento relevante ocorrido durante o período do diário.
      properties:
        id:
          type: number
          description: Código da Ocorrência
          example: 9
        description:
          type: string
          description: Descrição da Ocorrência
          example: Visita do fiscal da prefeitura
        eventTypeId:
          type: number
          description: Código do tipo da Ocorrência
          example: 1
    EventDtoForGet:
      type: object
      description: Detalhamento da ocorrência registrada no Diário de Obra, incluindo
        informações relevantes sobre o evento ocorrido durante o período do
        diário.
      properties:
        id:
          type: number
          description: Identificador único numérico que representa a ocorrência específica
            registrada no diário de obra
          example: 9
        description:
          type: string
          description: Detalhamento textual do evento ou ocorrência registrada no diário
            de obra, como visitas técnicas, paralisações ou situações
            extraordinárias que impactaram as atividades do dia
          example: Visita do fiscal da prefeitura
        eventTypeId:
          type: number
          description: Identificador único do tipo de ocorrência registrada no diário de
            obra, utilizado para categorizar eventos como visitas técnicas,
            paralisações, acidentes ou outras situações relevantes
          example: 1
        eventTypeDescription:
          type: string
          description: Descrição do tipo da Ocorrência
          example: Visitas
    TasksDtoForPost:
      type: object
      description: Estrutura utilizada para detalhar uma ocorrência registrada no
        Diário de Obra, incluindo informações sobre o tipo de evento e sua
        descrição durante o período do registro.
      properties:
        plannedTasks:
          $ref: "#/components/schemas/plannedTasks"
        detachedTasks:
          $ref: "#/components/schemas/detachedTasks"
    TasksDtoForPut:
      type: object
      description: Estrutura de dados utilizada para o registro e atualização das
        tarefas planejadas e desvinculadas associadas a uma ocorrência do Diário
        de Obra, permitindo o controle detalhado das atividades realizadas ou
        previstas no período.
      properties:
        plannedTasks:
          $ref: "#/components/schemas/plannedTasksForPut"
        detachedTasks:
          $ref: "#/components/schemas/detachedTasksForPut"
    TaskDtoForResponse:
      type: object
      description: Atualizar as tarefas planejadas e desvinculadas associadas a um
        registro do Diário de Obra, permitindo modificar as atividades
        documentadas no período de execução da obra.
      properties:
        buildingId:
          type: number
          description: Identificador único da construção associada ao registro, utilizado
            para vincular as informações ao projeto específico
          example: 661
        constructionDailyId:
          type: number
          description: Identificador único do registro do Diário de Obra que contém as
            tarefas documentadas
          example: 1
        plannedTasks:
          type: array
          description: Lista de tarefas previamente planejadas no cronograma da obra que
            foram executadas e registradas no diário, incluindo identificadores,
            quantidades realizadas e observações sobre o andamento das
            atividades.
          example:
            - description: Morning
              startTime: 08:00
              finishTime: 12:00
              weatherCondition: Fine
          items:
            $ref: "#/components/schemas/PlannedTaskDtoForResponse"
        detachedTasks:
          type: array
          description: Conjunto de atividades não planejadas registradas no diário,
            incluindo trabalhos adicionais ou emergenciais executados durante o
            dia na obra, com seus respectivos detalhes técnicos e quantitativos.
          example:
            - id: 8
              description: Tarefa xyz
              notes: Tarefa será realizada pelos ajudantes...
              quantity: 9876.5432
              unitOfMeasure: m2
              siteId: 3
          items:
            $ref: "#/components/schemas/DetachedTaskDtoForResponse"
    PlannedTaskDtoForResponse:
      type: object
      description: Lista de tarefas planejadas associadas ao Diário de Obra, contendo
        detalhes sobre as atividades programadas para execução durante o período
        registrado.
      properties:
        id:
          type: number
          description: Código da Tarefa.
          example: 7
        buildingUnitId:
          type: integer
          description: Código da Unidade Construtiva.
          example: 1
        taskId:
          type: number
          description: Código identificador da Tarefa.
          example: 109
        notes:
          type: string
          description: Observação da Tarefa.
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number
          description: Quantidade referente a medição da tarefa.
          example: 1234567891234.5679
        supplierId:
          type: integer
          description: Código identificador do fornecedor da tarefa
          example: 2
        siteId:
          type: integer
          description: Código identificador do local da tarefa
          example: 3
    PlannedTaskDtoForGet:
      type: object
      description: Quantidade referente à medição da tarefa, com precisão máxima de 4
        casas decimais (decimal(13,4)).
      properties:
        id:
          type: number
          description: Identificador único da tarefa planejada no sistema.
          example: 7
        buildingUnitId:
          type: integer
          description: Identificador único que referencia a unidade específica dentro da
            construção onde a tarefa será executada, permitindo localização
            precisa do trabalho
          example: 1
        taskId:
          type: number
          description: Identificador único da tarefa no cronograma, que vincula as
            atividades executadas com o planejamento original da obra
          example: 109
        notes:
          type: string
          description: Campo opcional para registrar informações adicionais ou detalhes
            específicos sobre a execução da tarefa que não se enquadram nos
            demais campos estruturados
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number
          description: Valor numérico que representa o progresso ou volume da tarefa
            executada, essencial para o acompanhamento do avanço físico da obra
          example: 1234.5679
        unitOfMeasure:
          type: string
          description: Unidade de medida usada para a tarefa
          example: m2
        supplierId:
          type: integer
          description: Referência ao fornecedor responsável pela execução ou fornecimento
            de materiais para esta tarefa específica
          example: 2
        siteId:
          type: integer
          description: Referência ao local físico específico dentro da obra onde a tarefa
            será executada, permitindo o rastreamento preciso das atividades
          example: 3
    DetachedTaskDtoForResponse:
      type: object
      description: Tarefa avulsa no contexto de um Diário de Obra, contendo
        informações detalhadas sobre a descrição, quantidade, unidade de medida
        e local da tarefa registrada.
      properties:
        id:
          type: number
          description: Identificador único da tarefa avulsa, usado para referência e
            rastreamento desta atividade específica no diário de obra
          example: 8
        description:
          type: string
          description: Descrição da Tarefa.
          example: Tarefa xyz
        notes:
          type: string
          description: Campo para registro de observações específicas sobre a execução da
            tarefa, incluindo condições especiais, impedimentos ou ajustes
            necessários durante o trabalho
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number
          description: Quantidade referente a medição da Tarefa.
          example: 9876.5432
        unitOfMeasure:
          type: string
          description: Unidade de medida usada para a Tarefa.
          example: m2
        siteId:
          type: integer
          description: Referência ao local específico da obra onde a tarefa é realizada,
            facilitando o controle e monitoramento das atividades
          example: 3
    CrewsDtoForPost:
      type: array
      description: Lista de Equipes que trabalharão no Diário de Obra, contendo
        informações sobre os colaboradores, suas funções e horas trabalhadas no
        período registrado.
      items:
        $ref: "#/components/schemas/CrewDto"
    CrewsDtoForPut:
      type: array
      description: Código identificador do local onde a tarefa avulsa será executada,
        permitindo o rastreamento geográfico dentro da obra
      items:
        $ref: "#/components/schemas/CrewDtoForResponse"
    CrewsDtoForResponse:
      type: object
      description: Lista de equipes associadas ao Diário de Obra, incluindo detalhes
        sobre os trabalhadores e suas atividades para o registro diário.
      properties:
        buildingId:
          type: number
          description: Identificador único da obra onde as equipes estão alocadas para
            execução das atividades
          example: 661
        constructionDailyId:
          type: number
          description: Identificador numérico único do registro diário que documenta todas
            as atividades, equipes e ocorrências na obra
          example: 1
        crews:
          type: array
          description: Equipes do Diário de Obras
          example:
            - id: 5
              resourceId: 1
              description: Pedreiro
              quantity: 10
              crewTypeId: 9
              origin: type
              assignment: INDIRECT_LABOR
          items:
            $ref: "#/components/schemas/CrewDtoForResponse"
    CrewDtoForResponse:
      type: object
      description: Contém informações sobre as equipes associadas a um Diário de Obra,
        incluindo os identificadores da obra e do diário, bem como a lista
        detalhada das equipes de trabalho registradas no período.
      properties:
        id:
          type: number
          description: Código da Equipe
          example: 5
        resourceId:
          type: number
          description: Código do Insumo do tipo Mão de Obra (atributo category=LABOR na
            API Insumos do Orçamento da Obra -
            /building-cost-estimations/{building-id}/resources)
        quantity:
          type: number
          description: Quantidade utilizada do insumo Mão de Obra. Número inteiro,
            positivo e maior que zero.
          example: 10
        crewTypeId:
          type: number
          description: Código de Tipo Equipe
          example: 9
        origin:
          type: string
          description: Informa se a Equipe é vinculada a Tipo ou Insumo
          example: type
        assignment:
          $ref: "#/components/schemas/LaborAssignmentEnum"
    CrewDtoForGet:
      type: object
      description: Detalhamento das equipes associadas a um Diário de Obra, incluindo
        os identificadores da obra e do diário, bem como a lista detalhada das
        equipes de trabalho registradas no período.
      properties:
        id:
          type: number
          description: Identificador único que representa uma equipe específica no diário
            de obras
          example: 5
        resourceId:
          type: number
          description: Código do Insumo do tipo Mão de Obra (atributo category = LABOR na
            API Insumos do Orçamento da Obra -
            /building-cost-estimations/{building-id}/resources)
        description:
          type: string
          description: Descrição do insumo do tipo Mão de Obra (atributo category=LABOR)
          example: Pedreiro
        quantity:
          type: number
          description: Indica o número de trabalhadores desta equipe alocados nas
            atividades do diário de obra
          example: 10
        crewTypeId:
          type: number
          description: Identificador do tipo de equipe que classifica o grupo de trabalho,
            permitindo categorizar e organizar as equipes no diário de obra
          example: 9
        origin:
          type: string
          description: Informa se o Equipamento é vinculado a Tipo ou Insumo
          example: type
        assignment:
          type: string
          description: Indica o vínculo empregatício da equipe na obra, classificando como
            mão de obra direta, indireta ou terceirizada para fins de gestão e
            controle de custos
          example: INDIRECT_LABOR
    EquipmentsDtoForPost:
      type: array
      description: Lista de Equipamentos que serão utilizados no Diário de Obra,
        contendo informações sobre identificação, quantidade e status
        operacional dos equipamentos alocados para o período registrado.
      items:
        $ref: "#/components/schemas/EquipmentDto"
    EquipmentsDtoForPut:
      type: array
      description: Lista de Equipamentos do Diário de Obra
      items:
        $ref: "#/components/schemas/EquipmentDtoForResponse"
    EquipmentsDtoForResponse:
      type: object
      description: Lista de equipamentos que serão utilizados no Diário de Obra,
        contendo detalhes sobre tipo, quantidade e status operacional dos
        equipamentos alocados para as atividades do período registrado.
      properties:
        buildingId:
          type: number
          description: Identificador único da obra onde os diários de obra são registrados
          example: 661
        constructionDailyId:
          type: number
          description: Identificador único do registro diário que associa equipes,
            equipamentos e atividades realizadas em um determinado dia na obra
          example: 1
        equipments:
          type: array
          description: Equipamentos do Diário de Obras
          example:
            - id: 1
              resourceId: 10
              description: Betoneira
              quantity: 2
              equipmentTypeId: 1
              origin: resource
              status: OUT_OF_ORDER
          items:
            $ref: "#/components/schemas/EquipmentDtoForResponse"
    EquipmentDtoForResponse:
      type: object
      description: Contém informações sobre os equipamentos associados a um Diário de
        Obra, incluindo os identificadores da obra e do diário, bem como a lista
        detalhada dos equipamentos utilizados no período.
      properties:
        id:
          type: number
          description: Código do Equipamento
          example: 1
        resourceId:
          type: number
          description: Código do Insumo do tipo Equipamento (atributo category=EQUIPAMENT
            na API Insumos do Orçamento da Obra -
            /building-cost-estimations/{building-id}/resources)
          example: 10
        quantity:
          type: number
          description: Quantidade utilizada do insumo Equipamento. Número inteiro,
            positivo e maior que zero.
          example: 2
        equipmentTypeId:
          type: number
          description: Código de Tipo Equipamento
        origin:
          type: string
          description: Indica a fonte do equipamento, podendo ser um tipo cadastrado ou um
            insumo do orçamento
          example: resource
        status:
          $ref: "#/components/schemas/EquipmentStatusEnum"
    EquipmentDtoForGet:
      type: object
      description: Detalhamento dos equipamentos associados a um Diário de Obra,
        incluindo identificação, descrição, quantidade e status operacional dos
        equipamentos utilizados nas atividades do período.
      properties:
        id:
          type: number
          description: Identificador único que representa um equipamento específico
            registrado no diário de obras, permitindo seu rastreamento e
            referência
          example: 1
        resourceId:
          type: number
          description: Identificador único do equipamento no orçamento da obra, usado para
            vincular registros no diário com os recursos planejados, permitindo
            controle preciso da utilização
          example: 10
        description:
          type: string
          description: Descrição do insumo do Equipamento  (atributo category=LABOR)
          example: Betoneira
        quantity:
          type: number
          description: Indica a quantidade de unidades deste equipamento específico
            utilizadas na obra durante o período do diário, permitindo controle
            do uso dos recursos alocados
          example: 2
        equipmentTypeId:
          type: number
          description: Identificador único que classifica o tipo específico do equipamento
            no sistema, permitindo agrupamento e categorização padronizada dos
            recursos
        origin:
          type: string
          description: Indica se o equipamento registrado no diário foi definido através
            de um tipo padrão ou provém de um insumo do orçamento da obra
          example: resource
        status:
          type: string
          description: Indica o estado atual de funcionamento do equipamento na obra,
            permitindo monitorar a disponibilidade e condições operacionais dos
            recursos
          example: OUT_OF_ORDER
    plannedTasks:
      type: array
      description: Lista de tarefas planejadas para execução no período do Diário de
        Obra, contendo informações sobre unidades construtivas, quantidades e
        responsáveis.
      example:
        - buildingUnitId: 1
          taskId: 109
          notes: Tarefa realizada equipe A
          quantity: 123.4567
          supplierId: 2
          siteId: 3
      items:
        $ref: "#/components/schemas/PlannedTaskDto"
    plannedTasksForPut:
      type: array
      description: Lista de tarefas planejadas a serem atualizadas no Diário de Obra,
        incluindo identificadores, quantidades e informações de localização para
        cada tarefa modificada.
      example:
        - id: 1
          buildingUnitId: 1
          taskId: 109
          notes: Tarefa realizada equipe A
          quantity: 123.4567
          supplierId: 2
          siteId: 3
      items:
        $ref: "#/components/schemas/PlannedTaskDtoForPut"
    detachedTasks:
      type: array
      description: Lista de tarefas avulsas que serão registradas no Diário de Obra,
        contendo informações sobre descrição, quantidade, unidade de medida e
        local de execução das atividades não planejadas.
      example:
        - description: Revestimento parede quarto 1
          notes: Tarefa realizada pela equipe B
          quantity: 40.5
          unitOfMeasure: m2
          siteId: 3
      items:
        $ref: "#/components/schemas/DetachedTaskDto"
    detachedTasksForPut:
      type: array
      description: Lista de tarefas avulsas a serem atualizadas no Diário de Obra,
        incluindo identificadores, descrições, quantidades e informações de
        localização para cada tarefa não planejada modificada.
      example:
        - id: 2
          description: Revestimento parede quarto 1
          notes: Tarefa realizada pela equipe B
          quantity: 40.5
          unitOfMeasure: m2
          siteId: 3
      items:
        $ref: "#/components/schemas/DetachedTaskDtoForPut"
    ShiftDto:
      required:
        - description
        - finishTime
        - startTime
        - weatherCondition
      type: object
      description: Detalhamento de um turno.
      properties:
        description:
          type: string
          description: Identifica o período de trabalho do dia em que as atividades foram
            realizadas, permitindo segmentar os registros por turno
          example: Morning
        startTime:
          type: string
          description: Hora de inicio do turno
          example: 08:00
        finishTime:
          type: string
          description: Hora de fim do turno
          example: 12:00
        weatherCondition:
          type: string
          description: Informação climática para o turno (Fine, Light rain, Heavy rain,
            Unworkable) (Aberto, Chuva leve, Chuva forte ou Impraticável)
          example: Fine
    PlannedTaskDto:
      required:
        - buildingUnitId
        - taskId
      type: object
      description: Representa uma tarefa planejada para registro no Diário de Obra,
        contendo identificadores da unidade construtiva, da tarefa, além de
        informações sobre quantidade, fornecedor e local de execução.
      properties:
        buildingUnitId:
          type: integer
          description: Código da Unidade Construtiva
          example: 1
        taskId:
          type: number
          description: Identificador único que vincula a tarefa planejada ao catálogo de
            tarefas da obra, permitindo rastrear as atividades executadas
            conforme o planejamento
          example: 109
        notes:
          type: string
          description: Observação da Tarefa, limitado a 4000 caracteres
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number
          description: Quantidade referente a medição da tarefa, com precisão máxima de 4
            casas decimais (decimal(13,4)).
          example: 1234567891234.5679
        supplierId:
          type: integer
          description: Identificador único do empreiteiro ou empresa terceirizada
            responsável pela execução da tarefa no diário de obra
          example: 2
        siteId:
          type: integer
          description: Identificador do local físico dentro da obra onde a tarefa será
            executada, permitindo localização precisa das atividades
          example: 3
    PlannedTaskDtoForPut:
      required:
        - buildingUnitId
        - id
        - taskId
      type: object
      description: Estrutura para atualização de tarefas planejadas em um Diário de
        Obra, contendo identificadores obrigatórios e campos opcionais como
        quantidade, observações e localização.
      properties:
        id:
          type: integer
          description: Id da tarefa do Diario de Obra a ser atualizada
          example: 1
        buildingUnitId:
          type: integer
          description: Identificador único da unidade construtiva que representa uma parte
            específica da obra onde a tarefa será executada
          example: 1
        taskId:
          type: number
          description: Identificador único da tarefa no catálogo de tarefas da obra, usado
            para vincular a execução aos serviços planejados
          example: 109
        notes:
          type: string
          description: Campo para registrar detalhes adicionais sobre a execução da
            tarefa, facilitando o acompanhamento e documentação do
            trabalho(limite de 4000 caracteres)
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number
          description: Quantidade executada da tarefa durante o período do diário,
            permitindo registro preciso do progresso com até 4 casas decimais
          example: 1234567891234.5679
        supplierId:
          type: integer
          description: Identificador único do fornecedor ou prestador de serviços
            associado à execução da tarefa, permitindo rastrear
            responsabilidades
          example: 2
        siteId:
          type: integer
          description: Identificador único do local físico onde a tarefa será executada,
            permitindo mapeamento específico dentro do canteiro de obras
          example: 3
    DetachedTaskDto:
      required:
        - description
      type: object
      description: Estrutura para criação de tarefas avulsas em um Diário de Obra,
        contendo campos para descrição, observações, quantidade, unidade de
        medida e localização da tarefa.
      properties:
        description:
          type: string
          description: Descrição da Tarefa, limitado a 200 caracteres.
          example: Tarefa xyz
        notes:
          type: string
          description: Campo para registrar anotações complementares sobre a execução da
            tarefa, como condições especiais ou ajustes necessários(limite de
            4000 caracteres)
          example: Tarefa será realizada pelos ajudantes...
        quantity:
          type: number

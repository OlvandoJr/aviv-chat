          type: string
          description: Id do usuário que criou o pedido de compra
          example: USER
        createdAt:
          type: string
          description: "Data de criação do pedido de compra no formato: yyyy-MM-dd."
          example: 2018-03-11
        modifiedBy:
          type: string
          description: Id do usuário que modificou o pedido de compra
          example: ANOTHERUSER
        modifiedAt:
          type: string
          description: "Data de modificação do pedido de compra no formato: yyyy-MM-dd."
          example: 2018-04-02
    OverdueReceivableInputDto:
      type: object
      description: Dados necessários para registrar cobrança de parcelas vencidas com
        configurações de juros e multa
      required:
        - checkingAccountId
        - companyId
        - correctAnnualInstallment
        - groupedInstalments
        - installments
        - newDueDate
        - receivableBillId
      properties:
        receivableBillId:
          $ref: "#/components/schemas/ReceivableBillId"
        companyId:
          type: integer
          description: Identificador empresa da conta corrente
          format: int32
          example: 1
        checkingAccountId:
          type: string
          description: Código da conta corrente
          example: 6538-2
        newDueDate:
          type: string
          format: date
          description: Data do vencimento da cobrança
          example: 2021-01-01
        interestPercentage:
          type: number
          description: Porcentagem de juros
          example: 5.98
        finePercentage:
          type: number
          description: Porcentagem de multa
          example: 5.98
        insurancepercentage:
          type: number
          description: Porcentagem de seguro
          example: 5.98
        correctAnnualInstallment:
          type: boolean
          description: Corrigir parcelas com correção anual
          example: true
        groupedInstalments:
          type: boolean
          description: Agrupar parcelas em uma única cobrança
          example: true
        installments:
          type: array
          description: Lista das parcelas vencidas
          example:
            - installmentId: 123
            - installmentId: 456
          items:
            required:
              - installmentId
            type: object
            properties:
              installmentId:
                $ref: "#/components/schemas/InstallmentId"
    ParameterDto:
      required:
        - id
        - value
      type: object
      description: Representa os dados de um parâmetro.
      properties:
        id:
          type: integer
          description: Código do parâmetro.
          format: int32
          example: 1
        value:
          oneOf:
            - type: string
            - type: number
              format: int32
            - type: number
              format: double
          description: Valor do parâmetro. Dependendo do parâmetro, o tipo de retorno
            deste campo pode ser uma string, um número inteiro ou um numero
            decimal.
          examples:
            - S
            - 123
            - 45.67

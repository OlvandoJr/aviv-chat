    RealEstateUnitUpdateDocument:
      description: Schema para atualização de unidade imobiliária.
      type: object
      properties:
        commercialStock:
          maxLength: 1
          type: string
          description: >-
            Unidades vendidas, vendidas em pré-contrato, reservadas, em proposta
            ou locadas não poderão ter o estoque comercial alterado.</br></br>
            Estoques comerciais disponíveis: 
              `D` - Diponível
              `R` - Reserva técnica
              `E` - Permuta
              `M` - Mútuo
              `T` - Transferido
              `G` - Vendido/terceiros
          example: D
          enum:
            - D
            - R
            - E
            - M
            - T
            - G
        prizedCompliance:
          minimum: 0
          type: number
          description: Adimplência premiada. Não pode ser um valor negativo.
          example: 0
        iptuValue:
          minimum: 0
          type: number
          description: Valor do IPTU. Não pode ser um valor negativo.
          example: 0
        realEstateRegistration:
          type: string
          description: Inscrição Imobiliária.
          example: "123456"
        idealFraction:
          type: number
          description: "Fração ideal. Valores aceitos: numeric(17,8)<br><br>"
          example: 0.05
        cibCode:
          $ref: "#/components/schemas/CibCode"
        incraCode:
          $ref: "#/components/schemas/IncraCode"
        locationType:
          $ref: "#/components/schemas/LocationType"
        frameworkType:
          $ref: "#/components/schemas/FrameworkType"
    UnitAddressDocument:

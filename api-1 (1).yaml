          type: string
          description: Nome personalizado do arquivo PDF do relatório anexado ao e-mail.
          example: relatorio_saldo_devedor.pdf
        conditionIdIn:
          $ref: "#/components/schemas/ConditionIdInArray"
        conditionIdNotIn:
          $ref: "#/components/schemas/ConditionIdNotInArray"
    DetailedEnterprise:
      description: Representa um empreendimento com informações detalhadas adicionais.
        Estende o schema Enterprise adicionando dados de endereço, obra, vendas,
        responsável e associações (obra e centros de custo).
      allOf:
        - $ref: "#/components/schemas/Enterprise"
        - type: object
          properties:
            addressDetails:
              type: object
              description: Detalhes do endereço
              properties:
                streetName:
                  type: string
                  description: Logradouro do endereço
                  example: Av. Central
                number:
                  type: string
                  description: Número do endereço
                  example: "1000"
                complement:
                  type: string
                  description: Complemento do endereço
                  example: Bloco A
                neighborhood:
                  type: string
                  description: Bairro do endereço
                  example: Centro
                city:
                  type: string
                  description: Cidade do endereço
                  example: Florianópolis
                state:
                  type: string
                  description: Sigla do estado do endereço
                  example: SC
                zipCode:
                  type: string
                  description: CEP do endereço
                  example: 88000-000
            buildingCostEstimationStatus:
              type: string
              description: |-
                Situação do orçamento, em que:




                  - 'OPENED': Aberto
                  - 'CLOSED': Fechado
              enum:
                - OPENED
                - CLOSED
              example: OPENED
            buildingStatus:
              type: string
              description: >-
                Situação da obra, em que:




                  - 'COST_ESTIMATING': Orçamento
                  - 'IN_PROGRESS': Em andamento
                  - 'FINISHED_WITH_FINANCIAL_PENDENCIES': Encerrada com pendências financeiras
                  - 'FINISHED_WITHOUT_FINANCIAL_PENDENCIES': Encerrada sem pendências
              enum:
                - COST_ESTIMATING
                - IN_PROGRESS
                - FINISHED_WITH_FINANCIAL_PENDENCIES
                - FINISHED_WITHOUT_FINANCIAL_PENDENCIES
              example: COST_ESTIMATING
            buildingAppropriationLevel:
              type: string
              description: |-
                Nível de apropriação da obra, em que:




                  - 0: Obra
                  - 1: Célula construtiva
                  - 2: Etapa
                  - 3: Subetapa
                  - 4: Serviço
              enum:
                - "0"
                - "1"
                - "2"
                - "3"
                - "4"
              example: "4"

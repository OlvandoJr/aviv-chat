        - quantity
        - unitySymbol
        - deliveryRequirements
      properties:
        buildingId:
          example: 500
          description: Código da obra
        productId:
          example: 1002
          description: Código do insumo
        detailId:
          example: 1
          description: Código do detalhe do item de cotação
        trademarkId:
          example: 2
          description: Código da marca do item de cotação
        quantity:
          example: 80
          description: Quantidade do item de cotação
        unitySymbol:
          example: sc
          description: Unidade de medida do item de cotação
        notes:
          example: Observação do item da cotação
          description: Observação do item de cotação com restrição de 4000 caracteres.
        deliveryRequirements:
          items:
            $ref: "#/components/schemas/DeliveryRequirementQuotation"

    StockInventoryItemDto:
      type: object
      description: Representa o estoque para uma combinação específica de insumo,
        detalhe e marca, conforme a organização desses dados no Sienge. Como o
        detalhe e a marca são informações opcionais no estoque do Sienge, esses
        valores podem não estar preenchidos.
      properties:
        itemId:
          description: Código do item.
          type: integer
          example: 1
        resourceId:
          description: Identificador do insumo.
          type: integer
          example: 1001
        resourceDescription:
          description: Descrição do insumo em estoque.
          type: string
          example: Cimento Portland
        detailId:
          description: Código do detalhe. Pode ser null.
          type: integer
          example: 3
        detailDescription:
          description: Descrição do detalhe. Pode ser null.
          type: string
          example: CP II-E-32
        trademarkId:
          description: Código da marca. Pode ser null.
          type: integer
          example: 42
        trademarkDescription:
          description: Descrição da marca. Pode ser null.
          type: string
          example: ACME SA
        quantity:
          description: Quantidade em estoque.
          type: number
          example: 3000.2348
        unitOfMeasure:
          description: Símbolo da unidade de medida básica do insumo (que é a unidade
            utilizada no controle de estoque).
          type: string
          example: kg
        averagePrice:
          description: Custo médio (preço médio).
          type: number
          example: 0.44
    StockInventoryItemAppropriationDto:
      type: object
      description: Representa a apropriação de um insumo em estoque, segregado por
        detalhe e marca.
      properties:
        buildingUnitId:
          description: Código da unidade construtiva da obra.
          type: integer
          format: int64
          example: 1
        sheetItemId:
          description: Id do item de orçamento. Deve referenciar um item de orçamento já
            cadastrado no Sienge, na respectiva planilha de orçamento
            (considerando a obra do centro de custo do movimento e a unidade
            construtiva informada). Além disso, o item de orçamento não pode
            estar bloqueado para apropriações e não pode estar duplicado dentro
            do mesmo item de movimento.
          type: integer
          example: 42
        costEstimationItemReference:
          description: Referência do item do orçamento.
          type: string
          example: 08.004.001
        quantity:
          description: Quantidade apropriada do insumo.
          type: number
          format: double
          example: 5.2
    GetResponseReservations:
      description: Representa a lista de reservas  que estão no sistema de estoque
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          items:
            $ref: "#/components/schemas/StockReservationDto"

          description: Código da marca. Pode ser nulo.
        trademarkDescription:
          type: string
          example: ACME SA
          description: Descrição da marca. Pode ser nulo.
        buildingUnitId:
          description: Código da unidade construtiva.
          $ref: "#/components/schemas/BuildingUnitId"
    GetResponseResources:
      example:
        resultSetMetadata:
          count: 1
          offset: 0
          limit: 100
        results:
          - id: 1001
            description: Cimento Portland
            unitOfMeasure: kg
            category: MATERIAL
            resourceCode: M1354
            barcode: "7613033174728"
            details:
              - id: 1
                description: CP-320
                detailCode: DT-01
            trademarks:
              - id: 123
                description: Lorem ipsum
      description: Objeto contendo os metadados do resultado da consulta e o array de
        insumos.
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ResourceDTO"
          example:
            - id: 1001
              description: Cimento Portland
              unitOfMeasure: kg
              category: MATERIAL
              resourceCode: M1354
              barcode: "7613033174728"
              details:
                - id: 1
                  description: CP-320
                  detailCode: DT-01
              trademarks:
                - id: 123
                  description: Lorem ipsum
    ResourceDTO:
      description: "Representa um insumo do orçamento. Contém: id: identificador
        numérico do insumo; description: descrição legível do insumo;
        unitOfMeasure: símbolo da unidade de medida básica (ex.: kg, m, un);
        category: categoria do insumo, conforme enum (ex.: MATERIAL, LABOR);
        resourceCode: código auxiliar interno do insumo; barcode: código de
        barras do insumo na unidade básica, sem detalhe/marca; details: lista de
        detalhes ativos do insumo (ResourceDetailDTO); trademarks: lista de
        marcas ativas do insumo (ResourceTrademarkDTO)."
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        description:
          $ref: "#/components/schemas/ResourceDescription"
        unitOfMeasure:
          $ref: "#/components/schemas/UnitOfMeasure"
        category:
          $ref: "#/components/schemas/ResourceCategoryEnum"
        resourceCode:
          $ref: "#/components/schemas/ResourceCode"
        barcode:
          $ref: "#/components/schemas/Barcode"
        details:
          $ref: "#/components/schemas/ResourceDetails"
        trademarks:
          $ref: "#/components/schemas/Trademarks"
    ResourceDTOForPost:
      description: "Payload para inclusão de insumo no orçamento. Contém: id:
        identificador numérico do insumo a ser incluído."
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
    ResourceCodeDTO:
      description: "Payload para atualização do código auxiliar do insumo. Contém:
        resourceCode: novo código auxiliar do insumo (até 25 caracteres)."
      type: object
      required:
        - resourceCode
      properties:
        resourceCode:
          description: 'Código auxiliar do insumo para identificação interna; texto máximo
            de 25 caracteres (ex.: "I-01")'
          type: string
          example: I-01
    GetResponseSheet:
      description: Envelope da resposta para a consulta de planilhas (sheets) do
        orçamento da obra. Contém os metadados do conjunto de resultados e a
        lista de unidades construtivas retornadas.
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          description: Lista de planilhas (unidades construtivas) retornadas.
          type: array
          items:
            $ref: "#/components/schemas/SheetDTO"

            compra retornadas como resultado da requisição
          items:
            $ref: "#/components/schemas/DeliveryRequirementRequest"
          example:
            - deliveryRequirementNumber: 1
              requirementDate: 2018-01-03
              requirementQuantity: 80
              attendedQuantity: 15
              openQuantity: false
    DeliveryRequirementRequest:
      description: Conjunto de necessidades de entrega de um item de solicitação de compra,
      type: object
      required:
        - requirementDate
        - requirementQuantity
      properties:
        deliveryRequirementNumber:
          type: number
          format: int32
          readOnly: true
          example: 1
          description: Número da necessidade da entrega
        requirementDate:
          type: string
          format: date
          example: 2018-01-03
          description: "Data da necessidade no formato ISO 8601 com a máscara: yyyy-MM-dd"
        requirementQuantity:
          type: number
          format: double
          example: 80
          description: Quantidade necessitada
        attendedQuantity:
          type: number
          format: double
          readOnly: true
          example: 15
          description: Quantidade atendida
        openQuantity:
          type: boolean
          readOnly: true
          example: false
          description: >-
            Saldo da entrega

            Caso for verdadeiro, a diferença entre requirementQuantity e
            attendedQuantity será o saldo. Caso falso, significa que o saldo foi
            cancelado.

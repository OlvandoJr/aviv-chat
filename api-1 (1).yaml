          description: Número da reserva no Sienge.
          type: integer
          example: 223
        responsible:
          type: object
          description: Responsável pela reserva.
          properties:
            id:
              type: integer
              description: Código do responsável.
              example: 42
            name:
              type: string
              description: Nome do responsável.
              example: Guilherme da Silva
        reservationDate:
          description: Data da reserva no formato YYYY-MM-DD de acordo com a norma ISO 8601.
          type: string
          example: 2020-04-28
        movementType:
          type: object
          description: Tipo de movimento.
          properties:
            id:
              description: Código do tipo de movimento
              type: integer
              example: 3
            description:
              description: Descrição do tipo de movimento.
              type: string
              example: Transferência
        sourceCostCenter:
          type: object
          description: Centro de custo de origem.
          properties:
            id:
              description: Código do centro de custo de origem.
              type: integer
              example: 1
            description:
              description: Nome do centro de custo de origem.
              type: string
              example: Taj Mahal
        destinationCostCenter:
          type: object
          description: Centro de custo de destino.
          properties:
            id:
              description: Código do centro de custo de destino.
              type: integer
              example: 6
            description:
              description: Nome do centro de custo de destino.
              type: string
              example: Torre Eifel
        status:
          description: Situação da reserva.
          type: string
          example: PENDING
          enum:
            - PENDING
            - PARTIALLY_FULFILLED
            - FULFILLED
            - CANCELLED
        notes:
          description: Observações do movimento.
          type: string
          example: Lorem ipsum dolor sit amet.
        createdBy:
          description: Código do Usuário que cadastrou a reserva.
          type: string
          example: JOAO
        createdAt:
          description: Data e hora da criação da reserva no formato
            yyyy-MM-ddTHH:mm:ss.SSSXXX de acordo com a norma ISO 8601.
          type: string
          example: 2020-11-24T14:20:00.000-03:00
        modifiedBy:
          description: Código do último usuário que modificou a reserva.
          type: string
          example: MARIANA
        modifiedAt:
          description: Data e hora da modificação da reserva no formato
            yyyy-MM-ddTHH:mm:ss.SSSXXX de acordo com a norma ISO 8601.
          type: string
          example: 2020-11-24T14:20:00.000-03:00
    GetResponseStockMovement:

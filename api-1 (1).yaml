    DocumentStatusEnum:
      type: integer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
      description: >
        Situação na nota fiscal:

        * 0 - Documento regular

        * 1 - Documento regular extemporâneo

        * 2 - Documento cancelado

        * 3 - Documento cancelado extemporâneo

        * 4 - NF-e ou CT-e - Denegado

        * 5 - NF-e ou CT-e - Numeração inutilizada

        * 6 - Documento Fiscal Complementar

        * 7 - Documento Fiscal Complementar extemporâneo

        * 8 - Documento Fiscal emitido com base em Regime Especial ou Norma
        Específica
      example: 0
    CreditorTaxingRegimeEnum:
      type: integer
      enum:
        - 0
        - 1
        - 2
      description: |
        Regime de tributação do credor:
        * 0 - Normal
        * 1 - Simples Nacional
        * 2 - Microempreendedor Individual - MEI
      example: 1
    PaymentTypeEnum:
      type: integer
      enum:
        - 0
        - 1
        - 2
      description: |
        Condição de pagamento:
        * 0 - À vista
        * 1 - A prazo
        * 2 - Sem pagamento
      example: 0
    PisCofinsCalculationTypeEnum:
      type: integer
      enum:
        - 1
        - 2
        - 3
      description: |
        Tipo de apuração do PIS/COFINS:
        * 1 - Cumulativo
        * 2 - Não-cumulativo
        * 3 - Não-incide
      example: 2
    FreightTypeEnum:
      type: integer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 9
      description: |
        Modalidade do frete:
        * 0 - Contratação do Frete por conta do Remetente (CIF)
        * 1 - Contratação do Frete por conta do Destinatário (FOB)
        * 2 - Contratação do Frete por conta de Terceiros
        * 3 - Transporte Próprio por conta do Remetente
        * 4 - Transporte Próprio por conta do Destinatário
        * 9 - Sem Ocorrência de Transporte
      example: 0
    TaxInformationInsert:
      required:
        - branchOfficeId
        - cityServiceId
        - entryDate
        - freightType
        - paymentType
        - pisCofinsCalculationType
        - serviceExecutionDate
        - status
      type: object
      properties:
        status:
          $ref: "#/components/schemas/DocumentStatusEnum"
        cancellationDate:
          type: string
          description: Data de cancelamento. Formato YYYY-MM-DD. Campo só deve ser
            informado quando o campo 'status' for '2' ou '3'
          example: 2018-01-31

          items:
            $ref: "#/components/schemas/QuotationSupplierNegotiationDTO"
    QuotationSupplierNegotiationDTO:
      type: object
      description: Negociação do fornecedor.
      properties:
        negotiationId:
          description: Código da negociação com o fornecedor
          type: integer
          example: 1
        responseDate:
          description: Data da resposta da negociação no formato yyyy-MM-dd
          type: string
          example: 2022-08-11
        discount:
          description: Desconto da negociação
          type: number
          example: 10.1
        shippingCosts:
          description: Frete geral
          type: number
          example: 0
        itemsShipping:
          description: Frete dos itens negociados
          type: number
          example: 0
        ipiShippingFlag:
          $ref: "#/components/schemas/IpiShippingFlagEnum"
        ipiShippingCosts:
          description: Custos de frete para IPIs
          type: number
          example: 12.99
        otherCosts:
          description: Outros custos presentes na negociação.
          type: number
          example: 12.99
        totalItemsCosts:
          description: Custo total dos itens da negociação.
          type: number
          example: 12.99
        totalItemsNegotiationCosts:
          description: Custo total dos itens da negociação escolhidos.
          type: number

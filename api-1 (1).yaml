            telefones nacionais (ddi +55 ou ddi não informado), deve manter o
            ddd junto no campo number, caso seja enviado separado, a informação
            enviada será ignorada, e o formato DDDNNNNNNNNN será solicitado.
          example: "123"
          maxLength: 5

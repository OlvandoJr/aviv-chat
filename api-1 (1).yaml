          $ref: "#/components/schemas/CreditorTaxingRegimeEnum"
        entryDate:
          type: string
          description: Data de entrada. Formato YYYY-MM-DD. Deve ser maior ou igual data
            de emissão do título e anterior a data de cancelamento, quando
            informada
          example: 2025-07-01
        serialNumber:
          type: string
          description: Série da nota fiscal. Tamanho máximo de 3 caracteres
          example: "123"
        paymentType:
          $ref: "#/components/schemas/PaymentTypeEnum"
        branchOfficeId:
          type: integer
          description: Código da filial da empresa
          format: int32
          example: 99
        operationTaxCode:
          type: string
          description: Código fiscal da operação (CFOP). Preenchimento obrigatório quando
            o modelo do documento do título não se tratar de modelo  fiscal de
            prefeitura. A CFOP informada deverá iniciar com '1' para operações
            dentro do estado, com '2' para operações interestaduais e com '3'
            para operações envolvendo o exterior
          example: "1101"
        cnaeCode:
          type: integer
          description: Código do CNAE para serviços
          format: int32
          example: 3005909
        cityServiceId:
          type: integer
          description: Código do município de prestação de serviços
          format: int32
          example: 1234
        taxSituationServiceCode:
          type: string
          description: Situação tributária de serviços. A situação tributária de serviços
            precisa estar cadastrada para o município de prestação de serviços
            informado
          example: "01"
        serviceTaxCode:
          type: string
          description: Código fiscal de prestação de serviços. A CFPS precisa estar
            cadastrada para o município de prestação de serviços informado. Caso
            não preenchido, o campo 'natureServiceId' precisará ser informado
          example: "1001"
        natureServiceId:
          type: string
          description: Natureza do serviço. Campo livre com tamanho máximo de 100
            caracteres. Caso não preenchido, o campo 'serviceTaxCode' precisará
            ser informado
          example: "1001"
        serviceExecutionDate:
          type: string
          description: Data de execução do serviço. Formato YYYY-MM-DD
          example: 2018-01-31
        pisCofinsCalculationType:
          $ref: "#/components/schemas/PisCofinsCalculationTypeEnum"
        pisCofinsCreditBaseId:
          type: integer
          description: Identificador base de crédito para PIS/COFINS. Opções válidas podem
            ser consultas na Tabela 4.3.7 - Tabela Código de Base de Cálculo do
            Crédito. Campo só deve ser informado quando o campo
            'pisCofinsCalculationType' for '2'
          format: int32
          example: 101
        freightType:
          $ref: "#/components/schemas/FreightTypeEnum"

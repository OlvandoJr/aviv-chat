      operationId: getCurrentDebtiBalance
      parameters:
        - name: cpf
          in: query
          description: CPF do cliente físico sem formatação (somente números). Possui
            precedência sobre o parâmetro <code>cnpj</code>. </br><b>Obrigatório
            quando o parâmetro <code>cnpj</code> não for
            informado</b><br><b>Exemplo</b>:77415844483
          schema:
            type: string
        - name: cnpj
          in: query
          description: CNPJ do cliente jurídico sem formatação (somente números). Ignorado
            quando o parãmetro <code>cpf</code> está
            preenchido.  </br><b>Obrigatório quando o parâmetro <code>cpf</code>
            não for informado</b><br> <b>Exemplo</b>:21427113000148
          schema:
            type: string
        - $ref: "#/components/parameters/DueDateStartParcels"
        - $ref: "#/components/parameters/DueDateEndParcels"
        - name: generatedBoleto
          in: query
          description: Filtra as parcelas que possuem boletos gerados (<code>true</code>)
            ou que não possuem nenhum boleto gerado (<code>false</code>).
          schema:
            type: boolean
        - $ref: "#/components/parameters/NumberTitle"
        - $ref: "#/components/parameters/CorrectionDate"
        - name: correctAnnualInstallment
          in: query
          description: "Para aplicar o cálculo de correção anual: S - Sim, aplicar
            correção anual, N - Não aplicar correção anual"
          schema:
            type: string
            enum:
              - S
              - N
            default: N
        - $ref: "#/components/parameters/ConditionIdIn"
        - $ref: "#/components/parameters/ConditionIdNotIn"
        - name: costCenterIdIn
          in: query
          description: "Id dos centros de custo para incluir na consulta (Exemplo: 1,2,3)
            | Preenchendo este parâmetro, serão considerados somente os centros
            de custo cadastrados com os mesmos códigos informados no parâmetro."
          style: form
          explode: false
          schema:
            type: array
            example:
              - 1
              - 2
              - 3
            items:
              type: integer
        - name: costCenterIdNotIn
          in: query
          description: "Id dos centros de custo para excluir da consulta (Exemplo: 1,2,3)
            | Preenchendo este parâmetro, serão considerados somente os centros
            de custo cadastrados com os códigos diferentes dos informados no
            parâmetro. | Obs: O parâmetro 'costCenterIdIn' tem prioridade sobre
            este, ou seja, caso sejam preenchidos os parâmetros 'costCenterIdIn'
            e 'costCenterIdNotIn', será aplicado o filtro do parâmetro
            'costCenterIdIn' e ignorada a informação preenchida no parâmetro
            'costCenterIdNotIn'."
          style: form
          explode: false
          schema:
            type: array
            example:
              - 1
              - 2
              - 3
            items:
              type: integer
        - $ref: "#/components/parameters/UnitNumber"
        - $ref: "#/components/parameters/UnitIdQuery"
      responses:
        "200":
          description: Saldo devedor presente gerado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentDebtBalanceResults"
              example:
                billReceivableId: 123456
                documentId: CT
                paidInstallments:
                  - installmentId: 1
                    currentBalance: 0
                    latePaymentInterest: 2.5
                    adjustedValue: 1000
                    additionalValue: 10
                    originalValue: 1000
                    monetaryCorrectionValue: 5
                    conditionType: AT
                    indexerCode: 101
                    indexerName: IGPM
                    baseDateOfCorrection: 2025-01-01
                    indexerValueBaseDate: 1.05
                    indexerValueCalculationDate: 1.07
                    installmentNumber: 1/1
                dueInstallments:
                  - installmentId: 2
                    currentBalance: 500
                    latePaymentInterest: 0
                    adjustedValue: 500
                    additionalValue: 0
                    originalValue: 500
                    monetaryCorrectionValue: 2
                    conditionType: PM
                    indexerCode: 101
                    indexerName: IGPM

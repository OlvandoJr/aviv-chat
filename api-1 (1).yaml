    BuildingCostEstimationItemDto:
      description: Representa um Item de Orçamento de Obra, incluindo identificação,
        unidade construtiva, quantidades, preços (total, base e por categoria),
        além de indicadores de planejamento e medição (percentuais e quantidades
        medidas).
      type: object
      properties:
        buildingId:
          description: Código da obra.
          type: integer
          example: 7
        buildingName:
          description: Nome da obra.
          type: string
          example: Condomínio da Felicidade
        buildingStatus:
          description: Situação da obra.
          type: string
          example: IN_PROGRESS
          enum:
            - COST_ESTIMATING
            - IN_PROGRESS
            - FINISHED_WITH_FINANCIAL_PENDENCIES
            - FINISHED_WITHOUT_FINANCIAL_PENDENCIES
        projects:
          description: Projetos vinculados aos centros de custo associados à obra do item
            de orçamento. Se a obra não possuir centros de custo associados, ou
            se estes não estiverem vinculados a projetos, este array estará
            vazio.
          type: array
          items:
            $ref: "#/components/schemas/ProjectDto"
        versionNumber:
          description: Número da respectiva versão do orçamento.
          type: integer
          example: 3
        buildingUnitId:
          $ref: "#/components/schemas/BuildingUnitId"
        buildingUnitName:
          $ref: "#/components/schemas/BuildingUnitName"
        id:
          $ref: "#/components/schemas/SheetItemId"
        wbsCode:
          $ref: "#/components/schemas/WbsCode"
        workItemId:
          description: Código do serviço. Em itens agrupadores, esse campo será null.
          type: integer
          example: 2344
        description:
          $ref: "#/components/schemas/CostEstimationItemDescription"
        unitOfMeasure:
          description: Unidade de medida usada para o item de orçamento.
          type: string
          example: m2
        quantity:
          description: Quantidade orçada para o item de orçamento, com precisão de 4 casas
            decimais. Esse valor leva em consideração o número de repetições da
            respectiva unidade construtiva.
          type: number
          example: 560.3205
        unitPrice:
          description: Preço unitário do item de orçamento com precisão de 4 casas.
            Equivalente a soma dos preços unitários de cada tipo de preço do
            serviço.
          type: number
          example: 9.0009
        totalPrice:
          description: Preço total do item de orçamento com precisão de 2 casas.
            Equivalente a soma dos preços totais de cada tipo de preço do item.
          type: number
          example: 5043.39
        baseTotalPrice:
          description: Preço total base do item de orçamento com precisão de 2 casas.
            Equivalente a soma dos preços totais base de cada tipo de preço do
            item. Neste preço base são considerados apenas os preços "puros" dos
            insumos e serviços que compõem o item de orçamento, ou seja, neste
            preço não é aplicado BDI, encargos sociais nem correção por
            indexador.
          type: number
          example: 5000.05
        scheduledPercentComplete:
          description: Percentual previsto (planejado) de execução do item de orçamento,
            considerando a data informada no parâmetro "dataDate". Esse
            percentual é calculado com base na ligação do respectivo item de
            orçamento com as tarefas do planejamento da obra. O valor desse
            campo tem precisão de até 12 casas decimais. Esse campo só será
            preenchido em itens da versão atual do orçamento de cada obra, já a
            ligação do orçamento com o planejamento de obra só exise na versão
            atual (essa ligação não é versionada). Ou seja, em versões
            anteriores esse campo será null. Em itens agrupadores, esse campo
            também será null.
          type: number
          example: 26.4987
        percentComplete:
          description: Percentual medido do item de orçamento, considerando a data
            informada no parâmetro "dataDate". Esse percentual é calculado com
            base na ligação do respectivo item de orçamento com as tarefas do
            planejamento da obra e com as medições do acompanhamento de obra.
            Para o cálculo, serão consideradas todas as medições da obra
            cadastradas até a data informada no parâmetro "dataDate". O valor
            desse campo tem precisão de até 12 casas decimais. Esse campo só
            será preenchido em itens da versão atual do orçamento de cada obra,
            já a ligação do orçamento com o planejamento de obra só exise na
            versão atual (essa ligação não é versionada). Ou seja, em versões
            anteriores esse campo será null. Em itens agrupadores, esse campo
            também será null.
          type: number
          example: 24.9879
        measuredQuantity:
          description: Quantidade medida do item de orçamento, considerando a data
            informada no parâmetro "dataDate". Essa quantidade é calculada com
            base na ligação do respectivo item de orçamento com as tarefas do
            planejamento da obra e com as medições do acompanhamento de obra.
            Para o cálculo, serão consideradas todas as medições da obra
            cadastradas até a data informada no parâmetro "dataDate". O valor
            desse campo tem precisão de até 4 casas decimais. Esse campo só será
            preenchido em itens da versão atual do orçamento de cada obra, já a
            ligação do orçamento com o planejamento de obra só exise na versão
            atual (essa ligação não é versionada). Ou seja, em versões
            anteriores esse campo será null. Em itens agrupadores, esse campo
            também será null.
          type: number
          example: 140.0123
        pricesByCategory:
          type: array
          items:
            $ref: "#/components/schemas/PriceByCategory"
        tasks:
          type: array
          description: Relação de tarefas associadas ao item de orçamento, detalhando a
            descrição, seu percentual representativo e seu valor.
          items:
            $ref: "#/components/schemas/TaskDto"
        api-error:
          description: Quando não ocorrer nenhuma falha no carregamento dos itens de
            orçamento, esse campo não estará presente nos objetos retornados. Se
            durante o carregamento ocorrer alguma falha no lado do servidor, o
            array de itens de orçamento será fechado com os itens carregados até
            então, e um objeto extra será adicionado ao final do array contendo
            apenas este campo preenchido com a respectiva mensagem de erro.

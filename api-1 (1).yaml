    TransferStockMovementPostDto:
      type: object
      description: Informações para transferência de estoque entre centros de custo
        e/ou departamentos.
      required:
        - documentId
        - movementDate
        - movementTypeId
        - sourceCostCenterId
        - destinationCostCenterId
        - items
      properties:
        documentId:
          type: string
          description: Código do tipo de documento.
          example: TR
        movementNumber:
          type: string
          description: Número do movimento. Opcional, gerado automaticamente se não
            informado.
          example: "123"
        movementDate:
          type: string
          format: date
          description: Data do movimento no formato YYYY-MM-DD.
          example: 2025-09-18
        movementTypeId:
          type: integer
          description: Código do tipo de movimento.
          example: 3
        notes:
          type: string
          description: Observações gerais da transferência.
          example: Lorem ipsum dolor sit amet.
        sourceCostCenterId:
          type: integer
          description: Código do centro de custo de origem transferência.
          example: 300
        sourceDepartmentId:
          type: integer
          nullable: true
          description: Código do departamento de origem (opcional).
          example: 10
        destinationCostCenterId:
          type: integer
          description: Código do centro de custo de destino transferência.
          example: 367
        destinationDepartmentId:
          type: integer
          nullable: true
          description: Código do departamento de destino (opcional).
          example: 20
        items:
          type: array
          description: Lista de itens a serem transferidos.
          items:
            $ref: "#/components/schemas/TransferStockMovementItemPostDto"
      example:
        documentId: TR
        movementNumber: "123"
        movementDate: 2025-09-18
        movementTypeId: 3
        notes: Lorem ipsum dolor sit amet.
        sourceCostCenterId: 300
        sourceDepartmentId: 10
        destinationCostCenterId: 367
        destinationDepartmentId: 20
        items:
          - source:
              resourceId: 4697
              detailId: 1
              trademarkId: 1
              quantity: 1
              unitOfMeasure: un
              buildingAppropriations:
                - buildingUnitId: 2
                  sheetItemId: 42
                  percentage: 100
            destination:
              resourceId: 4697
              detailId: 1
              trademarkId: 1
              unitPrice: 100
              buildingAppropriations:
                - buildingUnitId: 2
                  sheetItemId: 42
                  percentage: 100

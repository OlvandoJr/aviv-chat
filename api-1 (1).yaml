  /v1/work-item-groups:
    get:
      operationId: getWorkItemGroups
      tags:
        - Grupos de Serviços
      summary: Realiza a busca de Grupos de Serviços.
      description: A API disponibiliza uma lista de Grupos de Serviços existentes no
        sistema, trazendo o código de referência, nível, descrição, Código
        Auxiliar e Código do tipo de obra. (REST)
      parameters:
        - $ref: "#/components/parameters/BuildingTypeId"
        - in: query
          name: workItemGroups
          description: Códigos dos Grupos de Serviços
          required: false
          schema:
            type: array
            items:
              type: string
            example:
              - "001"
              - "002.001"
              - "003"
        - in: query
          name: description
          description: Descrição dos Grupos de Serviços
          required: false
          schema:
            type: string
            items:
              type: string
            example: ESCORAMENTO DE TERRENO DE VIZINHOS
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Lista de Grupos de Serviços retornada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkItemGroupsListResponse"
        "400":

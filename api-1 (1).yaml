    SheetDTO:
      description: Representa uma planilha (unidade construtiva) do orçamento da obra,
        com seu identificador, descrição e status operacional.
      type: object
      properties:
        id:
          description: Id da unidade construtiva
          type: integer
          example: 1
        description:
          description: Descrição da unidade construtiva
          type: string
          example: Incorporação
        status:
          description: Situação operacional da unidade construtiva
          type: string
          enum:
            - LOCKED
            - UNLOCKED
          example: LOCKED
    SheetItemsDTO:
      description: Representa um item da planilha de orçamento da obra, incluindo seus
        identificadores, descrição, unidade de medida, quantidades e valores
        (unitário e total), além do detalhamento de preços por categoria de
        insumo.
      type: object
      properties:
        id:
          description: Identificador único imutável do item de orçamento
          type: string
          example: a1b2c3
        wbsCode:
          description: Código de referência do item de orçamento,  representando a posição
            do mesmo na Estrutura de Decomposição do Trabalho (EDT)
          type: string
          example: 01.001.000.001
        workItemId:
          description: Código do serviço na tabela utilizada na obra.
          type: integer
          example: 9
        description:
          description: Descrição do item de orçamento
          type: string
          example: Alvenaria de Tijolo Furado
        unitOfMeasure:
          description: Unidade de medida usada para o item de orçamento
          type: string
          example: m2
        quantity:
          description: Quantidade orçada para o item de orçamento com precisão de 4 casas
          type: number
          example: 23.3205
        unitPrice:
          description: Preço unitário do item de orçamento com precisão de 4 casas.
            Equivalente a soma dos preços unitários de cada tipo de preço do
            serviço
          type: number
          example: 9.0009
        totalPrice:
          description: Preço total do item de orçamento com precisão de 2 casas.
            Equivalente a soma dos preços totais de cada tipo de preço do
            serviço
          type: number
          example: 209.91
        pricesByCategory:
          type: array
          items:
            $ref: "#/components/schemas/PriceByCategory"
    BuildingIdBudget:
      description: Código da obra (escopo orçamentos)
      type: integer
      format: int32
      minimum: 0
      example: 100
    BuildingCostEstimationsVersionCreatedEvent:
      description: Evento gerado quando uma nova versão do orçamento é criada.
      type: object
      required:
        - buildingId
        - buildingStatus
        - creationDate
        - versionNumber
      properties:
        buildingId:
          $ref: "#/components/schemas/BuildingIdBudget"
        buildingStatus:
          description: Situação da obra no momento da criação da versão
          type: string
          enum:
            - COST_ESTIMATING
            - IN_PROGRESS
            - FINISHED_WITH_FINANCIAL_PENDENCIES
            - FINISHED_WITHOUT_FINANCIAL_PENDENCIES
          example: COST_ESTIMATING
        creationDate:
          description: Data e hora da criação da versão
          type: string
          format: date-time
          example: 2025-01-01T12:00:00Z
        versionNumber:
          description: Número da versão criada
          type: integer
          format: int32
          minimum: 0
          example: 3
    BuildingCostEstimationUpdatedEvent:
      description: Evento gerado quando um item de orçamento é criado ou removido.
      type: object
      required:
        - buildingId
        - buildingUnitId
        - updatedAt
        - user
      properties:
        buildingId:
          $ref: "#/components/schemas/BuildingIdBudget"
        buildingUnitId:
          $ref: "#/components/schemas/BuildingUnitId"
        updatedAt:
          $ref: "#/components/schemas/UpdatedAt"
        user:
          $ref: "#/components/schemas/Username"
    ProgressLogDtoForPost:
      type: object
      description: Representa o progresso de uma Obra em uma determinada data. O
        progresso é composto por uma lista de Tarefas com seus respectivos
        percentuais medidos.
      properties:
        date:
          type: string
          description: Data da Medição
          format: yyyy-MM-dd
          example: 2019-07-15
        items:
          type: array
          description: Lista de Tarefas com percentual medido. Não é necessário informar
            Tarefas que não tiveram mudanças de avanço fisíco, apenas as que
            tiverem um percentual atualizado desde a última Medição registrada.
          items:
            $ref: "#/components/schemas/ProgressLogItemDtoForPost"
          example:
            - buildingUnitId: 1
              taskId: 109
              cumulativePercentage: 80
            - buildingUnitId: 2
              taskId: 110
              cumulativePercentage: 65.5
    ProgressLogItemDtoForPost:
      type: object
      description: Representa um item de progresso de uma tarefa específica dentro de
        uma unidade construtiva, contendo seu percentual acumulado de avanço.
      properties:
        buildingUnitId:
          type: number
          description: Identificador único da Planilha de Tarefas (sheetId), que é
            representado pelo código da Unidade Construtiva.
          example: 1
        taskId:
          type: number
          description: Identificador único da tarefa no sistema de planejamento de obras
          example: 109
        cumulativePercentage:
          type: number
          description: Percentual acumulado de avanço da Tarefa
          example: 80
    ProgressLogDtoForGet:
      type: object
      description: Representa os dados básicos de uma medição de progresso do
        planejamento de obras
      properties:
        buildingId:
          type: integer
          description: Identificador único da obra utilizado para rastreamento e controle
            das medições
          example: 1
        measurementNumber:
          type: integer
          description: Identificador numérico da Medição do planejamento da obra
          example: 2
        date:
          type: string
          description: "Data da Medição no formato: yyyy-MM-dd."
          example: 2022-03-11
        responsibleId:
          type: string
          description: Id do responsável pela Medição.
          example: NOME
        responsibleName:
          type: string
          description: Nome do responsável pela Medição.
          example: NOME SOBRENOME
        consistent:
          type: boolean
          description: Retornará verdadeiro se Medição estiver consistente, caso contrário
            retornará falso.
          example: false
        statusApproval:
          type: string
          description: Código da situação de aprovação da Medição. [APROVADA, REPROVADA,
            EM_ELABORACAO, EM_APROVACAO]
          example: APROVADA
    ListOfProgressLogDtosFotGet:
      required:
        - resultSetMetadata
        - results
      type: object
      description: Lista paginada de medições de progresso do planejamento de obras
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de progresso do Planejamento de Obras retornadas como
            resultado da Requisição
          items:
            $ref: "#/components/schemas/ProgressLogDtoForGet"
          example:
            - buildingId: 1
              measurementNumber: 2
              date: 2022-03-11
              responsibleId: NOME
              responsibleName: NOME SOBRENOME
              consistent: false
              statusApproval: APROVADA
    ProgressLogDto:
      description: Representa os dados de uma medição de progresso do planejamento de
        obras, incluindo observações e unidades construtivas
      allOf:
        - $ref: "#/components/schemas/ProgressLogDtoForGet"
        - type: object
          properties:
            notes:
              type: string
              description: Observação da Medição
              example: Uma observação da Medição.
            buildingUnits:
              type: array
              description: Lista contendo apenas as Unidades Construtivas cujas Tarefas
                possuem valores medidos de avanço físico.
              items:
                $ref: "#/components/schemas/BuildingUnitDto"
    BuildingUnitDto:
      type: object
      description: Representa uma unidade construtiva de uma obra
      properties:
        id:
          type: number
          description: Id da Unidade Construtiva
          example: 1
        description:
          type: string
          description: Descrição da Unidade Construtiva
          example: Bloco A
    ListOfMeasurementItemDtos:
      required:
        - resultSetMetadata
        - results
      type: object
      description: Lista paginada de itens de uma medição específica do Planejamento
        de uma Obra.
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de itens da Medição.
          items:
            $ref: "#/components/schemas/MeasurementItemDto"
          example:
            - taskId: 1
              presentationId: 1
              summary: true
              description: Alvenaria de Tijolo Furado
              unitOfMeasurement: m2
              plannedQuantity: 1000.3254
              measuredQuantity: 102.9362
              unitPrice: 10
              cumulativePercentage: 58.56
              measureBalance: 325.4825
    MeasurementItemDto:
      type: object
      description: Representa um item de medição de uma tarefa do planejamento de obra
      properties:
        taskId:
          type: integer
          description: Código Interno da Tarefa
          example: 1
        presentationId:
          type: integer
          description: Código Visível da Tarefa
          example: 1
        summary:
          type: boolean
          description: Indica se o Item é Agrupador
          example: true
        description:
          type: string
          description: Descrição da tarefa
          example: Alvenaria de Tijolo Furado
        unitOfMeasurement:
          type: string
          description: Indica a unidade de dimensionamento físico utilizada para
            quantificar a tarefa (ex. m², m³, kg, un)
          example: m2
        plannedQuantity:
          type: number
          description: Quantidade total planejada para esta Tarefa com precisão de 4 casas
            decimais
          example: 1000.3254
        measuredQuantity:
          type: number
          description: Quantidade que foi registrada nesta medição com precisão de 4 casas
            decimais
          example: 102.9362
        unitPrice:
          type: number
          description: Preço Unitário da Tarefa, sem BDI, sem Encargos Sociais e Preço por
            Composição da Planilha. Com precisão de 2 casas decimais
          example: 25.58
        cumulativeMeasuredQuantity:
          type: number
          description: Quantidade acumulada considerando a soma deste e todos os registros
            anteriores. Com precisão de 4 casas decimais
          example: 585.735
        cumulativePercentage:
          type: number
          description: percentual acumulado considerando  a soma de todas as quantidades
            já registradas para este evento dividido pela quantidade planejada.
            Com precisão de 2 casas decimais
          example: 58.56
        measureBalance:
          type: number
          description: Saldo quantitativo a medir desta Tarefa com precisão de 4 casas
            decimais.
          example: 325.4825
    GetResponseTask:
      type: object
      description: Resposta contendo metadados e lista de tarefas do planejamento de obra
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          items:
            $ref: "#/components/schemas/TaskDtoForGet"
          example:
            - id: 10
              presentationId: 1
              description: Alvenaria de Tijolo Furado
              level: 2
              startDate: 2019-05-06
              finishDate: 2019-05-10
              duration: 4
              summary: false
              location: Bloco A
              unitOfMeasure: m2
              quantity: 23.3205
              totalPrice: 209.91
              pricesByCategory:
                - category: MATERIAL
                  totalPrice: 209.91
              plannedExecutions:
                - year: 2019
                  month: 6
                  duration: 1
                  plannedPercentage: 3.23
    TaskDtoForGet:
      type: object
      description: Representa uma tarefa no contexto do planejamento de obras,
        contendo informações essenciais como identificação, cronograma, custos,
        localização e métricas de execução. Esta estrutura é utilizada para
        retornar os dados detalhados de tarefas existentes.
      properties:
        id:
          $ref: "#/components/schemas/TaskId"
        presentationId:
          $ref: "#/components/schemas/TaskPresentationId"
        description:
          type: string
          description: Nome ou título que identifica a tarefa no planejamento da obra,
            fornecendo uma descrição clara e concisa do trabalho a ser realizado
          example: Alvenaria de Tijolo Furado
        level:
          type: number
          description: Nível da tarefa no planejamento
          example: 2
        startDate:
          type: string
          description: Data de início da tarefa no formato yyyy-MM-dd
          example: 2019-05-06
        finishDate:
          type: string
          description: Data de término da tarefa no formato yyyy-MM-dd
          example: 2019-05-10
        duration:
          type: number
          description: Duração da tarefa considerando apenas dias úteis. A configuração de
            dias úteis é feita no calendário da obra
          example: 4
        summary:
          type: boolean
          description: Indica se o registro representa um agrupamento de tarefas
          example: false
        location:
          type: string
          description: Localização de onde a tarefa foi planejada para ser realizada
          example: Bloco A
        unitOfMeasure:
          type: string
          description: Unidade de medida da tarefa
          example: m2
        quantity:
          type: number
          description: Quantidade planejada da tarefa com precisão de 4 casas
          example: 23.3205
        totalPrice:
          type: number
          description: Preço total da tarefa com precisão de 2 casas. Equivalente a soma
            dos preços totais por tipo de insumo
          example: 209.91
        pricesByCategory:
          type: array
          description: Preços da tarefa detalhados por tipo de insumo (por exemplo
            material, mão de obra e equipamento).
          items:
            $ref: "#/components/schemas/PriceByCategoryTotalPrice"
        plannedExecutions:
          type: array
          description: >
            Percentuais de execução planejados por mês.

            - A soma dos percentuais informados para cada tarefa deve ser igual
            a `100`;

            - Todos os meses compreendidos no período de execução da tarefa
            devem ser representados neste array, mesmo que o percentual de
            alguns meses seja zero. Por exemplo, se uma tarefa foi planejada
            para iniciar no dia 05 de janeiro de 2019 e terminar no dia 20 de
            março de 2019, é obrigatório informar os percentuais de execuçao de
            janeiro, fevereiro e março;

            - O preenchimento deste campo é opcional. Se o campo
            plannedExecutions não constar no JSON ou se seu valor for `NULL` ou
            um array vazio, os percentuais de execução da tarefa serão
            distribuídos de forma linear considerando as configurações do
            calendário da obra. No caso de tarefas já existentes, se as datas da
            tarefa forem alteradas sem passar a execução planejada por mês, o
            comportamento do sistema irá variar conforme as configurações do
            parâmetro `862`.
          items:
            $ref: "#/components/schemas/PlannedExecutionDtoForGet"
        costItems:
          type: array
          description: >
            Retorna as apropriações de custo da tarefa nos itens do orçamento ou
            um array vazio quando uma tarefa não possuir custos apropriados. 

            - Tarefas agrupadoras não possuem custos apropriados.

            - A soma dos percentuais de apropriação de custo, referentes a um
            mesmo item de orçamento, não pode superar 100%;

            - Uma tarefa pode ter custos apropriados em mais de um item de
            orçamento.
          example:
            - sheetItemId: "453"
              costRatio: 25
            - sheetItemId: "1687"
              costRatio: 50.5024
          items:
            $ref: "#/components/schemas/CostItemDto"
    PriceByCategoryTotalPrice:
      type: object
      description: Representa o detalhamento financeiro por categoria de insumo,
        permitindo visualizar a composição de custos de uma tarefa discriminada
        por tipo (material, mão de obra, equipamento etc), incluindo seus
        valores totais
      properties:
        category:
          type: string
          description: Tipo de insumo correspondente aos preços totais e unitários.
          example: MATERIAL
          enum:
            - EQUIPMENT
            - LABOR
            - INCREMENTAL_COST_ITEM
            - MATERIAL
            - TRANSPORT_ITEM
            - OTHER
            - OFFICE_SUPPLY
            - FUELS_AND_LUBRICANTS
            - MAINTENANCE_MATERIAL
        totalPrice:
          type: number
          description: Preço total para tipo de insumo correspondente com precisão de 2
            casas
          example: 209.91
    TaskDtoForPut:
      type: object
      description: Representa a estrutura de dados necessária para inserir ou
        atualizar uma tarefa no planejamento de obras, definindo seus atributos
        essenciais como identificação, cronograma, distribuição temporal de
        execução e vínculos com itens orçamentários
      properties:
        id:
          type: number
          description: Número sequencial que identifica unicamente a tarefa dentro do
            projeto, mantendo-se constante durante todo o ciclo de vida do
            planejamento
          example: 2
        description:
          type: string
          description: Identificador textual da tarefa que descreve seu escopo e
            finalidade dentro do planejamento da obra, permitindo sua clara
            identificação e diferenciação das demais atividades
          example: Alvenaria Estrutural
        level:
          type: number
          description: Posição hierárquica da tarefa na estrutura de decomposição do
            trabalho, onde cada nível representa um grau de detalhamento
            progressivo do planejamento
          example: 1
        startDate:
          type: string
          description: Define a data em que a atividade será iniciada dentro do cronograma
            do projeto, sendo um marco crucial para o sequenciamento das tarefas
            e controle do progresso
          example: 2019-05-06
        finishDate:
          type: string
          description: Estabelece a data limite para conclusão da atividade, servindo como
            marco final para o cálculo da duração e distribuição dos recursos
          example: 2019-05-10
        plannedExecutions:
          type: array
          description: >
            Percentuais de execução planejados por mês.

            - A soma dos percentuais informados para cada tarefa deve ser igual
            a `100`;

            - Todos os meses compreendidos no período de execução da tarefa
            devem ser representados neste array, mesmo que o percentual de
            alguns meses seja zero. Por exemplo, se uma tarefa foi planejada
            para iniciar no dia 05 de janeiro de 2019 e terminar no dia 20 de
            março de 2019, é obrigatório informar os percentuais de execuçao de
            janeiro, fevereiro e março;

            - O preenchimento deste campo é opcional. Se o campo
            plannedExecutions não constar no JSON ou se seu valor for NULL ou um
            array vazio, os percentuais de execução da tarefa serão distribuídos
            de forma linear considerando as configurações do calendário da obra.
            No caso de tarefas já existentes, se as datas da tarefa forem
            alteradas sem passar a execução planejada por mês, o comportamento
            do sistema irá variar conforme as configurações do parâmetro `862`.
          items:
            $ref: "#/components/schemas/PlannedExecutionDtoForPut"
        costItems:
          type: array
          description: >
            Apropriação de custo da tarefa nos itens do orçamento.

            - Caso o valor seja `NULL` as apropriações de custo da tarefa não
            serão atualizadas ou removidas;

            - Caso o valor seja um array vazio (`[]`) as apropriações de custo
            existentes para a tarefa serão removidas;

            - Itens de orçamento com unidades de medida diferentes não podem ser
            vinculados a uma mesma tarefa (exceto, quando permitido pelo
            parâmetro `869`);

            - A soma dos percentuais de apropriação de custo, referentes a um
            mesmo item de orçamento, não pode superar 100%;

            - Uma tarefa pode apropriar custos vinculados a mais de um item de
            orçamento.
          items:
            $ref: "#/components/schemas/CostItemDto"
    PlannedExecutionDtoForPut:
      type: object
      description: >
        Representa a distribuição mensal do percentual de execução planejado
        para uma tarefa do cronograma.

        Permite definir quanto da tarefa deve ser executada em cada mês do seu
        período de duração.
      properties:
        year:
          type: number
          description: Ano da execução. Aceita um número inteiro com, no mínimo, quatro
            casas.
          example: 2019
        month:
          type: number
          description: Mês da execução. Aceita um número inteiro entre `1` (janeiro) e
            `12` (dezembro).
          example: 4
        plannedPercentage:
          type: number
          description: Percentual de execução planejado para o respectivo mês. Aceita um
            número entre `0` e `100`, com no máximo duas casas decimais.
          example: 23.87
    PlannedExecutionDtoForGet:
      type: object
      description: >
        Detalha a distribuição mensal do percentual de execução previsto para
        cada tarefa do cronograma.

        Fornece uma visão temporal da execução, incluindo ano, mês, duração e
        percentual planejado por período.
      properties:
        year:
          type: number
          description: Ano da execução. Retorna um número inteiro.
        month:
          type: number
          description: Mês da execução. Retorna um número inteiro entre `1` (janeiro) e
            `12` (dezembro).
        duration:
          type: number
          description: Duração da tarefa, dentro do mês e ano, considerando apenas dias
            úteis. Retorna um número inteiro entre '1' e '31' (Quantidade máxima
            de dias em um mês).
        plannedPercentage:
          type: number
          description: Percentual de execução planejado para o respectivo mês. Retorna um
            número entre `0` e `100`, com no máximo duas casas decimais. A soma
            dos percentuais vai, sempre, totalizar 100.
    CostItemDto:

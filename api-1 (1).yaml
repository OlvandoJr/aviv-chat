        - $ref: "#/components/parameters/PurchaseRequestId"
      requestBody:
        required: true
        description: Lista de itens da solicitação de compra para autorização
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseRequestItemAuthorize"
      responses:
        "200":
          description: Itens autorizados
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PurchaseRequestaAuthorizeResponse"
                  - $ref: "#/components/schemas/PurchaseRequestAuthorizeResponseSucessPartial"
              examples:
                success:
                  summary: Autorização com sucesso total
                  value:
                    status: sucesso
                successPartial:
                  summary: Autorização com sucesso parcial
                  value:
                    status: sucesso_parcial
                    message: Solicitação autorizada com sucesso. Há insumos com acordo de preço
                      definido onde não foi possível realizar a geração do
                      pedido/contrato. Consulte o relatório de Relação de
                      Solicitações e confira os itens não atendidos na data
                      desta autorização.

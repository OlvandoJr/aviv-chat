        detailDescription:
          description: Descrição do detalhe do insumo do movimento de estoque.
          type: string
          example: Detalhe do insumo teste
        trademarkId:
          description: Código da marca do insumo do movimento de estoque.
          type: string
          example: "5"
        trademarkDescription:
          description: Descrição da marca do insumo do movimento de estoque.
          type: string
          example: Marca do insumo teste
        movementQuantity:
          description: Quantidade do movimento convertida para a unidade básica do insumo.
          type: number
          example: 50
        originalQuantity:
          description: Quantidade do movimento na unidade de origem, antes da conversão
            para a unidade básica.
          type: number
          example: 5
        movementValue:
          description: Valor do movimento de estoque.
          type: number
          example: 60.5
        unitOfMeasure:
          description: Descrição da unidade de movimento registrada na movimentação.
          type: string
          example: Metros
        unitOfMeasureSymbol:
          description: Sigla da unidade de movimento registrada na movimentação.
          type: string
          example: m
        baseUnitOfMeasure:
          description: Descrição da unidade básica do insumo.
          type: string
          example: unidade
        baseUnitOfMeasureSymbol:
          description: Sigla da unidade básica do insumo.
          type: string
          example: un
        supplierId:
          description: Código fornecedor do movimento de estoque
          type: integer
          example: 5
        supplierName:
          description: Nome fornecedor do movimento de estoque
          type: string
          example: Fornecedor
    GetStockMovementItemDTO:
      type: object

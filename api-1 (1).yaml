          description: "Data da resposta desta negociação no formato ISO 8601 com a
            máscara: yyyy-MM-dd"
        validity:
          type: string
          format: date
          example: 2020-12-31
          description: "Data de validade para os valores e condições negociados no formato
            ISO 8601 com a máscara: yyyy-MM-dd"
        seller:
          type: string
          example: João da Silva
          description: Nome do vendedor responsável por esta negociação
        quotedItem:
          type: string
          description: Descrição do item que foi cotado em uma na base externa
          example: Tubo de aço 3mm
          maxLength: 255
        discount:
          type: number
          format: double
          default: 0
          example: 10.1
          description: Valor de desconto da negociação
        freightType:
          $ref: "#/components/schemas/QuotationFreightTypeEnum"
        freightTypeForGeneratedPurchaseOrder:
          $ref: "#/components/schemas/FreightTypeForGeneratedPurchaseOrderEnum"
        freightPrice:
          type: number
          format: double
          default: 0
          example: 120.5
          description: Valor do frete
        valueOtherExpenses:
          type: number
          format: double
          default: 0
          example: 20.36
          description: Valor de outras despesas
        applyIpiFreight:
          type: boolean
          default: false
          example: true
          description: Aplica IPI sobre frete
        internalNotes:
          type: string
          description: Observação interna sobre a negociação
          example: Observação interna
          maxLength: 4000
        supplierNotes:
          type: string
          description: Observação sobre o fornecedor da negociação
          example: Observação do fornecedor
          maxLength: 4000
        paymentTerms:
          type: array
          description: Condições de pagamento
          items:
            $ref: "#/components/schemas/PaymentTerms"
          example:
            - description: Descrição da condição de pagamento do Fornededor X
              selected: true
              paymentTerms:
                - numberOfdays: 10
                  percentage: 100
    PurchaseQuotationItemInsert:
      description: Representa o item de cotação de preço a ser cadastrado

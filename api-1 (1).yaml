        supplierId:
          $ref: "#/components/schemas/supplierId"
    PurchaseQuotationNegotiationItemUpdate:
      description: Representa o item de negociação a ser atualizado
      type: object
      required:
        - quotedQuantity
        - negotiatedQuantity
        - unitPrice
        - discount
        - discountPercentage
        - increasePercentage
        - ipiTaxPercentage
        - issTaxPercentage
        - icmsTaxPercentage
        - freightUnitPrice
        - selectedOption
      properties:
        detailId:
          type: integer
          format: int32
          example: 1
          description: Código do detalhe do item
        trademarkId:
          type: integer
          format: int32
          example: 2
          description: Código da marca do item
        quotedQuantity:
          type: number
          format: double
          example: 10.5
          description: Quantidade cotada
        negotiatedQuantity:
          type: number
          format: double
          example: 10.5
          description: Quantidade negociada
        unitPrice:
          type: number
          format: double
          example: 5.5
          description: Preço Unitário
        discount:
          type: number
          format: double
          example: 10
          description: Valor de desconto monetário
        discountPercentage:
          type: number
          format: double
          example: 1
          description: Percentual de desconto monetário
        increasePercentage:
          type: number
          format: double
          example: 2
          description: Percentual de acréscimo monetário
        ipiTaxPercentage:
          type: number
          format: double
          example: 1
          description: Percentual de IPI (Imposto sobre Produtos Industrializados)
        issTaxPercentage:
          type: number
          format: double
          example: 2
          description: Percentual de ISS (Imposto Sobre Serviços)
        icmsTaxPercentage:
          type: number
          format: double
          example: 8
          description: Percentual de ICMS (Imposto sobre Circulação de Mercadorias e
            Serviços)
        freightUnitPrice:
          type: number
          format: double
          example: 5
          description: Preço do frete unitário
        reference:
          type: string
          example: Insumo 245
          description: Referência do item da negociação
          maxLength: 30
        selectedOption:
          type: boolean
          example: true
          description: Opção escolhida para compra
        internalNotes:
          type: string
          example: Observação interna sobre o insumo deste fornecedor
          description: Observação interna
          maxLength: 4000
        supplierNotes:
          type: string
          example: Observação sobre o fornecedor da negociação
          description: Observação do fornecedor
          maxLength: 4000
        negotiationDeliveries:
          type: array
          description: Entregas da negociação
          items:
            $ref: "#/components/schemas/PurchaseQuotationNegotiationDeliveryUpdate"
          example:
            - negotiationDeliveryNumber: 1
              deliveryDate: 2019-02-15
              deliveryQuantity: 5.5
            - deliveryDate: 2019-02-16
              deliveryQuantity: 5
    PurchaseQuotationNegotiationDeliveryUpdate:
      description: Representa a entrega da negociação a ser atualizada
      type: object
      required:
        - deliveryDate
        - deliveryQuantity
      properties:
        negotiationDeliveryNumber:
          type: integer
          format: int32
          description: Número da entrega do item da negociação
          example: 1
        deliveryDate:
          type: string
          format: date
          description: "Data da entrega no formato ISO 8601 com a máscara: yyyy-MM-dd"
          example: 2019-02-15
        deliveryQuantity:
          type: number
          format: double
          description: Quantidade da entrega
          example: 5.5
    PurchaseQuotationComparisonMapReportPdfUrl:
      description: Representa a lista de links para download dos relatórios de mapa de
        comparação.
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de links para download dos relatórios de mapa de comparação.
          items:
            $ref: "#/components/schemas/UrlReportResults"
          example:
            - urlReport: https://cliente.sienge.com.br/sienge/visualizar-relatorio?arquivo=6470620993408717174&formato=pdf
    PurchaseRequestItemDeliveryRequirementInsert:
      description: Representa a necessidade de entrega de um item de solicitação de compra.
      type: object
      required:
        - purchaseRequestId
        - purchaseRequestItemNumber
        - deliveryRequirementNumber
      properties:
        purchaseRequestId:
          example: 375
          description: Número da solicitação de compra
        purchaseRequestItemNumber:
          example: 1
          description: Número do item da solicitação de compra
        deliveryRequirementNumber:
          example: 2
          description: Número da entrega do item da solicitação de compra
    PaymentTerms:
      description: Representa as condições de pagamento de uma negociação.
      type: object
      required:
        - paymentTerms
      properties:
        description:
          type: string
          example: Descrição da condição de pagamento do Fornededor X
          description: Texto livre para a descrição da condição de pagamento
        selected:
          type: boolean
          default: false
          example: true
          description: True ou False para indicar a condição selecionada
        paymentTerms:
          type: array
          description: Lista das parcelas da condição de pagamento
          items:
            $ref: "#/components/schemas/PaymentTerm"
    PaymentTerm:
      description: Representa uma condição de pagamento.
      type: object
      required:
        - numberOfdays
        - percentage
      properties:
        numberOfdays:
          type: integer
          format: int32
          example: 10
          description: Quantidade de dias que será usado para calcular as parcelas, a
            partir da data de previsão de entrega
        percentage:
          type: number
          format: double
          example: 100
          description: Percentual da parcela referente ao valor total do pedido. A soma
            dos valores dos percentuais das parcelas deve ser 100%
    UrlReportResults:
      description: Representa os resultados de um relatório.
      type: object
      properties:
        urlReport:
          type: string
          description: Url do relatório em PDF do Mapa de Comparação.
          example: https://cliente.sienge.com.br/sienge/visualizar-relatorio?arquivo=6470620993408717174&formato=pdf
    PurchaseQuotationStatusEnum:
      type: string
      description: Status da cotação de preços.
      enum:
        - Registrada
        - Negociação em andamento
        - Negociação fechada
        - Aquisição encaminhada
        - Enviada para serviço
        - Enviada para o portal do fornecedor
        - Cancelada
      example: Registrada
    IpiShippingFlagEnum:
      type: string
      description: Indica se está sendo aplicado IPI sobre o frete.
      enum:
        - S
        - N
      example: S
    QuotationFreightTypeEnum:
      type: string
      description: Tipo do frete.
      enum:
        - NONE
        - INCLUDED
        - PAID
      default: NONE
      example: INCLUDED
    FreightTypeForGeneratedPurchaseOrderEnum:
      type: string
      description: Tipo de frete para pedidos de compra.
      enum:
        - PROPORTIONAL
        - TOTAL
      default: TOTAL
      example: PROPORTIONAL
    PurchaseQuotationId:
      type: integer
      format: int32
      example: 236
      description: Código da cotação de preços
    SupplierId:
      type: integer
      format: int32
      example: 1
      description: Código do fornecedor
    NegotiationId:
      type: integer
      format: int32
      example: 1
      description: Código da negociação
    NegotiationAuthorizedFlag:
      type: boolean
      example: true
      description: Indica se a negociação está autorizada
    NegotiationConsistentFlag:
      type: boolean
      example: true
      description: Indica se a negociação está consistente
    PurchaseRequestStatusEnum:
      type: string
      description: Status da situação da Solicitação de Compra.
      enum:
        - PENDING
        - PARTIALLY_ATTENDED
        - FULLY_ATTENDED
        - CANCELED
      example: PENDING
      readOnly: true
    PurchaseRequestConsistencyEnum:
      type: string
      description: Status da situação de consistência da Solicitação de Compra.
      enum:
        - IN_INCLUSION
        - CONSISTENT
        - INCONSISTENT
      example: IN_INCLUSION
      readOnly: true
    PurchaseRequest:
      description: Resultado da operação
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 2104
          description: Número da solicitação. Este é um campo opcional, caso não seja
            informado, o sistema gera automaticamente o número
        buildingId:
          type: integer
          format: int32
          example: 300
          description: Código da obra da solicitação
        departamentId:
          type: integer
          format: int32
          example: 5
          description: Id do departamento responsável pela solicitação
        requesterUser:
          type: string
          example: USER
          description: Usuário solicitante
        requestDate:
          type: string
          format: date
          example: 2018-01-03
          description: "Data da solicitação no formato ISO 8601 com a máscara: yyyy-MM-dd,
            exemplo: 2018-01-03"
        notes:
          type: string
          example: Annotation
          description: Observação da solicitação com restrição de 4000 caracteres.
        status:
          $ref: "#/components/schemas/PurchaseRequestStatusEnum"
        consitent:
          $ref: "#/components/schemas/PurchaseRequestConsistencyEnum"
        createdBy:
          type: string
          example: USER
          description: Usuário responsável pelo cadastro da solicitação nas informações de
            controle. Este usuário deve ter permissão na obra da solicitação.
            Campo foi renomeado a partir do campo 'registrantUser'
        createdAt:
          type: string
          example: 2018-03-11T14:20:00.000-03:00
          readOnly: true
          description: Data de criação da solicitação de compra nas informações de
            controle no formato yyyy-MM-dd'T'HH:mm:ss.SSSXXX.
        modifiedBy:
          type: string
          example: ANOTHERUSER
          readOnly: true
          description: Usuário que modificou a solicitação de compra nas informações de
            controle
        modifiedAt:
          type: string
          example: 2018-04-02T18:20:00.000-03:00
          readOnly: true
          description: Data de modificação da solicitação de compra nas informações de
            controle no formato yyyy-MM-dd'T'HH:mm:ss.SSSXXX.
        purchaseProcessCarriedOutByBuildingFlag:
          type: boolean
          example: true
          readOnly: true
          description: Retorna verdadeiro se a flag 'Processo de compra será realizado
            pela própria obra' estiver marcada. Do contrário, retorna falso.
        draft:
          type: boolean
          example: true
          readOnly: true
          description: >
            Indica se a solicitação de compra está em modo rascunho.





             * `true` - solicitação em rascunho.
             * `false` - solicitação não está em rascunho, incluindo solicitações criadas anteriormente à ativação do parâmetro de sistema 1284.

            **Observação:** com o parâmetro de sistema 1284 desabilitado, esta
            propriedade assume sempre o valor false.
    PaginatedResponseOfPurchaseRequestItem:
      description: Retorno da requisição
      type: object
      required:
        - links
        - resultSetMetadata
        - results
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          description: Lista de itens de solicitação de compra retornadas como resultado

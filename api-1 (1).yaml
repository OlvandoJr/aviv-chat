          $ref: "#/components/schemas/CompanyNameRazaoSocial"
        costCenterId:
          $ref: "#/components/schemas/CostCenterId"
        costCenterName:
          $ref: "#/components/schemas/CostCenterName"
        departmentId:
          $ref: "#/components/schemas/DepartmentId"
        departmentName:
          $ref: "#/components/schemas/DepartmentName"

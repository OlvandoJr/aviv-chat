        enterpriseId:
          type: integer
          description: Código do empreendimento do contrato da comissão.
          format: int32
          example: 789
        salesContractId:
          type: integer
          description: Id do contrato em que a comissão está vinculada.
          format: int32
          example: 101
        salesContractNumber:
          type: string
          description: Número do contrato que a comissão está vinculada.
          example: "123456"
        customerName:
          type: string
          description: Nome do cliente principal vinculado ao contrato.
          example: John Doe
        enterpriseName:
          type: string
          description: Nome do empreendimento vinculado ao contrato.
          example: Softplan
        blockEditReason:
          type: string
          description: Mensagem de razão para bloqueio da edição.
          example: Comissão bloqueada
        blockEdit:
          type: boolean
          description: Flag que indica se a edição desta comissão está bloqueada.
          example: false
        baseValue:
          type: number
          description: Valor base da comissão (valor do contrato). Formato -> 180000.00
          format: double
          example: 180000
        createdDate:
          type: string
          description: "Data de criação da comissão (Formato ISO 8601 yyyy-MM-dd |
            Exemplo: 2020-11-24)"
          format: date
          example: 2025-01-01
        released:
          type: boolean
          description: Flag que indica se a comissão está liberada.
          example: true
        brokers:
          type: array
          description: Corretores da comissão.
          items:
            $ref: "#/components/schemas/CommissionBrokerGetOneDocument"
          example:
            - id: 123
              billingBrokerId: 456
              billingBrokerName: John Doe
              billWasPaid: false
              billId: 789
              name: John Doe
              percentage: 35
              value: 28000
              firstPayment: 2025-01-01
              installmentNumbers: 12
              indexerId: 789
              baseDate: 2025-01-01
              documentNumber: "123456"
              documentId: "123456"
              installments:
                - number: 1
                  value: 1000
                  dueDate: 2025-01-01
        commissionReleaseComposition:
          type: array
          description: Lista de parcelas de previsão de uma comissão que compoem uma
            comissao liberada.
          items:
            $ref: "#/components/schemas/CommissionReleaseCompositionDocument"
          example:
            - salesContractNumber: "123456"
              billId: 123
              installmentNumber: 1
              value: 1000
              dueDate: 2025-01-01
              billingBrokerId: 789
              customerId: 101
    CommissionInsertDocument:
      description: Estrutura para criação de uma nova comissão, informando contrato,
        valor base, status de liberação e lista de corretores.
      required:
        - baseValue
        - brokers
        - salesContractId
      type: object
      properties:
        salesContractId:
          type: integer
          description: Código do contrato ao qual a comissão será vinculada.
          format: int32
          example: 123
        baseValue:
          type: number
          description: Valor base da comissão (valor do contrato). Formato -> 80000.00
          format: double
          example: 80000
        brokers:
          type: array
          description: Corretores para inclusão na comissão.
          items:
            $ref: "#/components/schemas/CommissionBrokerInsertDocument"
          example:
            - baseDate: 2025-01-01
              firstPayment: 2025-01-01
              id: 123
              indexerId: 0
              installmentsNumber: 5
              percentage: 50
              value: 80000
              documentNumber: "123"
              documentId: DOC-123
              installments:
                - number: 1
                  value: 1000
                  dueDate: 2025-01-01
        released:
          type: boolean
          description: >
            Caso "true", as comissões serão geradas com o número e código de
            documento informado em cada uma das comissões. Além disso, as
            parcelas do título serão automaticamente autorizadas para realização
            de baixa.

            Caso "false", as comissões serão geradas como "Previsão de
            Comissão". Além disso, os títulos serão gerados com o código de
            documento informado no parâmetro 753, e número de documento igual ao
            número do contrato de vendas.
          example: true
    CommissionBrokerGetOneDocument:
      description: Estrutura detalhada de um corretor vinculado a uma comissão,
        incluindo dados do corretor, títulos, valores, parcelas e status de
        pagamento.
      type: object
      properties:
        id:
          type: integer
          description: Código do corretor vinculado à comissão.
          format: int32
          example: 123
        billingBrokerId:
          type: integer
          description: Código do corretor de faturamento.
          example: 456
        billingBrokerName:
          type: string
          description: Nome do corretor de faturamento.
          example: Maria Santos
        billWasPaid:
          type: boolean
          description: Retorna se o título do corretor foi paga.
          example: false
        billId:
          type: integer
          description: Número do título a pagar gerado para este corretor.
          format: int32
          example: 789
        name:
          type: string
          description: Nome completo do corretor vinculado.
          example: João Silva
        percentage:
          type: number
          description: Porcentagem de participação do valor base. Formato -> 35.00
          example: 35
        value:
          type: number
          description: Valor total da parcela. Formato -> 28000.00
          example: 28000
        firstPayment:
          type: string
          description: Data do primeiro vencimento da parcela. Formato YYYY-MM-DD. Exemplo
            -> 1990-12-25.
          example: 2025-01-15
        installmentNumbers:
          type: number
          description: Total de parcelas.
          example: 12
        indexerId:
          type: number
          description: Indexador da parcela.
          example: 1
        baseDate:
          type: string
          description: Data base do indexador da parcela. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25.
          example: 2025-01-01
        documentNumber:
          type: string
          description: Número do documento.
          example: DOC-456
        documentId:
          $ref: "#/components/schemas/DocumentIdentificationId"
        installments:
          type: array
          description: Lista de parcelas de uma comissão.
          items:
            $ref: "#/components/schemas/CommissionBrokerInstallmentsDocument"
    CommissionBrokerInstallmentsDocument:
      description: Estrutura de uma parcela individual de comissão de corretor,
        contendo número, valor e data de vencimento.
      type: object
      properties:
        number:
          type: number
          description: Número da parcela de comissão.
          format: int32
          example: 1
        value:
          type: number
          description: Valor em R$ da parcela de comissão.
          format: double
          example: 2500
        dueDate:
          type: string
          description: Data de vencimento da parcela. Formato YYYY-MM-DD. Exemplo ->
            1990-12-31.
          example: 2025-01-31
    CommissionReleaseCompositionDocument:
      description: Estrutura de uma parcela de previsão de comissão liberada, com
        informações de contrato, título, valor, vencimento e credor.
      type: object
      properties:
        salesContractNumber:
          type: string
          description: Número do contrato ao qual a comissão está vinculada.
          example: CONT-2025-001
        billId:
          type: integer
          description: Número do título da parcela de previsão liberada.
          format: int32
          example: 1001
        installmentNumber:
          type: number
          description: Número da parcela de previsão liberada.
          format: int32
          example: 1
        value:
          type: number
          description: Valor total da parcela. Formato -> 11000.00
          example: 11000
        dueDate:
          type: string
          description: Data de vencimento da parcela. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25.
          example: 2025-02-15
        brokerId:
          type: number
          description: Id do credor.
          format: int32
          example: 123
        customerId:
          $ref: "#/components/schemas/ClientId"
    CommissionBrokerPatchDocument:
      description: Estrutura para atualização parcial dos dados de um corretor
        vinculado a uma comissão, incluindo campos obrigatórios para cálculo e
        identificação.
      required:
        - baseDate
        - documentId
        - documentNumber
        - firstPayment
        - id
        - indexerId
        - installmentsNumber
        - percentage
        - value
      type: object
      properties:
        id:
          type: number
          description: Id do corretor da comissão.
          format: int32
          example: 123
        percentage:
          type: number
          description: Porcentagem de comissão. Formato -> 35.00
          format: double
          example: 35
        value:
          type: number
          description: Valor da comissão. Formato -> 1000.00
          format: double
          example: 1000
        firstPayment:
          type: string
          description: Data do primeiro vencimento. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25.
          example: 2025-01-15
        baseDate:
          type: string
          description: Data base do indexador. Formato YYYY-MM-DD. Exemplo -> 1990-12-25.
          example: 2025-01-01
        installmentsNumber:
          maximum: 200
          minimum: 1
          type: integer
          description: Número de parcelas.
          format: int32
          example: 12
        indexerId:
          $ref: "#/components/schemas/IndexerId"
        documentNumber:
          type: string
          description: Número do documento a ser atualizado.
          example: "123"
        documentId:
          type: string
          description: Código do documento a ser atualizado.
          example: "456"
    CommissionBrokerInsertDocument:
      description: Estrutura para criação de um corretor vinculado a uma comissão,
        incluindo dados obrigatórios para cálculo, identificação e
        personalização de parcelas.
      required:
        - baseDate
        - firstPayment
        - id
        - indexerId
        - installmentsNumber
        - percentage
        - value
      type: object
      properties:
        id:
          type: integer
          description: Código do corretor a ser vinculado à comissão.
          format: int32
          example: 123
        percentage:
          type: number
          description: Porcentagem de comissão. Formato -> 12.00
          example: 12
        value:
          type: number
          description: Valor da comissão. Formato -> 1200.00
          example: 1200
        firstPayment:
          type: string
          description: Primeiro vencimento. Formato YYYY-MM-DD. Exemplo -> 1990-12-31.
          example: 2025-01-31
        baseDate:
          type: string
          description: Data base. Formato YYYY-MM-DD. Exemplo -> 1990-12-25.
          example: 2025-01-01
        installmentsNumber:
          maximum: 200
          minimum: 1
          type: integer
          description: Número de parcelas a serem geradas.
          format: int32
          example: 12
        indexerId:
          type: integer
          description: Código do indexador a ser vinculado à comissão.
          format: int32
          example: 1
        documentNumber:
          type: string
          description: >
            Número do documento.

            Este campo só é lido caso a propriedade "released", da comissão,
            seja verdadeiro. Neste caso, este campo se torna obrigatório.
          example: DOC-789
        documentId:
          type: string
          description: >
            Código do documento.

            Este campo só é lido caso a propriedade "released", da comissão,
            seja verdadeiro. Neste caso, este campo se torna obrigatório.
          example: ID-101
        installments:
          type: array
          description: Parcelas para criação da comissão, utilizado para criação
            personalizada de parcelas. Não obrigatório.
          items:
            required:
              - dueDate
              - number
              - value
            type: object
            properties:
              number:
                type: number
                description: Número da parcela (quando já criada).
                format: int32
                example: 1
              value:
                type: number
                description: Valor da parcela da comissão.
                format: double
                example: 1000
              dueDate:
                type: string
                description: Vencimento da parcela. Formato YYYY-MM-DD. Exemplo -> 1990-12-31.
                example: 2025-01-31
    CommissionInstallmentsAuthorizeDocument:
      type: object
      required:
        - authorize
        - commissions
      description: Estrutura para autorização ou desfazimento de autorização de
        parcelas de comissão, informando operação e lista de comissões/parcelas.
      properties:
        authorize:
          type: boolean
          description: |
            Operação que será realizada.
            `true` - Autoriza as parcelas.
            `false` - Desfaz autorização das parcelas.
          example: true
        commissions:
          type: array
          description: Lista das comissões e parcelas a serem autorizadas.
          items:
            $ref: "#/components/schemas/CommissionAuthorizeCancelInstallmentsDocument"
      example:
        authorize: true
        commissions: []
    CommissionAuthorizeCancelInstallmentsDocument:
      type: array
      description: Lista das comissões e parcelas.
      items:
        type: object
        properties:
          commissionId:
            type: integer
            description: ID da comissão.
            format: int32
            example: 123
          brokerId:
            type: integer
            description: ID do corretor vinculado.
            format: int32
            example: 456
          installments:
            type: array
            description: Lista das parcelas.
            items:
              type: integer
              format: int32
      example:
        - commissionId: 123
          brokerId: 456
          installments:
            - 1
            - 2
    CommissionInstallmentsCancelDocument:
      type: object
      description: Estrutura para cancelamento ou desfazimento de cancelamento de
        parcelas de comissão, informando operação e lista de comissões/parcelas.
      required:
        - cancel
        - commissions
      properties:
        cancel:
          type: boolean
          description: |
            Operação que será realizada.
            `true` - Cancela as parcelas.
            `false` - Desfaz cancelamento das parcelas.
          example: true
        commissions:
          type: array
          description: Lista das comissões e parcelas a serem canceladas.
          items:
            $ref: "#/components/schemas/CommissionAuthorizeCancelInstallmentsDocument"
        example: {}
      example:
        cancel: true
        commissions: []
    CommissionInstallmentsReleaseDocument:
      type: object
      description: Estrutura para liberação de parcelas de comissão, incluindo dados
        do corretor, documentos, datas, valor e lista de parcelas a liberar.
      required:
        - brokerId
        - documentId
        - documentNumber
        - emissionDate
        - firstPayment
        - installments
        - releases
        - value
      properties:
        documentId:
          type: string
          description: Código do documento da liberação.
          example: DOC-123
        documentNumber:
          type: string
          description: Número do documento da liberação.
          example: 123A
        installments:
          type: integer
          description: Número de parcelas da liberação.
          format: int32
          example: 12
        value:
          type: number
          description: Valor da liberação.
          format: double
          example: 1234.56
        firstPayment:
          type: string
          description: Data do primeiro vencimento. Formato YYYY-MM-DD. Exemplo ->
            1990-12-31.
          example: 1990-12-31T00:00:00.000Z
        emissionDate:
          type: string
          description: Data de emissão. Formato YYYY-MM-DD. Exemplo -> 1990-12-31.
          example: 1990-12-31T00:00:00.000Z
        brokerId:
          type: integer
          description: Código do corretor da liberação.
          format: int32
          example: 123
        billingBrokerId:
          type: integer
          description: Código do corretor para faturamento.
          format: int32
          example: 123
        releases:
          type: array
          description: Lista das comissões e parcelas que serão liberadas.
          items:
            required:
              - brokerId
              - commissionId
              - installments
            type: object
            properties:
              commissionId:
                type: integer
                description: ID da comissão liberada.
                format: int32
                example: 123
              brokerId:
                type: integer
                description: ID do corretor vinculado à comissão.
                format: int32
                example: 123
              installments:
                type: array
                description: Lista das parcelas da comissão.
                items:
                  type: integer
                  format: int32
                  example: 123
          example:
            - commissionId: 123
              brokerId: 456
              installments:
                - 1
                - 2
    CommissionGetDocument:
      description: Estrutura para retorno de consulta de múltiplas comissões, com
        metadados de paginação e lista de resultados detalhados.
      type: object
      properties:
        resultSetMetadata:
          type: object
          properties:
            count:
              type: integer
              description: Total de parcelas das comissões
              format: int32
              example: 10
            offset:
              type: integer
              description: Paginação
              example: 0
            limit:
              type: integer
              description: Limite retornado
              example: 150
        results:
          type: array
          description: Parcelas das comissões.
          items:
            type: object
            properties:
              commissionID:
                type: integer
                description: Código da comissão.
                format: int32
                example: 123
              brokerID:
                type: integer
                description: Código do corretor vinculado.
                format: int32
                example: 456
              brokerName:
                type: string
                description: Nome do corretor vinculado.
                example: João Silva
              billingBrokerId:
                type: integer
                description: Código do corretor de faturamento vinculado à comissão.
                format: int32
                example: 789
              billingBrokerName:
                type: string
                description: Nome do corretor de faturamento vinculado à comissão.
                example: Maria Santos
              enterpriseID:
                type: integer
                description: Código do empreendimento vinculado ao contrato da comissão.
                format: int32
                example: 101
              enterpriseName:
                type: string
                description: Nome do empreendimento vinculado ao contrato da comissão.
                example: Residencial Jardim das Flores
              billNumber:
                type: integer
                description: Número do título a pagar gerado para o corretor.
                format: int32
                example: 401
              contractBillNumber:
                type: integer
                description: Número do título vinculado ao contrato da comissão.
                format: int32
                example: 501
              customerID:
                type: integer
                description: Código do cliente vinculado ao contrato da comissão.
                format: int32
                example: 601
              customerName:
                type: string
                description: Nome do cliente vinculado ao contrato da comissão.
                example: Carlos Oliveira
              unitName:
                type: string
                description: Nome da unidade principal vinculada ao contrato da comissão.
                example: Apartamento 101
              salesContractNumber:
                type: string
                description: Número do contrato vinculado a comissão.
                example: CONT-2025-001
              customerSituationType:
                type: string
                description: >-
                  Utilizado para resposta visual da situação do cliente do
                  contrato. Enums:




                    `noDebts` - Contrato está em dia.
                    `inDebts` - Contrato possui pendências.
                    `cancelled` - Contrato foi distratado.
                enum:
                  - noDebts
                  - inDebts
                  - cancelled
                example: noDebts
              blockEdit:
                type: boolean
                description: Deve ou não bloquear edição de comissões no front-end (caso possua
                  baixas).
                example: false
              commissionReleasedAutomatically:
                type: boolean
                description: Indica se é uma comissão que foi criada com liberação automática.
                example: false
              value:
                type: number
                description: Valor da parcela. Formato -> 80000.00.
                example: 80000
              contractPercentagePaid:
                type: number
                description: Valor do percentual do contrato pago vinculado à comissão. Formato
                  -> 0.02.
                example: 0.02
              considerEmbeddedInterest:
                type: boolean
                description: Informa se o cálculo do percentual do contrato vinculado à comissão
                  é com ou sem juros embutido.
                example: true
              commissionReleasedToBePaid:
                type: boolean
                description: Informa se a parcela da comissão está liberada ou não para
                  pagamento.
                example: true
              dueDate:
                type: string
                description: "Data de vencimento da parcela de comissão (Formato ISO 8601
                  yyyy-MM-dd | Exemplo: 2020-11-24)."
                format: date
                example: 2025-02-15
              installmentNumber:
                type: integer
                description: Número da parcela da comissão.
                format: int32
                example: 1
              totalInstallmentsNumber:
                type: integer
                description: Quantidade total de parcelas.
                format: int32
                example: 12
              installmentPercentage:
                type: number
                description: Percentual de comissão por parcela. Formato -> 2.0.
                example: 2
              installmentStatus:
                type: string
                description: >-
                  Utilizado para resposta visual da situação da comissão. Enums:
                    `CANCELLED` - Parcela está cancelada.
                    `RELEASED` -  Parcela está liberada.
                    `AWAITING_AUTHORIZATION` - Parcela que está aguardando autorização.
                    `AWAITING_RELEASED` - Parcela que está aguardando liberação.
                    `PAID` - Parcela está paga.
                enum:
                  - CANCELLED
                  - RELEASED
                  - AWAITING_AUTHORIZATION
                  - AWAITING_RELEASE
                  - PAID
                example: RELEASED
              paymentOperationType:
                type: integer
                description: Tipo de operação de pagametento.
                format: int32
                example: 1
          example:
            - commissionID: 1
              brokerID: 101
              brokerName: João Corretor
              billingBrokerId: 201
              billingBrokerName: Corretora XPTO
              enterpriseID: 301
              enterpriseName: Residencial Flores
              billNumber: 401
              contractBillNumber: 501
              customerID: 601
              customerName: Maria Cliente
              unitName: Apto 202
              salesContractNumber: SC1234
              customerSituationType: noDebts
              blockEdit: false
              commissionReleasedAutomatically: true
              value: 80000
              contractPercentagePaid: 0.02
              considerEmbeddedInterest: false
    CommissionCountFilterDocument:
      type: object
      properties:
        all:
          type: integer
          description: Total de parcelas, sem filtro por situação.
          example: 1
        paid:
          type: integer
          description: Total de parcelas pagas.
          example: 1
        cancelled:
          type: integer
          description: Total de parcelas canceladas.
          example: 1
        awaitingAuthorization:
          type: integer
          description: Total de parcelas aguardando autorização.
          example: 1
        awaitingRelease:
          type: integer
          description: Total de parcelas aguardando liberação.
          example: 1
        released:
          type: integer
          description: Total de parcelas liberadas.
          example: 1
      description: Totalizador das parcelas das comissões.
    CommissionBrokersPatchDocument:
      description: Estrutura para atualização em lote dos dados de corretores
        vinculados a uma comissão.
      required:
        - brokers
      type: object
      properties:
        brokers:
          type: array
          description: Lista de corretores a ser adicionados na comissão.
          items:
            type: object
            properties:
              installments:
                type: array
                description: Parcelas para criação da comissão, utilizado na criação
                  personalizada de parcelas. Não obrigatório.
                items:
                  required:
                    - dueDate
                    - number
                    - value
                  type: object
                  properties:
                    number:
                      type: number
                      description: Número da parcela a ser criada.
                      format: int32
                    value:
                      type: number
                      description: Valor em R$ da parcela a ser criada.
                      format: double
                    dueDate:
                      type: string
                      description: Data de vencimento da parcela a ser criada. Formato YYYY-MM-DD.
                        Exemplo -> 1990-12-31.
      example:
        brokers:
          - installments:
              - number: 1
                value: 1000
                dueDate: 2025-01-01
    CommissionBrokersPostPatchDocument:
      description: Estrutura para atualização em lote dos dados de corretores via
        método POST, vinculados a uma comissão.
      required:
        - brokers
      type: object
      properties:
        brokers:
          type: array
          description: Corretores a serem adicionados na comissão.
          items:
            $ref: "#/components/schemas/CommissionBrokerPatchDocument"
      example:
        brokers:
          - number: 1
            value: 1000
            dueDate: 2025-01-01
            id: 10
            percentage: 35
            firstPayment: 2025-09-01
            baseDate: 2025-08-01
            installmentsNumber: 12
            indexerId: 2
            documentNumber: DOC-2025-001
            documentId: "123456"
    BrokerConfigurationPatchDocument:
      description: Estrutura para atualização dos parâmetros de configuração padrão de
        corretor, como parcelas e percentual.
      required:
        - installments
        - percentage
      type: object
      properties:
        percentage:
          type: number
          description: >
            Percentual padrão. Este valor deve ser maior que zero, e menor ou
            igual a cem. Formato aceito: 100.00000
          format: double
          example: 100
        installments:
          type: integer
          description: >
            Quantidade de parcelas padrão. O valor mínimo aceito é um, e o valor
            máximo é 200.
          format: int32
          example: 2
    BrokerConfigurationGetDocument:
      description: Estrutura de resposta para consulta das configurações padrão dos
        corretores, incluindo parcelas e percentual.
      type: object
      properties:
        resultSetMetadata:
          type: object
          properties:
            count:
              type: integer
              description: Total de configurações cadastradas
              example: 1
            offset:
              type: integer
              description: Página atual
              example: 0
            limit:
              type: integer
              description: Limite de configurações retornadas
              example: 150
        results:
          type: array
          description: Configurações dos corretores.
          items:
            type: object
            properties:
              configurationId:
                type: integer
                description: Código da configuração.
                format: int32
                example: 1
              brokerId:
                type: integer
                description: Código do corretor da configuração.
                format: int32
                example: 6
              brokerName:
                type: string
                description: Nome do corretor da configuração.
                example: João da Silva
              installments:
                type: integer
                description: Quantidade de parcelas padrão do corretor.
                format: int32
                example: 5
              percentage:
                type: number
                description: Percentual padrão do corretor. Formato -> 100.00000.
                example: 12.005
          example:
            - configurationId: 1
              brokerId: 6
              brokerName: João da Silva
              installments: 5
              percentage: 12.005
    EnterpriseConfigurationGetDocument:
      description: Estrutura de resposta para consulta de configurações de comissão
        por empreendimento, incluindo parâmetros de cálculo, limites e regras de
        liberação/cancelamento.
      type: object
      properties:
        configurationId:
          type: integer
          description: Código da configuração do empreendimento.
          format: int32
          example: 1
        enterpriseId:
          type: integer
          description: Código do empreendimento.
          format: int32
          example: 6
        indexerId:
          type: integer
          description: Código do indexador padrão.
          format: int32
          example: 7
        releasePercentageAdjustment:
          type: number
          description: Percentual para alteração do valor total da liberação das parcelas
            de comissão.
          format: double
          example: 100
        limitPercentage:
          type: number
          description: Percentual limite de comissão por contrato padrão do empreendimento.
          format: double
          example: 100
        cancelCommissionsOnContractCancelation:
          type: boolean
          description: Caso "true", quando o contrato vinculado a comissão for cancelado a
            comissão será cancelada automaticamente.
          example: true
        allowReleaseCommissionWithPendings:
          type: boolean
          description: Caso "true", deve permitir liberar comissão quando o contrato da
            comissão possuir parcelas em atraso.
          example: true
        considerOn:
          type: string
          description: >
            `NOT_CONSIDER` - Não considerar percentual pago do contrato.

            `RELEASE` - Considerar percentual pago do contrato apenas na
            liberação.

            `AUTHORIZE` - Considerar percentual pago do contrato apenas na
            autorização.
          example: RELEASE
          enum:
            - NOT_CONSIDER
            - RELEASE
            - AUTHORIZE
        percentagePaidContract:
          type: number
          description: >
            Percentual pago do contrato a ser considerado para autorização ou
            liberação de pagamento da comissão, conforme configurado no campo
            "considerOn".
          example: 100
        embeddedInterest:
          type: boolean
          description: >
            Caso "true", considera percentual pago do contrato com juros
            embutidos, conforme configurado no campo "percentagePaidContract".
          example: true
    EnterpriseConfigurationPutDocument:
      type: object
      description: Estrutura para atualização de configurações de comissão por
        empreendimento.
      properties:
        indexerId:
          type: integer
          description: Código do indexador da parcela.
          format: int32
          example: 7
        limitPercentage:
          type: number
          description: Percentual limite de comissão por contrato para o empreendimento.
          format: double
          example: 100
        releasePercentageAdjustment:
          type: number
          description: Percentual para alteração do valor total das parcelas para
            liberação de comissão.
          format: double
          example: 100
        cancelCommissionsOnContractCancelation:
          type: boolean
          description: Caso "true", ao cancelar o contrato vinculado a comissão, a mesma
            será cancelada automaticamente.
          example: true
        allowReleaseCommissionWithPendings:
          type: boolean
          description: Caso "true", deve permitir liberar comissão quando o contrato
            vinculado a comissão possuir parcelas em atraso.
          example: true
        considerForPayment:
          type: object
          properties:
            considerOn:
              type: string
              description: >
                `NOT_CONSIDER` - Não considerar percentual pago do contrato.

                `RELEASE` - Considerar percentual pago do contrato na liberação.

                `AUTHORIZE` - Considerar percentual pago do contrato na
                autorização.
              example: RELEASE
              enum:
                - NOT_CONSIDER
                - RELEASE
                - AUTHORIZE
            percentagePaidContract:
              type: number
              description: Percentual pago do contrato a ser considerado para autorização ou
                liberação de pagamento da comissão, conforme configurado no
                campo "considerOn".
              format: double
              example: 100
            embeddedInterest:
              type: boolean
              description: Caso "true", considera percentual pago do contrato com juros
                embutidos, conforme configurado no campo
                "percentagePaidContract".
              example: true
          description: Considerar para pagamento na liberação ou autorização.

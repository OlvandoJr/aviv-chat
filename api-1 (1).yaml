          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      description: Retorna um array com as tarefas da versão atual da planilha de
        planejamento de uma obra, sendo uma planilha para cada unidade
        construtiva (building unit). O planejamento em questão é identificado
        pelo respectivo código da obra (buildingId), considerando por padrão a
        versão atual do planejamento. (REST)
    put:
      tags:
        - Planejamentos de Obra
      summary: Insere tarefas na planilha de planejamento da obra
      operationId: putBuildingProjectsIdSheetsIdTasks
      parameters:
        - $ref: "#/components/parameters/BuildingIdPath"
          description: Identificador numérico único da construção no sistema, utilizado
            para localizar o planejamento específico a ser manipulado
        - name: buildingUnitId
          in: path
          description: Identificador numérico único da unidade construtiva onde as tarefas
            serão inseridas ou consultadas no planejamento da obra
          required: true
          schema:
            type: integer
            format: int32
        - name: allowDeleteTaskCostItem
          in: query
          description: Permite deletar qualquer custo tarefa vinculado à uma tarefa.
          schema:
            type: boolean
            default: true
      requestBody:
        description: >-
          Tarefas que serão inseridas.

            Nível das tarefas: Deve ser sempre maior que zero. Não pode haver "gaps" entre as tarefas, ou seja, uma tarefa de nível 1 deve ser sucedida por uma nível 2, porém como as tarefas são inseridas na ordem da estrutura do planejamento, uma tarefa de nível 3 pode ser sucedida por uma de nível 2, 1 ou 4, nunca por uma nível 5;

            Datas de início e fim: Devem observar o intervalo de início e fim da obra;

            Custos: Quando o "costItems" não for informado no body ou for informado como null, os custos não sofrerão qualquer modificação. Quando informado um array, todos os custos existentes serão excluídos e substituídos pelos custos informados no array. Portanto, se o array for vazio, irá apagar todos os custos.

            Se for enviar o Custo de Tarefas, procure enviar de todas que realmente possuem. Isso permitirá realizar análises mais precisas do payload da requisição quando alguma validação ou erro ocorrer.
        content:
          application/json:
            schema:
              type: array
              example:
                - id: 1
                  description: Alvenaria de tijolo vazado
                  level: 1
                  startDate: 2019-06-20
                  finishDate: 2019-08-13
                - id: 2
                  description: Assentamento de alvenaria
                  level: 2
                  startDate: 2019-06-20
                  finishDate: 2019-08-13
                  plannedExecutions:
                    - year: 2021
                      month: 1
                      plannedPercentage: 3.23
                    - year: 2021
                      month: 2
                      plannedPercentage: 64.51
                    - year: 2021
                      month: 3
                      plannedPercentage: 32.26
                  costItems:
                    - sheetItemId: "453"
                      costRatio: 25
                    - sheetItemId: "1687"
                      costRatio: 50.5024
                - id: 3
                  description: Pintura Latex
                  level: 1
                  startDate: 2019-06-30
                  finishDate: 2019-07-05
                - id: 4
                  description: Preparo da supefície
                  level: 2
                  startDate: 2019-06-30
                  finishDate: 2019-07-02
                - id: 5
                  description: Aplicação de tinta
                  level: 2
                  startDate: 2019-07-02
                  finishDate: 2019-07-05
              items:
                $ref: "#/components/schemas/TaskDtoForPut"
        required: true
      responses:
        "204":
          description: Sem conteúdo
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "415":
          $ref: "#/components/responses/415"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      x-original-file: building-projects-v1.yaml
      description: Insere um array de tarefas em uma nova versão da planilha de
        planejamento de uma obra, sendo uma planilha para cada unidade
        construtiva (building unit). O planejamento em questão é identificado
        pelo respectivo código da obra (buildingId), considerando por padrão a
        versão atual do planejamento. (REST)
      x-audience:
        - public

    Order:
      description: Dados do pedido de compra
      type: object
      example:
        id: 1
        status: 4
        authorized: true
        consitent: false
        supplierId: 10
        buildingId: 15
        buyerId: comprador
        orderDate: 2018-03-11
        salesRepresentativeId: REP001
      properties:
        id:
          type: integer
          description: Id do pedido de compra
          format: int64
          example: 1
        status:
          type: integer
          description: |-
            As situações do pedido de compra são representados pelos números:
              1 - "Pendente",
              2 - "Parcialmente entregue",
              3 - "Totalmente atendido",
              4 - "Cancelado"
          format: int64
          example: 4
        authorized:
          type: boolean
          description: Retornará verdadeiro se pedido de compra estiver autorizado, caso
            contrário retornará falso.
          example: true
        consitent:
          type: boolean
          description: Retornará verdadeiro se pedido de compra estiver consiteste, caso
            contrário retornará falso.
          example: false
        supplierId:
          type: integer
          description: Id do fornecedor
          format: int64
          example: 10
        buildingId:
          type: integer
          description: Id da obra
          format: int64
          example: 15
        buyerId:
          type: string
          description: Id do comprador (Usuário do Sienge)
          example: comprador
        orderDate:
          type: string
          description: "Data do pedido de compra no formato: yyyy-MM-dd."
          example: 2018-03-11
        salesRepresentativeId:
          type: string
          description: Id do representante de venda
          example: REP001
        costCenterId:
          type: integer
          description: Id do centro de custo
          format: int64
          example: 100
        departamentId:
          type: integer
          description: Id do departamento
          format: int64
          example: 1
        companyBillId:
          type: integer
          description: Id da empresa de cobrança
          format: int64
          example: 5
        transporterId:
          type: integer
          description: Id do transportador
          format: int64
          example: 3
        forecastDocumentId:
          type: string
          description: Id do documento de previsão
          example: PPC
        forecastBillId:
          type: integer
          description: Número do título de previsão
          format: int64
          example: 1990
        discount:
          type: number
          description: Valor do desconto
          format: double
          example: 30.15
        increase:
          type: number
          description: Outras despesas
          format: double
          example: 5.1
        totalAmount:
          type: number
          description: Total do pedido de compra
          format: double
          example: 15200.85
        directBillingDocumentId:
          type: string
          description: Código do documento de pré-faturamento direto
          example: CT
        directBillingContractNumber:
          type: string
          description: Número do contrato de pré-faturamento direto
          example: "221"
        directBillingJustificationId:
          type: integer
          description: Id da justificativa de pré-faturamento direto
          format: int64
          example: 2

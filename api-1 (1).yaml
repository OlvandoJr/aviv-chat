            por este indexador, exceto os preços base.

            - Se este parâmetro não for informado, nenhuma correção será
            realizada.

            - Se este parâmetro for informado, o parâmetro "adjustmentDate" deve
            ser informado obrigatoriamente.
          required: false
          schema:
            type: integer
            format: int32
            example: 3
        - name: adjustmentDate
          in: query
          description: "Data para correção monetária do indexador. Os preços e valores
            monetários retornados pela API serão corrigidos para essa data,
            exceto os preços base. Formato da data: yyyy-mm-dd (notação
            full-date definida no RFC 3339)"

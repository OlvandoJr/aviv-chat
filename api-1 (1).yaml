      type: object
      properties:
        id:
          type: integer
          description: Número da parcela.
          format: int32
          example: 1
        dueDate:
          $ref: "#/components/schemas/DueDate"
        amount:
          $ref: "#/components/schemas/InstallmentValue"
        status:
          type: string
          description: Situação atual da parcela (Aguardando autorização, Autorizada,
            Liberada, Totalmente paga, Cancelada).
          example: Aguardando autorização
    CommissionForecast:
      description: Objeto de previsão de comissão a ser criada para um contrato e corretor.
      required:
        - brokerId
        - contractId
        - dueDate
      type: object
      properties:
        contractId:
          type: integer
          description: Código do contrato de vendas que será vinculado.
          format: int32
          example: 1001
        brokerId:
          type: integer
          description: Código do corretor que será vinculado.
          format: int32
          example: 501
        rate:
          maximum: 100
          minimum: 0.01
          type: number
          description: Percentual de comissão. Formato -> 00.00 <br/> Não é obrigatório
            informar caso o 'value' seja informado, porém um dos dois devem ser
            informados. <br/> Se os dois campos ('rate' e 'value') forem
            informados será validado se os valores estão corretos, com base no
            valor total do contrato.
          format: double
          example: 5.5
        value:
          type: number
          description: Valor de comissão. Formato -> 0000000000.00 <br/> Não é obrigatório
            informar caso o 'rate' seja informado, porém um dos dois devem ser
            informados. <br/> Se os dois campos ('rate' e 'value') forem
            informados será validado se os valores estão corretos, com base no
            valor total do contrato.
          format: double
          example: 1000
        dueDate:
          type: string
          description: Data de vencimento da primeira parcela. <br/> Formato YYYY-MM-DD.
            Exemplo -> 2019-06-01. <br/>
          format: date
          example: 2024-09-01T00:00:00.000Z
        indexerId:
          type: integer
          description: Código do indexador para correção. Caso não seja informado, será
            considerado o indexador neutro.
          format: int32
          example: 10
        baseDate:
          type: string
          description: Data base pra correção. <br/> Formato YYYY-MM-DD. Exemplo ->
            2019-06-01. <br/> Caso não seja informado ou seja informado uma data
            que não possua valor cadastrado para o indexador ('indexerId'), será
            considerado a última data dísponível.
          format: date
          example: 2024-09-01T00:00:00.000Z
        installmentsNumber:
          type: integer
          description: Quantidade de parcelas. <br/> Caso não seja informado, será
            considerado uma parcela.
          format: int32
          example: 3
        type:
          maxLength: 1
          minLength: 1
          type: string
          description: "Tipo de comissão. Valores possíveis: <br/> 'V' - Vendas <br/> 'G'
            - Gerenciamento <br/> Caso não seja informado, será considerado
            'V'."
          example: V
    CommissionGetOneDocument:
      description: Estrutura detalhada de uma comissão específica, incluindo
        informações do cliente, empreendimento, contrato, status de liberação,
        corretores e composição de parcelas.
      type: object
      properties:
        id:
          type: integer
          description: Id da comissão
          format: int32
          example: 123

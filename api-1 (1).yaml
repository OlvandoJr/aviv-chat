        movementTypeId: 1
        movementTypeDescription: COMPRA
        inputOutput: INPUT
        movementDate: 2024-01-01
        costCenterId: 1001
        buildingId: 100101
        resourceId: 20
        resourceDescription: Insumo teste
        detailId: 3
        detailDescription: Detalhe do insumo teste
        trademarkId: "5"
        trademarkDescription: Marca do insumo teste
        movementQuantity: 50
        originalQuantity: 5
        movementValue: 60.5
        unitOfMeasure: Metros
        unitOfMeasureSymbol: m
        baseUnitOfMeasure: unidade
        baseUnitOfMeasureSymbol: un
        supplierId: 5
        supplierName: Fornecedor
        sourceId: NF/12575/15
        sourceType: MOVIMENTO_ESTOQUE
      allOf:
        - $ref: "#/components/schemas/GetStockMovementDTO"
        - type: object
          properties:
            sourceId:
              description: Código identificador da origem da movimentação de estoque. No caso
                de a movimentação ser originada de um movimento de estoque, o
                identificador é o resultado de uma concatenação entre o código
                do documento, o número do movimento e o número do item do
                movimento.
              type: string
              example: NF/12575/15
            sourceType:
              description: Descrição da origem da movimentação de estoque.
              type: string
              enum:
                - NOTA_FISCAL_COMPRA
                - MOVIMENTO_ESTOQUE
              example: MOVIMENTO_ESTOQUE
    GetResponseReservationItems:
      description: Representa a lista de itens da reserva de estoque
      type: object
      properties:
        resultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
        results:
          type: array
          items:
            $ref: "#/components/schemas/StockReservationItemDto"
          example:
            - itemId: 3
              resource:
                id: 1001
                description: Cimento Portland
                detail:
                  id: 3
                  description: CP II-E-32
                trademark:
                  id: 42
                  description: ACME SA
              destinationResource:
                id: 1001
                description: Areia
              quantity: 33.4444
              unitOfMeasure: kg
              notes: Lorem ipsum dolor sit amet.
              deliveries:
                - date: 2020-04-28
                  quantity: 4.2222
                  deliveredQuantity: 2.1111
                  cancelled: false
    StockReservationItemDto:
      type: object
      description: Dados do item da reserva.
      properties:
        itemId:
          description: Identificador único e imutável do item de reserva.
          type: integer
          example: 3
        resource:
          description: Dados do insumo. Pode ser null.
          type: object
          properties:
            id:
              description: Código do insumo.
              type: integer
              example: 1001
            description:
              description: Descrição do insumo.
              type: string
              example: Cimento Portland
            detail:
              description: Detalhe do insumo. Pode ser null.
              type: object
              properties:
                id:
                  description: Código do detalhe.
                  type: integer
                  example: 3
                description:
                  description: Descrição do detalhe.
                  type: string
                  example: CP II-E-32
            trademark:
              description: Marca do insumo. Pode ser null.
              type: object
              properties:
                id:
                  description: Código da marca.
                  type: integer
                  example: 42
                description:
                  description: Descrição da marca.
                  type: string
                  example: ACME SA
        destinationResource:
          description: Dados do insumo destino. Pode ser null. Este campo só será
            preenchido caso seja uma reserva para transferência entre obras com
            diferentes tabelas de insumo. Nesses casos, esse campo conterá os
            dados do insumo na obra destino.
          type: object
          properties:
            id:
              description: Código do insumo destino.
              type: integer
              example: 1001
            description:
              description: Descrição do insumo destino.
              type: string
              example: Cimento Portland
        quantity:
          description: Quantidade reservada para este insumo.
          type: number
          example: 33.4444
        unitOfMeasure:
          description: Símbolo da unidade de movimento a qual a quantidade se refere.
          type: string
          example: kg
        notes:
          description: Observações do item de reserva. Pode ser null.
          type: string
          example: Lorem ipsum dolor sit amet.
        deliveries:
          description: Saídas da reserva.
          type: array
          items:
            $ref: "#/components/schemas/DeliveryDto"
    DeliveryDto:
      type: object
      description: Dados da saída para um insumo.
      properties:
        date:
          description: Data da saída para um insumo no formato YYYY-MM-DD de acordo com a
            norma ISO 8601.
          type: string
          example: 2020-04-28
        quantity:
          description: Quantidade da saída.
          type: number
          example: 4.2222
        deliveredQuantity:
          description: Quantidade atendida para esta saída.
          type: number
          example: 2.1111
        cancelled:
          description: |-
            Indica que o saldo restante* desta saída foi cancelada.

            *(quantidade da saída - quantidade atendida)
          type: boolean
          example: false
    MovementPostDto:
      type: object
      description: Informações para inclusão de um movimento de estoque que pode ser
        de entrada ou de saída. O que vai determinar se o movimento é de entrada
        ou de saída, é o tipo de movimento que é informado no campo
        movementTypeId. O movimento cadastrado representa a entrada ou saída de
        estoque de um ou mais insumos.
      properties:
        documentId:
          description: Código do (tipo de) documento. Deve referenciar um documento já
            cadastrado no Sienge.
          type: string
          example: CONS
        movementNumber:
          description: Número do movimento. Aceita valores com no máximo 12 caracteres.
          type: string
          example: "132"
        movementDate:
          description: Data do movimento no formato YYYY-MM-DD de acordo com a norma ISO
            8601.
          type: string
          example: 2020-04-28
        movementTypeId:
          description: Código do tipo de movimento. Deve referenciar um tipo de movimento
            ativo, já cadastrado no Sienge. É o tipo de movimento informado aqui
            que vai determinar se o movimento que está sendo criado é de entrada
            ou de saída, pois isso já estará definido no próprio cadastro do
            tipo de movimento. Apenas tipos de movimento que são exclusivamente
            de entrada ou de saída serão aceitos aqui. Ou seja, tipos que
            referem-se à movimentos que são simultaneamente de entrada e saída,
            como transferências ou realocações de estoque, não serão aceitos.
          type: integer
          example: 2
        costCenterId:
          description: Código do centro de custo do movimento. Deve referenciar um centro
            de custo já cadastrado no Sienge.
          type: integer
          example: 47
        departmentId:
          description: Código do departamento do movimento. Deve referenciar um
            departamento já cadastrado no Sienge. Essa informação só será
            armazenada nos movimentos do tipo "Devolução". Além disso, de acordo
            com as configurações definidas no parâmetro 293 do Sienge, esse
            campo pode ou não ser obrigatório para movimentos de devolução.
          type: integer
          example: 3
        notes:
          description: Observações do movimento. Campo opcional.
          type: string
          example: Lorem ipsum dolor sit amet.
        items:
          description: Array com os itens (insumos) que estão sendo movimentados. Deve ser
            informado pelo menos um item.
          type: array
          items:
            $ref: "#/components/schemas/MovementItemPostDto"
      example:
        documentId: CONS
        movementNumber: "132"
        movementDate: 2020-04-28
        movementTypeId: 2
        costCenterId: 47
        departmentId: 3
        notes: Lorem ipsum dolor sit amet.
        items:
          - resourceId: 1001
            detailId: 3
            trademarkId: 18
            quantity: 3000.2348
            unitPrice: 200.4321
            unitOfMeasure: sc
            buildingAppropriations:
              - buildingUnitId: 2
                sheetItemId: 42
                percentage: 100
    MovementItemPostDto:
      type: object
      description: Informações de um insumo (combinação de insumo, detalhe e marca)
        que está sendo movimentado no estoque.
      properties:
        resourceId:
          description: Código do insumo. Deve referenciar um insumo ativo, já cadastrado
            no Sienge, na obra do respectivo centro de custo do movimento.
          type: integer
          example: 1001
        detailId:
          description: Código do detalhe. Campo opcional. Se for preenchido, deve
            referenciar um detalhe ativo, já cadastrado no Sienge, associado ao
            respectivo insumo da obra.
          type: integer
          example: 3
        trademarkId:
          description: Código da marca. Campo opcional. Se for preenchido, deve
            referenciar uma marca ativa, já cadastrada no Sienge, associada ao
            respectivo insumo da obra.
          type: integer
          example: 18
        quantity:
          description: Quantidade movimentada do insumo, referindo-se à unidade de
            movimento que está sendo informada (ex. sacos, unidades, quilos
            etc.). Aceita apenas números maiores que zero, com até 4 casas
            decimais.
          type: number
          example: 3000.2348
        unitPrice:
          description: Preço unitário do insumo. Em movimentos de entrada o preço é
            obrigatorio, em movimentos de saída este campo é desconsiderado,
            pois considerará o preço existente no Sienge. Aceita apenas valores
            maiores que zero, com até 4 casas decimais.
          type: number
          example: 200.4321
        unitOfMeasure:
          description: Símbolo da unidade de movimento a qual a quantidade se refere. Deve
            referenciar uma unidade de movimento ativa, já cadastrada no Sienge,
            associada ao respectivo insumo da obra.
          type: string
          example: sc
        buildingAppropriations:
          description: >-
            Apropriações de obra do insumo que está sendo movimentado. Esse
            conjunto de itens representa um rateio da quantidade movimentada do
            insumo, entre um ou mais itens do orçamento da obra do centro de
            custo do movimento. Os itens de orçamento referenciados em cada item
            de apropriação devem ser do nível (na estrutura analítica do
            orçamento) correspondente ao nível de apropriação definido na
            respectiva obra (por exemplo: etapa, subetapa, serviço etc.).
            Importante: se a obra do movimento possuir nível de apropriação
            definido como "obra", este campo não deve ser preenchido, ou o array
            deve estar vazio, já que nesses casos não pode haver apropriação a
            nível de itens de orçamento.

            Caso o parâmetro 833 estiver configurado como apropriação
            automática, as apropriações serão aplicadas automaticamente para os
            itens de saída conforme descrição acima.
          type: array
          items:
            $ref: "#/components/schemas/BuildingAppropriationItemPostDto"
    BuildingAppropriationItemPostDto:
      type: object
      description: Item que faz parte de um conjunto de apropriações de obra de um
        insumo movimentado. Referencia um item do orçamento de obra, com o
        respectivo percentual de rateio.
      properties:
        buildingUnitId:
          description: Código da unidade construtiva. Deve referenciar uma unidade
            construtiva já cadastrada no Sienge, na obra do respectivo centro de
            custo do movimento e que esteja com a situação "Liberada".
          type: integer
          example: 2
        sheetItemId:
          description: Identificador do item de orçamento. Deve referenciar um item de
            orçamento já cadastrado no Sienge, na respectiva planilha de
            orçamento (considerando a obra do centro de custo do movimento e a
            unidade construtiva informada). Além disso, o item de orçamento não
            pode estar bloqueado para apropriações e não pode estar duplicado
            dentro do mesmo item de movimento.
          type: integer
          example: 42
        percentage:
          description: Percentual de rateio do respectivo item de orçamento nas
            apropriações de obra do insumo. Deve ser um número maior que zero,
            menor ou igual a 100, com precisão de até 12 casas decimais. A soma
            dos percentuais de todos os itens de apropriação de um insumo
            movimentado deve ser igual a 100.
          type: number
          example: 100
    ReservationMovementPostDto:
      description: Representa o movimento de reserva a ser cadastrado
      type: object
      properties:
        documentId:
          description: Identificador do (tipo de) documento. Deve referenciar um documento
            já cadastrado no Sienge.
          type: string
          example: CONS
        movementNumber:
          description: Número do movimento de reserva. Aceita valores com no máximo 12
            caracteres. Não pode existir um movimento com a mesma combinação
            documento/número. Caso o campo não seja informado será gerado um
            número para o movimento.
          type: string
          example: "132"
        sourceDepartmentId:
          description: Código do departamento para apropriação de origem. Deve referenciar
            um departamento já cadastrado no Sienge. Essa informação só será
            armazenada em reservas de entrada e saída (exemplo transferência).
            Além disso, de acordo com as configurações definidas no parâmetro
            293 do Sienge, esse campo pode ou não ser obrigatório.
          type: integer
          example: 3
        destinationDepartmentId:
          description: Código do departamento para apropriação de destino. Deve
            referenciar um departamento já cadastrado no Sienge. Essa informação
            só será armazenada em reservas de entrada e saída (exemplo
            transferência). Além disso, de acordo com as configurações definidas
            no parâmetro 293 do Sienge, esse campo pode ou não ser obrigatório.
          type: integer
          example: 3
        items:
          description: Lista de insumos da reserva que estarão no movimento a ser gerado.
          type: array
          items:
            description: Dados do insumo e de suas saídas que estarão no movimento a ser
              gerado.
            type: object
            properties:
              itemId:
                description: Id único e imutável do item de reserva.
                type: integer
                example: 3
              deliveries:
                description: Lista de saídas que serão atendidas.
                type: array
                items:
                  description: Dados do atendimento da saída.
                  type: object
                  properties:
                    date:
                      description: Data da saída no formato YYYY-MM-DD de acordo com a norma ISO 8601.
                      type: string
                      example: 2020-04-28
                    movementAmount:
                      description: Quantidade atendida pelo movimento para esta saída. Deve ser maior
                        que 0 e não pode ser maior que o valor disponível nesta
                        saída. Com precisão de até 4 casas decimais.
                      type: number
                      example: 4.2222
              buildingAppropriations:
                description: 'Apropriações de obra origem do insumo que está sendo movimentado.
                  Esse conjunto de itens representa um rateio da quantidade
                  movimentada do insumo, entre um ou mais itens do orçamento da
                  obra do centro de custo do movimento. Os itens de orçamento
                  referenciados em cada item de apropriação devem ser do nível
                  (na estrutura analítica do orçamento) correspondente ao nível
                  de apropriação definido na respectiva obra (por exemplo:
                  etapa, subetapa, serviço etc.). Importante: se a obra do
                  movimento possuir nível de apropriação definido como "obra",
                  este campo não deve ser preenchido, ou o array deve estar
                  vazio, já que nesses casos não pode haver apropriação a nível
                  de itens de orçamento.'
                type: array
                items:
                  $ref: "#/components/schemas/BuildingAppropriationItemPostDto"
              destinationBuildingAppropriations:
                description: "Apropriações da obra destino. Este campo deve ser preenchido
                  somente quando o movimento for do tipo entrada e saída
                  (exemplo: transferência) e a obra destino exigir apropriação
                  em itens de orçamento (exemplo: etapa, subetapa, serviço
                  etc.). Caso contrário, este campo não deve ser preenchido ou o
                  array deve estar vazio."
                type: array
                items:
                  $ref: "#/components/schemas/BuildingAppropriationItemPostDto"
      example:
        documentId: CONS
        movementNumber: "132"
        sourceDepartmentId: 3
        destinationDepartmentId: 3
        items:
          - itemId: 3
            deliveries:
              - date: 2020-04-28
                movementAmount: 4.2222
            buildingAppropriations:

    SalesContractBulkDocument:
      description: Representa um contrato de vendas retornado pela API.
      type: object
      properties:
        id:
          type: integer
          description: Código do contrato de vendas retornado.
          format: int32
          example: 123
        enterpriseId:
          type: integer
          description: Código do empreendimento do contrato.
          format: int32
          example: 456
        receivableBillId:
          type: integer
          description: Número do título a receber.
          format: int32
          example: 789
        refundBillId:
          type: integer
          description: Número do título de devolução (caso contrato seja cancelado).
          format: int32
          example: 101
        proRataIndexer:
          type: integer
          description: Código do indexador de pró-rata. Usado apenas para acréscimo de
            mora mensal.
          format: int32
          example: 1
        number:
          allOf:
            - $ref: "#/components/schemas/ContractNumber"
            - type: string
              example: CV1234
        situation:
          type: string
          description: Situação do contrato. (Solicitado, Autorizado, Emitido ou Cancelado).
          example: Emitido
        externalId:
          type: string
          description: Identificador externo.
          example: EXT-001
        note:
          type: string
          description: Observação do contrato.
          example: Contrato emitido via canal digital.
        cancellationReason:
          type: string
          description: Descrição do motivo de cancelamento.
          example: Cliente mudou de ideia
        interestType:
          type: string
          description: Tipo de juros para acréscimos de mora.
          example: Simples
        lateInterestCalculationType:
          type: string
          description: Tipo de cálculo de acréscimos de mora.
          example: Mensal
        financialInstitutionNumber:
          type: string
          description: Número da instituição financeira.
          example: "001"
        discountType:
          type: string
          description: Tipo de desconto do contrato.
          example: Nenhum
        correctionType:
          type: string
          description: Tipo de correção.
          example: IGPM
        anualCorrectionType:
          type: string
          description: Tipo de correção anual.
          example: Anual
        associativeCredit:
          type: string
          description: Indica se tem crédito associativo.
          example: Não
        discountPercentage:
          type: number
          description: Percentual de desconto do contrato.
          example: 0
        value:
          type: number
          description: Valor do contrato.
          example: 150000
        commissionPercentage:
          type: number
          description: Percentual de comissão do corretor.
          example: 3
        commissionValue:
          type: number
          description: Valor da comissão do corretor.
          example: 10500
        totalSellingValue:
          type: number
          description: Valor total de venda.
          example: 155000
        interestPercentage:
          type: number
          description: Percentual de juros ao mês para acréscimos de mora. Usado apenas
            para acréscimo de mora mensal.
          format: double
          example: 1.5
        fineRate:
          type: number
          description: Percentual de multa para acréscimo de mora. Usado apenas para
            acréscimo de mora mensal.
          format: double
          example: 2
        dailyLateInterestValue:
          type: number
          description: Valor de mora diário em reais.
          format: double
          example: 10
        creationDate:
          type: string
          description: Data da criação do contrato. Formato YYYY-MM-DD. Exemplo ->
            1990-12-25.
          example: 2022-01-01
        contractDate:
          type: string
          description: Data do contrato.
          example: 2022-01-05
        issueDate:
          type: string

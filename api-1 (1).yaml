    ResponsePropertyRentalInsertDocument:
      type: object
      description: Resposta de criação do contrato de locação de imóveis.
      properties:
        contractSeqId:
          type: integer
          format: int32
          description: Código sequencial do contrato.
          example: 101
    BodyPostPorpertyRentalDocument:
      required:
        - accountDate
        - companyId
        - contractDate
        - enterpriseId
        - finalRentalDate
        - initialRentalDate
        - paymentCategoriesId
        - paymentCondition
        - rentalContractNumber
      type: object
      description: Objeto para criação de contrato de locação de imóveis.
      properties:
        companyId:
          type: integer
          description: Código da empresa do contrato de locação sendo inserido.
          format: int32
          example: 1
        enterpriseId:
          type: integer
          description: Código do empreendimento do contrato de locação sendo inserido.
          format: int32
          example: 1
        rentalContractNumber:
          maxLength: 12
          type: string
          description: Número do contrato de locação sendo inserido.
          example: "123456"
        paymentCategoriesId:
          type: string
          description: Plano financeiro do contrato de locação sendo inserido.
          example: "10101"
        contractType:
          type: string
          description: Tipo de Contrato.
          enum:
            - RESIDENCIAL
            - COMERCIAL
            - TEMPORADA
          example: RESIDENCIAL
        contractDate:
          type: string
          description: Data do contrato de locação sendo inserido.
          example: 2025-01-01
        accountDate:
          type: string
          description: Data contábil do contrato de locação sendo inserido.
          example: 2025-01-01
        initialRentalDate:
          type: string
          description: Data inicial do contrato.
          example: 2025-01-01
        finalRentalDate:
          type: string
          description: Data final do contrato.
          example: 2025-01-01
        allowReadjustment:
          type: boolean
          description: Editar Reajuste.
          example: true
        allowEditInstallment:
          type: boolean
          description: Editar Parcelas.
          example: true
        note:
          maxLength: 4000
          type: string
          description: Observação.
          example: Observação
        paymentCondition:
          required:
            - bearerId
            - conditionTypeId
            - firstPayment
            - installmentBaseValue
            - installmentsNumber
          type: object
          properties:
            conditionTypeId:
              type: string
              description: Tipo de condição.
              example: "1"
            installmentBaseValue:
              type: number
              description: Valor da parcela de locação.
              example: 100
            installmentsNumber:
              type: integer
              description: Quantidade de parcelas da condição do contrato de locação.
              example: 12
            firstPayment:
              type: string
              description: Data do primeiro vencimento.
              example: 2025-01-01
            bearerId:
              type: integer
              description: Código do portador da condição do contrato de locação.
              example: 1
          example:
            conditionTypeId: PM
            installmentBaseValue: 100
            installmentsNumber: 12
            firstPayment: 2025-01-01
            bearerId: 1
        installments:
          type: array
          items:
            required:
              - amount
              - dueDate
            type: object
            properties:
              amount:
                type: number
                description: Valor da parcela do contrato de locação.
                example: 100
              dueDate:
                type: string
                description: Data de vencimento.
                example: 2025-01-01
          example:
            - amount: 100
              dueDate: 2025-01-01
        readjustment:
          type: object
          properties:
            indexerId:
              type: integer
              description: Código do indexador de reajuste do contrato de locação.
              example: 1
            baseDate:
              type: string
              description: Data base do reajuste do contrato de locação.
              example: 2025-01-01
            frequencyFromFirstPayment:
              type: boolean
              description: Considerar frequência de reajuste das parcelas a partir da data do
                primeiro vencimento.
            frequencyReadjustmentMonths:
              type: integer
              description: Frequência de reajuste em meses
              example: 12
            formOfReajustment:
              type: string
              description: Forma de reajuste a ser aplicada.
              enum:
                - MANUAL
                - AUTOMATICO
              example: MANUAL
            readjustmentType:
              type: string
              description: Tipo de reajuste a ser aplicado.
              enum:
                - VARIACAO_INDEXADOR
                - PERCENTUAL_FIXO
              example: VARIACAO_INDEXADOR
            fixPercentage:
              type: number
              description: Percentual fixo (É obrigatório quando readjustmentType for igual a
                PERCENTUAL_FIXO).
              example: 10
          example:
            indexerId: 1
            baseDate: 2025-01-01
            frequencyFromFirstPayment: true
            frequencyReadjustmentMonths: 12
            formOfReajustment: MANUAL
            readjustmentType: VARIACAO_INDEXADOR
            fixPercentage: 10
        units:
          type: array
          items:
            required:
              - id
              - main
              - participationPercentage
            type: object
            properties:
              id:
                type: integer
                description: Código da unidade.
              participationPercentage:
                type: number
                description: Percentual de participação na unidade.
              main:
                type: boolean
                description: Unidade principal.
          example:
            - id: 1
              participationPercentage: 10
              main: true
        customers:
          type: array
          items:
            required:
              - id
              - main
              - participationPercentage
            type: object
            properties:
              id:
                type: integer
                description: Código do cliente.
              participationPercentage:
                type: number
                description: Percentual de participação.
              main:
                type: boolean
                description: Cliente principal.
          example:
            - id: 1
              participationPercentage: 10
              main: true

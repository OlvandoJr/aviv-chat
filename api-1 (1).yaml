              - LAST_NEGOTIATION_EDITOR_NOT_AUTHORIZED
          example:
            - LAST_NEGOTIATION_EDITOR_NOT_AUTHORIZED
    PurchaseQuotationNegotiationUpdate:
      description: Representa os dados da negociação a ser atualizada
      type: object
      properties:
        supplierAnswerDate:
          type: string
          format: date

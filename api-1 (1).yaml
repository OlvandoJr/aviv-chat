          description: Código do insumo (Identificador do insumo)
        detailId:
          type: integer
          format: int32
          example: 1
          description: Código do detalhe (Identificador do detalhe)
        trademarkId:
          type: integer
          format: int32
          example: 2
          description: Código da marca (Identificador da marca)
        quantity:
          type: number
          format: double
          example: 80
          description: Quantidade (Número quantidade)
        unitySymbol:
          type: string
          description: Unidade de medida (Valor da unidade de medida)
